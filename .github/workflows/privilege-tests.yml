name: Privilege Test Suite

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  privilege-tests:
    name: Auth & privilege regression tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: privtest
          POSTGRES_PASSWORD: privtest
          POSTGRES_DB: privtest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U privtest"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Point the suite at the disposable service-container DB.
      DATABASE_URL_TEST: postgres://privtest:privtest@localhost:5432/privtest
      # SESSION_SECRET is required by auth.js at server boot.
      SESSION_SECRET: ci-test-session-secret-not-used-in-prod
      # NODE_ENV must not be 'production' so the test server starts correctly.
      NODE_ENV: development
      # Puppeteer: use the bundled Chromium and run headless.
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "false"

      # ── Optional pass-throughs ──────────────────────────────────────────
      # TURNSTILE_SECRET_KEY and HUBSPOT_TOKEN are wired in via repo secrets
      # (see the "Run privilege test suite" step below) so the captcha-tampering
      # probe block and all HubSpot-gated matrix cells give deterministic results.
      #
      # Additional secrets that can be added to resolve further gated cells:
      # GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET — Google OAuth probe cells
      # QB_CLIENT_ID / QB_CLIENT_SECRET         — QuickBooks OAuth probe cells

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install system dependencies for Chromium (Puppeteer)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            ca-certificates fonts-liberation libasound2 libatk-bridge2.0-0 \
            libatk1.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 \
            libfontconfig1 libgbm1 libgcc1 libglib2.0-0 libgtk-3-0 libnspr4 \
            libnss3 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 \
            libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 \
            libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 \
            libxtst6 lsb-release wget xdg-utils

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Run privilege and lead-status-sync test suites
        run: npm run test:ci
        env:
          # Re-declare so they are visible at this step even if inherited env
          # is not forwarded (belt-and-suspenders for some GHA runners).
          DATABASE_URL_TEST: postgres://privtest:privtest@localhost:5432/privtest
          SESSION_SECRET: ci-test-session-secret-not-used-in-prod

          # Opt into gated probes using repo secrets:
          PRIVTEST_USE_TURNSTILE_SECRET_KEY: "1"
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          PRIVTEST_USE_HUBSPOT_TOKEN: "1"
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: privilege-test-report
          path: |
            test-results/privileges.md
            test-results/lead-status-sync.md
            test-results/screenshots/
          if-no-files-found: ignore
          retention-days: 30
