<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#200842">
  <meta name="color-scheme" content="light">
  <title>You're offline · Measure Once</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="/app-styles.css">
  <style>
    /* Self-contained so the page renders even if the token/app stylesheets
       were somehow not cached. Brand values mirror tokens.css / theme.ts. */
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--paper, #F6F1E7);
      color: var(--ink-1, #141413);
      font-family: 'Open Sans', system-ui, sans-serif;
    }
    .offline-wrap {
      min-height: 100vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px calc(24px + env(safe-area-inset-right)) calc(24px + env(safe-area-inset-bottom)) calc(24px + env(safe-area-inset-left));
    }
    .offline-card {
      width: 100%;
      max-width: 420px;
      box-sizing: border-box;
    }
    .offline-logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      display: block;
    }
    .offline-title {
      font-family: 'Anton', 'Open Sans', system-ui, sans-serif;
      font-weight: 400;
      font-size: 1.6rem;
      line-height: 1.15;
      letter-spacing: 0.01em;
      margin: 0 0 12px;
      color: var(--ink-1, #141413);
    }
    .offline-text {
      font-size: 1rem;
      line-height: 1.55;
      margin: 0 auto 28px;
      max-width: 34ch;
      color: var(--ink-2, #3a3937);
    }

    /* ── Connection monitor ─────────────────────────────────────── */
    .conn-monitor {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 0 auto 24px;
      height: 28px;
    }
    /* Three stacked arcs that light up sequentially, like a signal icon */
    .conn-signal {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 18px;
    }
    .conn-signal span {
      display: block;
      width: 4px;
      border-radius: 2px;
      background: var(--orchid, #8B2BFF);
      opacity: 0.18;
    }
    .conn-signal span:nth-child(1) { height: 6px;  animation: bar-pulse 1.6s ease-in-out infinite 0s; }
    .conn-signal span:nth-child(2) { height: 11px; animation: bar-pulse 1.6s ease-in-out infinite 0.2s; }
    .conn-signal span:nth-child(3) { height: 16px; animation: bar-pulse 1.6s ease-in-out infinite 0.4s; }
    .conn-signal span:nth-child(4) { height: 18px; animation: bar-pulse 1.6s ease-in-out infinite 0.6s; }

    @keyframes bar-pulse {
      0%, 100% { opacity: 0.18; }
      40%       { opacity: 1;    }
    }

    .conn-label {
      font-size: 0.82rem;
      color: var(--ink-4, #8b8a87);
      letter-spacing: 0.01em;
      min-width: 12ch;
      text-align: left;
    }

    /* Hide monitor once we're back online */
    .conn-monitor.is-online {
      display: none;
    }
    /* ──────────────────────────────────────────────────────────── */

    .offline-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .offline-retry {
      display: inline-block;
      background: var(--orchid, #8B2BFF);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 12px 24px;
      border-radius: var(--radius-md, 8px);
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, opacity 0.15s;
    }
    .offline-retry:hover { opacity: 0.9; }
    .offline-retry:active { background: var(--orchid-press, #7a1fe0); }
    .offline-home {
      font-size: 0.9rem;
      color: var(--ink-2, #3a3937);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .offline-home:hover { color: var(--orchid, #8B2BFF); }
    .offline-status {
      margin: 16px auto 0;
      font-size: 0.8rem;
      color: var(--ink-4, #8b8a87);
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <main class="offline-wrap">
    <div class="offline-card">
      <img class="offline-logo" src="/assets/logo-mark-orchid.png" alt="Measure Once" width="64" height="64">
      <h1 class="offline-title">You're offline</h1>
      <p class="offline-text">
        This page hasn&rsquo;t been loaded yet, so it isn&rsquo;t available offline.
        Reconnect to view it.
      </p>

      <div class="conn-monitor" id="conn-monitor">
        <div class="conn-signal" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
        <span class="conn-label" id="conn-label">Checking&hellip;</span>
      </div>

      <div class="offline-actions">
        <button class="offline-retry" id="retry-btn" onclick="retryNow()">Try again</button>
        <a class="offline-home" href="/">Back to home</a>
      </div>
      <p class="offline-status" id="offline-status">Pages you&rsquo;ve already opened still work without a connection.</p>
    </div>
  </main>
  <script>
    (function () {
      var statusEl  = document.getElementById('offline-status');
      var retryBtn  = document.getElementById('retry-btn');
      var monitor   = document.getElementById('conn-monitor');
      var connLabel = document.getElementById('conn-label');

      /* Cycling label shown while offline */
      var cycleSteps = ['Checking\u2026', 'Waiting for signal\u2026', 'Monitoring connection\u2026'];
      var cycleIdx   = 0;
      var cycleTimer = null;

      function startCycle() {
        if (cycleTimer) return;
        /* 2600 ms: long enough that each label is legible before advancing,
           short enough to convey that the page is actively monitoring.
           One-off presentational value — not shared with the React surface. */
        cycleTimer = setInterval(function () {
          cycleIdx = (cycleIdx + 1) % cycleSteps.length;
          connLabel.textContent = cycleSteps[cycleIdx];
        }, 2600);
      }

      function stopCycle() {
        clearInterval(cycleTimer);
        cycleTimer = null;
      }

      function reload() {
        if (navigator.onLine) {
          window.location.reload();
        }
      }

      window.retryNow = function () {
        if (!navigator.onLine) {
          statusEl.textContent = 'Still offline \u2014 please check your connection.';
          return;
        }
        window.location.reload();
      };

      window.addEventListener('online', function () {
        stopCycle();
        monitor.classList.add('is-online');
        statusEl.textContent = 'Connection restored \u2014 reloading\u2026';
        retryBtn.disabled = true;
        /* 400 ms: lets the network stack fully settle after the browser fires
           the "online" event before attempting a reload. Avoids reloading into
           a still-flaky connection. One-off value — not shared with React. */
        setTimeout(reload, 400);
      });

      window.addEventListener('offline', function () {
        monitor.classList.remove('is-online');
        startCycle();
        statusEl.textContent = 'Still offline \u2014 this page will reload automatically when you reconnect.';
        retryBtn.disabled = false;
      });

      if (!navigator.onLine) {
        statusEl.textContent = 'This page will reload automatically when you reconnect.';
        startCycle();
      } else {
        monitor.classList.add('is-online');
      }
    })();
  </script>
</body>
</html>
