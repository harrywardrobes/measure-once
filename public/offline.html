<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#200842">
  <meta name="color-scheme" content="light">
  <title>You're offline · Measure Once</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="/app-styles.css">
  <style>
    /* Self-contained so the page renders even if the token/app stylesheets
       were somehow not cached. Brand values mirror tokens.css / theme.ts. */
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--paper, #F6F1E7);
      color: var(--ink-1, #141413);
      font-family: 'Open Sans', system-ui, sans-serif;
    }
    .offline-wrap {
      min-height: 100vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px calc(24px + env(safe-area-inset-right)) calc(24px + env(safe-area-inset-bottom)) calc(24px + env(safe-area-inset-left));
    }
    .offline-card {
      width: 100%;
      max-width: 420px;
      box-sizing: border-box;
    }
    .offline-logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      display: block;
    }
    .offline-title {
      font-family: 'Anton', 'Open Sans', system-ui, sans-serif;
      font-weight: 400;
      font-size: 1.6rem;
      line-height: 1.15;
      letter-spacing: 0.01em;
      margin: 0 0 12px;
      color: var(--ink-1, #141413);
    }
    .offline-text {
      font-size: 1rem;
      line-height: 1.55;
      margin: 0 auto 28px;
      max-width: 34ch;
      color: var(--ink-2, #3a3937);
    }
    .offline-link {
      display: inline-block;
      background: var(--orchid, #8B2BFF);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 12px 24px;
      border-radius: var(--radius-md, 8px);
      transition: background 0.15s, opacity 0.15s;
    }
    .offline-link:hover { opacity: 0.9; }
    .offline-link:active { background: var(--orchid-press, #7a1fe0); }
    .offline-hint {
      margin: 20px auto 0;
      font-size: 0.8rem;
      color: var(--ink-4, #8b8a87);
    }
  </style>
</head>
<body>
  <main class="offline-wrap">
    <div class="offline-card">
      <img class="offline-logo" src="/assets/logo-mark-orchid.png" alt="Measure Once" width="64" height="64">
      <h1 class="offline-title">You're offline</h1>
      <p class="offline-text">
        This page hasn&rsquo;t been loaded yet, so it isn&rsquo;t available offline.
        Reconnect to view it.
      </p>
      <a class="offline-link" href="/">Back to home</a>
      <p class="offline-hint">Pages you&rsquo;ve already opened still work without a connection.</p>
    </div>
  </main>
</body>
</html>
