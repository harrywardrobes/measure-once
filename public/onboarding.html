<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Complete your profile · Measure Once</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root { --ink:#141413; --ink-3:#57534e; --line:#e7e5e0; --bg:#f8f7f4; --brand:#3d0f7a; }
    body { background:var(--bg); color:var(--ink); margin:0;
           font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
           min-height:100vh; display:flex; align-items:flex-start; justify-content:center; padding:32px 24px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:12px;
            max-width:680px; width:100%; padding:32px;
            box-shadow:0 1px 3px rgba(0,0,0,.04); }
    .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
    h1 { font-size:1.35rem; margin:0 0 4px; }
    .sub { color:var(--ink-3); font-size:.92rem; margin:0 0 24px; }
    .section-label { font-size:.75rem; font-weight:700; letter-spacing:.04em;
                     text-transform:uppercase; color:#78716c; margin:22px 0 10px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .full { grid-column:1 / -1; }
    label { display:block; font-size:.82rem; color:#374151; margin-bottom:6px; font-weight:500; }
    input, select { width:100%; box-sizing:border-box; padding:9px 11px; border:1px solid #d6d3d1;
                    border-radius:8px; font-size:.92rem; background:#fff; font-family:inherit; }
    input:focus, select:focus { outline:none; border-color:var(--brand); box-shadow:0 0 0 3px rgba(61,15,122,.12); }
    .ni { text-transform:uppercase; }
    .err { background:#fef2f2; border:1px solid #fecaca; color:#991b1b;
           padding:10px 12px; border-radius:8px; font-size:.85rem; margin:16px 0 0; display:none; }
    .actions { display:flex; justify-content:space-between; align-items:center; margin-top:24px;
               padding-top:18px; border-top:1px solid #f3f1ec; gap:12px; }
    button.primary { background:var(--brand); color:#fff; border:none; padding:10px 22px;
                     border-radius:8px; font-weight:600; font-size:.92rem; cursor:pointer; }
    button.primary:hover { background:#2e0f5a; }
    button.primary:disabled { opacity:.6; cursor:not-allowed; }
    button.ghost { background:none; border:none; color:var(--ink-3); cursor:pointer; font:inherit;
                   text-decoration:underline; padding:0; }
    button.ghost:hover { color:var(--ink); }
  </style>
</head>
<body>
  <div class="card">
    <div class="topbar">
      <div>
        <h1>Complete your profile</h1>
        <p class="sub">Before you can use Measure Once, please fill in your details below.</p>
      </div>
      <button class="ghost" id="signout-btn" type="button">Sign out</button>
    </div>

    <form id="profile-form">
      <div class="section-label">Personal details</div>
      <div class="grid">
        <div><label for="first_name">First name</label><input id="first_name" type="text" maxlength="100" required></div>
        <div><label for="last_name">Last name</label><input id="last_name" type="text" maxlength="100" required></div>
        <div><label for="date_of_birth">Date of birth</label><input id="date_of_birth" type="date" required></div>
        <div><label for="ni_number">National Insurance number</label><input id="ni_number" class="ni" type="text" maxlength="20" required oninput="this.value=this.value.toUpperCase()"></div>
        <div><label for="mobile_number">Mobile number</label><input id="mobile_number" type="tel" maxlength="30" required></div>
      </div>

      <div class="section-label">Emergency contact</div>
      <div class="grid">
        <div><label for="ec_first_name">First name</label><input id="ec_first_name" type="text" maxlength="100" required></div>
        <div><label for="ec_last_name">Last name</label><input id="ec_last_name" type="text" maxlength="100" required></div>
        <div class="full"><label for="ec_phone">Mobile number</label><input id="ec_phone" type="tel" maxlength="30" required></div>
      </div>

      <div id="err" class="err"></div>

      <div class="actions">
        <span style="color:var(--ink-3); font-size:.82rem;">All fields are required.</span>
        <button id="submit-btn" class="primary" type="submit">Save &amp; continue</button>
      </div>
    </form>
  </div>

<script>
  function showErr(msg) {
    const e = document.getElementById('err');
    e.textContent = msg; e.style.display = 'block';
  }
  function hideErr() {
    const e = document.getElementById('err'); e.style.display = 'none'; e.textContent = '';
  }

  async function loadMe() {
    try {
      const r = await fetch('/api/onboarding/me');
      if (r.status === 401) { location.href = '/login'; return; }
      if (!r.ok) return;
      const me = await r.json();
      if (me.onboarding_status === 'active') {
        location.href = '/';
        return;
      }
      document.getElementById('first_name').value = me.first_name || '';
      document.getElementById('last_name').value  = me.last_name  || '';
      const m = me.metadata || {};
      document.getElementById('date_of_birth').value = m.date_of_birth || '';
      document.getElementById('ni_number').value     = m.ni_number     || '';
      document.getElementById('mobile_number').value = m.mobile_number || '';
      document.getElementById('ec_first_name').value = m.ec_first_name || '';
      document.getElementById('ec_last_name').value  = m.ec_last_name  || '';
      document.getElementById('ec_phone').value      = m.ec_phone      || '';
    } catch {}
  }

  document.getElementById('signout-btn').addEventListener('click', async () => {
    await fetch('/api/logout', { method: 'POST', headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' } });
    location.href = '/login?signed_out=1';
  });

  document.getElementById('profile-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideErr();
    const body = {
      first_name:    document.getElementById('first_name').value.trim(),
      last_name:     document.getElementById('last_name').value.trim(),
      date_of_birth: document.getElementById('date_of_birth').value,
      ni_number:     document.getElementById('ni_number').value.trim(),
      mobile_number: document.getElementById('mobile_number').value.trim(),
      ec_first_name: document.getElementById('ec_first_name').value.trim(),
      ec_last_name:  document.getElementById('ec_last_name').value.trim(),
      ec_phone:      document.getElementById('ec_phone').value.trim(),
    };
    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const r = await fetch('/api/onboarding/complete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) {
        showErr(data.error || 'Could not save your profile.');
        btn.disabled = false; btn.textContent = 'Save & continue';
        return;
      }
      location.href = '/';
    } catch {
      showErr('Network error — please try again.');
      btn.disabled = false; btn.textContent = 'Save & continue';
    }
  });

  loadMe();
</script>
</body>
</html>
