<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Complete your profile · Measure Once</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/auth.css">
</head>
<body class="auth-page auth-page--top">
  <div class="auth-card auth-card--wide">
    <div class="auth-logo-wrap">
      <img src="/harry-wardrobes-logo.png" alt="Harry Wardrobes">
    </div>
    <div class="auth-topbar">
      <div>
        <h1>Complete your profile</h1>
        <p class="auth-sub" style="margin-bottom:0;">Before you can use Measure Once, please fill in your details below.</p>
      </div>
      <button class="auth-btn-ghost" id="signout-btn" type="button">Sign out</button>
    </div>

    <form id="profile-form">
      <div class="auth-section-label">Personal details</div>
      <div class="auth-grid">
        <div><label for="first_name">First name</label><input id="first_name" type="text" maxlength="100" required></div>
        <div><label for="last_name">Last name</label><input id="last_name" type="text" maxlength="100" required></div>
        <div><label for="date_of_birth">Date of birth</label><input id="date_of_birth" type="date" required></div>
        <div><label for="ni_number">National Insurance number</label><input id="ni_number" class="auth-input-uppercase" type="text" maxlength="20" required oninput="this.value=this.value.toUpperCase()"></div>
        <div><label for="mobile_number">Mobile number</label><input id="mobile_number" type="tel" maxlength="30" required></div>
      </div>

      <div class="auth-section-label">Emergency contact</div>
      <div class="auth-grid">
        <div><label for="ec_first_name">First name</label><input id="ec_first_name" type="text" maxlength="100" required></div>
        <div><label for="ec_last_name">Last name</label><input id="ec_last_name" type="text" maxlength="100" required></div>
        <div class="auth-grid-full"><label for="ec_phone">Mobile number</label><input id="ec_phone" type="tel" maxlength="30" required></div>
      </div>

      <div id="err" class="auth-alert auth-alert--err"></div>

      <div class="auth-actions">
        <span class="auth-actions-hint">All fields are required.</span>
        <button id="submit-btn" class="auth-submit auth-submit--compact" type="submit" style="width:auto;">Save &amp; continue</button>
      </div>
    </form>
  </div>

<script>
  function showErr(msg) {
    const e = document.getElementById('err');
    e.textContent = msg; e.style.display = 'block';
  }
  function hideErr() {
    const e = document.getElementById('err'); e.style.display = 'none'; e.textContent = '';
  }

  async function loadMe() {
    try {
      const r = await fetch('/api/onboarding/me');
      if (r.status === 401) { location.href = '/login'; return; }
      if (!r.ok) return;
      const me = await r.json();
      if (me.onboarding_status === 'active') {
        location.href = '/';
        return;
      }
      document.getElementById('first_name').value = me.first_name || '';
      document.getElementById('last_name').value  = me.last_name  || '';
      const m = me.metadata || {};
      document.getElementById('date_of_birth').value = m.date_of_birth || '';
      document.getElementById('ni_number').value     = m.ni_number     || '';
      document.getElementById('mobile_number').value = m.mobile_number || '';
      document.getElementById('ec_first_name').value = m.ec_first_name || '';
      document.getElementById('ec_last_name').value  = m.ec_last_name  || '';
      document.getElementById('ec_phone').value      = m.ec_phone      || '';
    } catch {}
  }

  document.getElementById('signout-btn').addEventListener('click', async () => {
    await fetch('/api/logout', { method: 'POST', headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' } });
    location.href = '/login?signed_out=1';
  });

  document.getElementById('profile-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideErr();
    const body = {
      first_name:    document.getElementById('first_name').value.trim(),
      last_name:     document.getElementById('last_name').value.trim(),
      date_of_birth: document.getElementById('date_of_birth').value,
      ni_number:     document.getElementById('ni_number').value.trim(),
      mobile_number: document.getElementById('mobile_number').value.trim(),
      ec_first_name: document.getElementById('ec_first_name').value.trim(),
      ec_last_name:  document.getElementById('ec_last_name').value.trim(),
      ec_phone:      document.getElementById('ec_phone').value.trim(),
    };
    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const r = await fetch('/api/onboarding/complete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) {
        showErr(data.error || 'Could not save your profile.');
        btn.disabled = false; btn.textContent = 'Save & continue';
        return;
      }
      location.href = '/';
    } catch {
      showErr('Network error — please try again.');
      btn.disabled = false; btn.textContent = 'Save & continue';
    }
  });

  loadMe();
</script>
</body>
</html>
