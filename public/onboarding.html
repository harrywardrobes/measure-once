<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Complete your profile · Measure Once</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/tokens.css">
  <style>
@font-face {
  font-family: 'Open Sans';
  src: url('fonts/OpenSans-VariableFont_wdth_wght.ttf') format('truetype');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Open Sans';
  src: url('fonts/OpenSans-Italic-VariableFont_wdth_wght.ttf') format('truetype');
  font-weight: 100 900;
  font-style: italic;
  font-display: swap;
}
body.auth-page {
  background: var(--surface-muted);
  color: var(--ink-1);
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  padding-top: 24px;
}
body.auth-page--top {
  align-items: flex-start;
  padding: 32px 24px;
}
.auth-card {
  background: var(--surface-card);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-2xl);
  width: 100%;
  padding: 32px;
  box-shadow: var(--shadow-card-xs);
}
.auth-card--login {
  max-width: 440px;
  border: 2px solid var(--border-strong);
  padding: 36px;
  box-shadow: var(--shadow-card-sm);
}
.auth-card--wide { max-width: 680px; }
.auth-card--narrow { max-width: 420px; }
.auth-logo-wrap { text-align: center; margin-bottom: 28px; }
.auth-logo-wrap img { max-width: 180px; width: 100%; height: auto; display: inline-block; }
.auth-card h1 { font-size: 1.4rem; font-weight: 700; margin: 0 0 6px; color: var(--ink-1); letter-spacing: -.01em; }
.auth-card--wide h1, .auth-card--narrow h1 { font-size: 1.25rem; }
.auth-sub {
  color: var(--ink-2); font-size: .95rem; margin: 0 0 28px; line-height: 1.5;
}
.auth-email-line {
  color: var(--ink-3); font-size: .9rem; margin: 0 0 6px;
}
.auth-email-line.is-strong {
  font-weight: 600; color: var(--ink-1); margin-bottom: 20px;
}
.auth-field { margin-bottom: 18px; }
.auth-field-label {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: .9rem; font-weight: 600; color: var(--ink-1); margin-bottom: 6px;
}
.auth-field-required { font-size: .75rem; color: var(--ink-4); font-weight: 400; }
.auth-card label {
  display: block; font-size: .9rem; font-weight: 600; color: var(--ink-1); margin-bottom: 6px;
}
.auth-card input, .auth-card select {
  width: 100%; box-sizing: border-box; padding: 12px 14px;
  border: 2px solid var(--stone-deep); border-radius: var(--radius-lg);
  font-size: 1rem; background: var(--surface-card); color: var(--ink-1);
  font-family: inherit;
}
.auth-card--narrow input,
.auth-card--wide input,
.auth-card--wide select {
  padding: 10px 12px;
  font-size: .95rem;
  border-width: 1px;
  border-color: var(--border-strong);
  border-radius: var(--radius-lg);
}
.auth-card input:focus, .auth-card select:focus {
  outline: none; border-color: var(--brand-accent);
  box-shadow: 0 0 0 3px var(--brand-accent-ring);
}
.auth-submit {
  width: 100%; background: var(--brand-accent); color: #fff; border: none;
  padding: 14px 18px; border-radius: var(--radius-lg); font-weight: 700;
  font-size: 1rem; cursor: pointer; min-height: 48px;
  letter-spacing: .02em; transition: background .15s ease;
  font-family: inherit;
}
.auth-submit:hover { background: var(--brand-accent-hover); }
.auth-submit:disabled { opacity: .5; cursor: not-allowed; background: var(--brand-accent); }
.auth-submit--compact {
  padding: 11px 18px; font-weight: 600; font-size: .95rem; min-height: 0;
  border-radius: var(--radius-lg);
}
.auth-alert {
  display: none; padding: 10px 12px; border-radius: var(--radius-lg);
  font-size: .9rem; margin-bottom: 18px;
  align-items: flex-start; gap: 10px; line-height: 1.4;
}
.auth-alert--err {
  background: var(--status-danger-bg);
  border: 1.5px solid var(--status-danger-border);
  color: var(--status-danger-text);
}
.auth-alert--ok {
  background: var(--status-success-bg);
  border: 1.5px solid var(--status-success-border);
  color: var(--status-success-text);
}
.auth-alert svg { flex-shrink: 0; margin-top: 1px; }
.auth-link {
  display: inline-block; margin-top: 6px; margin-bottom: 22px;
  font-size: .875rem; color: var(--brand-accent); font-weight: 600;
  text-decoration: underline; background: none; border: none;
  cursor: pointer; padding: 0; font-family: inherit;
}
.auth-link:hover { color: var(--brand-accent-hover); }
.auth-footer {
  margin-top: 22px; padding-top: 18px; border-top: 2px solid var(--paper);
  font-size: .9rem; color: var(--ink-2); text-align: center; line-height: 1.6;
}
.auth-footer a, .auth-footer button.auth-toggle {
  color: var(--brand-accent); text-decoration: underline; font-weight: 700;
}
.auth-footer a:hover, .auth-footer button.auth-toggle:hover { color: var(--brand-accent-hover); }
.auth-toggle {
  background: none; border: none; cursor: pointer;
  font: inherit; font-weight: 700; padding: 0;
  color: var(--brand-accent);
}
.auth-hidden { display: none !important; }
.turnstile-widget { margin: 4px 0 14px; min-height: 65px; }
.auth-topbar {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px;
}
.auth-section-label {
  font-size: .75rem; font-weight: 700; letter-spacing: .04em;
  text-transform: uppercase; color: var(--ink-4); margin: 22px 0 10px;
}
.auth-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.auth-grid .auth-grid-full { grid-column: 1 / -1; }
.auth-card .auth-input-uppercase { text-transform: uppercase; }
.auth-actions {
  display: flex; justify-content: space-between; align-items: center; margin-top: 24px;
  padding-top: 18px; border-top: 1px solid var(--paper); gap: 12px;
}
.auth-actions-hint { color: var(--ink-3); font-size: .82rem; }
.auth-card .auth-btn-ghost {
  background: none; border: none; color: var(--ink-3); cursor: pointer; font: inherit;
  text-decoration: underline; padding: 0;
}
.auth-card .auth-btn-ghost:hover { color: var(--ink-1); }
.auth-hint { font-size: .78rem; color: var(--ink-4); margin-top: 4px; }
.auth-card .auth-invalid {
  background: var(--status-danger-bg);
  border: 1px solid var(--status-danger-border);
  color: var(--status-danger-text);
  padding: 14px 16px; border-radius: var(--radius-lg);
}
.auth-card .auth-invalid a { color: var(--brand-accent); font-weight: 600; }
.auth-loading { color: var(--ink-3); font-size: .9rem; }
.auth-topbar .auth-sub { margin-bottom: 0; }
#submit-btn { width: auto; }
  </style>
</head>
<body class="auth-page auth-page--top">
  <div class="auth-card auth-card--wide">
    <div class="auth-logo-wrap">
      <img src="/harry-wardrobes-logo.png" alt="Harry Wardrobes">
    </div>
    <div class="auth-topbar">
      <div>
        <h1>Complete your profile</h1>
        <p class="auth-sub">Before you can use Measure Once, please fill in your details below.</p>
      </div>
      <button class="auth-btn-ghost" id="signout-btn" type="button">Sign out</button>
    </div>

    <form id="profile-form">
      <div class="auth-section-label">Personal details</div>
      <div class="auth-grid">
        <div><label for="first_name">First name</label><input id="first_name" type="text" maxlength="100" required></div>
        <div><label for="last_name">Last name</label><input id="last_name" type="text" maxlength="100" required></div>
        <div><label for="date_of_birth">Date of birth</label><input id="date_of_birth" type="date" required></div>
        <div><label for="ni_number">National Insurance number</label><input id="ni_number" class="auth-input-uppercase" type="text" maxlength="20" required oninput="this.value=this.value.toUpperCase()"></div>
        <div><label for="mobile_number">Mobile number</label><input id="mobile_number" type="tel" maxlength="30" required></div>
      </div>

      <div class="auth-section-label">Emergency contact</div>
      <div class="auth-grid">
        <div><label for="ec_first_name">First name</label><input id="ec_first_name" type="text" maxlength="100" required></div>
        <div><label for="ec_last_name">Last name</label><input id="ec_last_name" type="text" maxlength="100" required></div>
        <div class="auth-grid-full"><label for="ec_phone">Mobile number</label><input id="ec_phone" type="tel" maxlength="30" required></div>
      </div>

      <div id="err" class="auth-alert auth-alert--err"></div>

      <div class="auth-actions">
        <span class="auth-actions-hint">All fields are required.</span>
        <button id="submit-btn" class="auth-submit auth-submit--compact" type="submit">Save &amp; continue</button>
      </div>
    </form>
  </div>

<script>
  function showErr(msg) {
    const e = document.getElementById('err');
    e.textContent = msg; e.style.display = 'block';
  }
  function hideErr() {
    const e = document.getElementById('err'); e.style.display = 'none'; e.textContent = '';
  }

  async function loadMe() {
    try {
      const r = await fetch('/api/onboarding/me');
      if (r.status === 401) { location.href = '/login'; return; }
      if (!r.ok) return;
      const me = await r.json();
      if (me.onboarding_status === 'active') {
        location.href = '/';
        return;
      }
      document.getElementById('first_name').value = me.first_name || '';
      document.getElementById('last_name').value  = me.last_name  || '';
      const m = me.metadata || {};
      document.getElementById('date_of_birth').value = m.date_of_birth || '';
      document.getElementById('ni_number').value     = m.ni_number     || '';
      document.getElementById('mobile_number').value = m.mobile_number || '';
      document.getElementById('ec_first_name').value = m.ec_first_name || '';
      document.getElementById('ec_last_name').value  = m.ec_last_name  || '';
      document.getElementById('ec_phone').value      = m.ec_phone      || '';
    } catch {}
  }

  document.getElementById('signout-btn').addEventListener('click', async () => {
    await fetch('/api/logout', { method: 'POST', headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' } });
    location.href = '/login?signed_out=1';
  });

  document.getElementById('profile-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideErr();
    const body = {
      first_name:    document.getElementById('first_name').value.trim(),
      last_name:     document.getElementById('last_name').value.trim(),
      date_of_birth: document.getElementById('date_of_birth').value,
      ni_number:     document.getElementById('ni_number').value.trim(),
      mobile_number: document.getElementById('mobile_number').value.trim(),
      ec_first_name: document.getElementById('ec_first_name').value.trim(),
      ec_last_name:  document.getElementById('ec_last_name').value.trim(),
      ec_phone:      document.getElementById('ec_phone').value.trim(),
    };
    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const r = await fetch('/api/onboarding/complete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) {
        showErr(data.error || 'Could not save your profile.');
        btn.disabled = false; btn.textContent = 'Save & continue';
        return;
      }
      location.href = '/';
    } catch {
      showErr('Network error — please try again.');
      btn.disabled = false; btn.textContent = 'Save & continue';
    }
  });

  loadMe();
</script>
</body>
</html>
