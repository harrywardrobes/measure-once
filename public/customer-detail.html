<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#200842">
  <meta name="color-scheme" content="light">
  <title>Customer · Measure Once</title>
  <link rel="stylesheet" href="/tailwind.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/app-styles.css">
</head>
<body>

  <div id="tab-detail" class="app-body">
    <main class="workflow-panel workflow-panel-detail" id="workflow-panel">
      <div id="customer-detail-root"></div>
    </main>
  </div>

  <script src="/chrome.js"></script>
  <script src="/components.js"></script>
  <script type="module" src="/react/main.js"></script>
  <script src="/command-palette.js"></script>
  <script src="/core.js"></script>
  <script src="/workflow-core.js"></script>
  <script src="/invoices-core.js"></script>
  <script src="/workflow.js"></script>
  <script src="/card-action-handlers.js"></script>
  <script>
    // Simple back navigation fallback used by any non-React code that calls goBack().
    // CustomerDetailPage renders its own back button and does not use this function.
    async function goBack() {
      location.href = '/customers';
    }

    // Call bootstrap() so that state.user is populated (needed by test harnesses
    // and shared vanilla-JS utilities on this page). CustomerDetailPage fetches
    // the contact and lead-statuses independently via its own React bootstrap.
    document.addEventListener('DOMContentLoaded', async () => {
      if (typeof bootstrap === 'function') {
        await bootstrap();
      }
    });
  </script>
</body>
</html>
