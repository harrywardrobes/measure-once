<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#200842">
  <meta name="color-scheme" content="light">
  <title>Customer · Measure Once</title>
  <link rel="stylesheet" href="/tailwind.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div id="tab-detail" class="app-body">
    <main class="workflow-panel workflow-panel-detail" id="workflow-panel">
      <div id="empty-state" class="hidden"></div>
      <div id="workflow-view" class="flex-1 overflow-y-auto">
        <button class="back-btn" onclick="goBack()">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/>
          </svg>
          Customers
        </button>
        <div class="bg-white border-b border-slate-200 px-4 sm:px-6 py-4 shadow-sm">
          <div class="flex items-start justify-between gap-4">
            <div class="flex-1 min-w-0">
              <div class="skeleton-line skeleton-wf-name"></div>
              <div class="flex items-center gap-2 mt-3">
                <div class="skeleton-line skeleton-wf-badge"></div>
                <div class="skeleton-line skeleton-wf-email"></div>
                <div class="skeleton-line skeleton-wf-phone"></div>
              </div>
            </div>
            <div class="skeleton-line skeleton-wf-select"></div>
          </div>
        </div>
        <div class="workflow-inner">
          <div class="space-y-2">
            <div class="skeleton-stage-row"><div class="flex items-center gap-3 flex-1"><div class="skeleton-line skeleton-stage-dot"></div><div class="skeleton-line skeleton-stage-label"></div></div><div class="skeleton-line skeleton-stage-count"></div></div>
            <div class="skeleton-stage-row"><div class="flex items-center gap-3 flex-1"><div class="skeleton-line skeleton-stage-dot"></div><div class="skeleton-line skeleton-stage-label skeleton-stage-label-md"></div></div><div class="skeleton-line skeleton-stage-count"></div></div>
            <div class="skeleton-stage-row"><div class="flex items-center gap-3 flex-1"><div class="skeleton-line skeleton-stage-dot"></div><div class="skeleton-line skeleton-stage-label skeleton-stage-label-sm"></div></div><div class="skeleton-line skeleton-stage-count"></div></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- New Customer Modal (needed if header + button triggers openNewCustomerModal) -->
  <div id="new-customer-overlay" class="inv-overlay hidden" onclick="closeNewCustomerModal()"></div>
  <div id="new-customer-modal" class="nc-modal-wrap hidden" style="display:none;">
    <div class="nc-modal-box" onclick="event.stopPropagation()">
      <div class="nc-modal-header">
        <h2 class="nc-modal-title">New Customer</h2>
        <button onclick="closeNewCustomerModal()" class="nc-modal-close" title="Close">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <form id="new-customer-form" onsubmit="submitNewCustomer(event)" novalidate>
        <div class="nc-form-grid">
          <label class="nc-form-row">
            <span class="nc-label-text">First name <span class="nc-required">*</span></span>
            <input id="nc-firstname" type="text" required autocomplete="given-name" class="nc-input">
          </label>
          <label class="nc-form-row">
            <span class="nc-label-text">Last name</span>
            <input id="nc-lastname" type="text" autocomplete="family-name" class="nc-input">
          </label>
        </div>
        <label class="nc-form-row">
          <span class="nc-label-text">Email <span class="nc-required">*</span></span>
          <input id="nc-email" type="email" required autocomplete="email" class="nc-input">
        </label>
        <label class="nc-form-row">
          <span class="nc-label-text">Phone</span>
          <input id="nc-phone" type="tel" autocomplete="tel" class="nc-input">
        </label>
        <label class="nc-form-row nc-form-row-last">
          <span class="nc-label-text">Postcode <span class="nc-required">*</span></span>
          <input id="nc-postcode" type="text" required autocomplete="postal-code" class="nc-input nc-postcode">
        </label>
        <div id="nc-error" class="nc-error"></div>
        <div class="nc-actions">
          <button type="button" onclick="closeNewCustomerModal()" class="nc-btn-cancel">Cancel</button>
          <button type="submit" id="nc-submit" class="nc-btn-submit">Create Customer</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Edit Contact Modal -->
  <div id="edit-contact-overlay" class="inv-overlay hidden" onclick="requestCloseContactEdit()"></div>
  <div id="edit-contact-modal" class="nc-modal-wrap hidden" style="display:none;">
    <div class="nc-modal-box" onclick="event.stopPropagation()">
      <div class="nc-modal-header">
        <h2 class="nc-modal-title">Edit Contact</h2>
        <button onclick="requestCloseContactEdit()" class="nc-modal-close" title="Close">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <form id="edit-contact-form" onsubmit="submitContactEdit(event)" novalidate>
        <div class="nc-form-grid">
          <label class="nc-form-row">
            <span class="nc-label-text">First name <span class="nc-required">*</span></span>
            <input id="ec-firstname" type="text" required autocomplete="given-name" class="nc-input">
          </label>
          <label class="nc-form-row">
            <span class="nc-label-text">Last name</span>
            <input id="ec-lastname" type="text" autocomplete="family-name" class="nc-input">
          </label>
        </div>
        <label class="nc-form-row">
          <span class="nc-label-text">Email</span>
          <input id="ec-email" type="email" autocomplete="email" class="nc-input">
        </label>
        <label class="nc-form-row">
          <span class="nc-label-text">Phone</span>
          <input id="ec-phone" type="tel" autocomplete="tel" class="nc-input">
        </label>
        <label class="nc-form-row">
          <span class="nc-label-text">Address</span>
          <input id="ec-address" type="text" autocomplete="street-address" class="nc-input">
        </label>
        <div class="nc-form-grid">
          <label class="nc-form-row">
            <span class="nc-label-text">City</span>
            <input id="ec-city" type="text" autocomplete="address-level2" class="nc-input">
          </label>
          <label class="nc-form-row">
            <span class="nc-label-text">Postcode</span>
            <input id="ec-zip" type="text" autocomplete="postal-code" class="nc-input nc-postcode">
          </label>
        </div>
        <div id="ec-error" class="nc-error"></div>
        <div class="nc-actions">
          <button type="button" onclick="requestCloseContactEdit()" class="nc-btn-cancel">Cancel</button>
          <button type="submit" id="ec-submit" class="nc-btn-submit">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/chrome.js"></script>
  <script src="/core.js"></script>
  <script src="/workflow-core.js"></script>
  <script src="/invoices-core.js"></script>
  <script src="/workflow.js"></script>
  <script src="/customer-detail.js"></script>
  <script>
    // Override goBack so the back button in the workflow returns to the customers list.
    async function goBack() {
      if (typeof closeContactEditIfPristine === 'function') closeContactEditIfPristine();
      if (hasUnsavedChanges()) {
        showUnsavedChangesBar(
          async () => {
            try {
              await _commitActiveInlineEdit();
            } catch {
              // Commit failed (e.g. contact edit validation) — leave the user
              // on the page so they can fix the form. Don't navigate.
              return;
            }
            await persistCommentDraft();
            await flushDeferredSave();
            location.href = '/customers';
          },
          () => {
            _discardActiveInlineEdit();
            _clearCommentDraft();
            discardPendingSave();
            location.href = '/customers';
          }
        );
        return;
      }
      await flushDeferredSave();
      location.href = '/customers';
    }

    document.addEventListener('DOMContentLoaded', async () => {
      // Extract contact ID from URL path: /customers/:id
      const contactId = location.pathname.split('/').filter(Boolean).pop();

      if (!contactId || !/^\d+$/.test(contactId)) {
        document.getElementById('workflow-view').innerHTML =
          '<div class="p-6 text-red-500 text-sm">Invalid customer ID.</div>';
        return;
      }

      if (!await bootstrap()) return;

      // Update page title once we know the ID
      document.title = 'Customer · Measure Once';

      // If the contact is not already in state (bootstrap loaded open leads only),
      // fetch it individually so selectContact can find it.
      let contact = state.contacts.find(c => c.id === contactId);
      if (!contact) {
        try {
          contact = await GET(`/api/contacts/${contactId}`);
          if (contact && contact.id) {
            state.contacts.push(contact);
          }
        } catch (e) {
          document.getElementById('workflow-view').innerHTML =
            `<div class="p-6 text-red-500 text-sm">Failed to load customer: ${escHtml(e.message)}</div>`;
          return;
        }
      }

      if (contact && contact.properties) {
        const name = contactName(contact);
        document.title = `${name} · Measure Once`;
      }

      const roomParam = new URLSearchParams(location.search).get('room');
      const roomIdx = roomParam ? Math.max(0, parseInt(roomParam, 10) || 0) : 0;
      await selectContact(contactId, roomIdx);
    });
  </script>
</body>
</html>
