<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#200842">
  <meta name="color-scheme" content="light">
  <title>Customer · Measure Once</title>
  <link rel="stylesheet" href="/tailwind.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div id="tab-detail" class="app-body">
    <main class="workflow-panel workflow-panel-detail" id="workflow-panel">
      <div id="empty-state" class="hidden"></div>
      <div id="workflow-view" class="flex-1 overflow-y-auto">
        <button class="back-btn" onclick="goBack()">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/>
          </svg>
          Customers
        </button>
        <div class="bg-white border-b border-slate-200 px-4 sm:px-6 py-4 shadow-sm">
          <div class="flex items-start justify-between gap-4">
            <div class="flex-1 min-w-0">
              <div class="skeleton-line skeleton-wf-name"></div>
              <div class="flex items-center gap-2 mt-3">
                <div class="skeleton-line skeleton-wf-badge"></div>
                <div class="skeleton-line skeleton-wf-email"></div>
                <div class="skeleton-line skeleton-wf-phone"></div>
              </div>
            </div>
            <div class="skeleton-line skeleton-wf-select"></div>
          </div>
        </div>
        <div class="workflow-inner">
          <div class="space-y-2">
            <div class="skeleton-stage-row"><div class="flex items-center gap-3 flex-1"><div class="skeleton-line skeleton-stage-dot"></div><div class="skeleton-line skeleton-stage-label"></div></div><div class="skeleton-line skeleton-stage-count"></div></div>
            <div class="skeleton-stage-row"><div class="flex items-center gap-3 flex-1"><div class="skeleton-line skeleton-stage-dot"></div><div class="skeleton-line skeleton-stage-label skeleton-stage-label-md"></div></div><div class="skeleton-line skeleton-stage-count"></div></div>
            <div class="skeleton-stage-row"><div class="flex items-center gap-3 flex-1"><div class="skeleton-line skeleton-stage-dot"></div><div class="skeleton-line skeleton-stage-label skeleton-stage-label-sm"></div></div><div class="skeleton-line skeleton-stage-count"></div></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- WhatsApp Modal -->
  <div id="whatsapp-modal" class="hidden wa-modal" style="display:none">
    <div style="position:absolute;inset:0;background:rgba(0,0,0,0.45)" onclick="closeWhatsAppModal()"></div>
    <div style="position:relative;background:#fff;border-radius:14px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,0.25);overflow:hidden">
      <div style="background:#25D366;padding:16px 20px;display:flex;align-items:center;gap:10px">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        <span style="color:#fff;font-size:1rem;font-weight:700">Send WhatsApp</span>
        <button onclick="closeWhatsAppModal()" style="margin-left:auto;background:none;border:none;cursor:pointer;color:#fff;opacity:0.8;font-size:1.25rem;line-height:1;padding:0 2px">✕</button>
      </div>
      <div style="padding:18px 20px">
        <div id="whatsapp-to" style="font-size:0.82rem;color:#6b7280;margin-bottom:14px"></div>
        <div style="display:flex;gap:0;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;margin-bottom:16px">
          <button id="wa-tab-template" onclick="waSetMode('template')"
            style="flex:1;padding:8px 0;font-size:0.82rem;font-weight:600;border:none;cursor:pointer;transition:background 0.15s">
            Template
          </button>
          <button id="wa-tab-freeform" onclick="waSetMode('freeform')"
            style="flex:1;padding:8px 0;font-size:0.82rem;font-weight:600;border:none;cursor:pointer;transition:background 0.15s;border-left:1px solid #e2e8f0">
            Free-form
          </button>
        </div>

        <div id="wa-panel-template">
          <div id="wa-templates-loading" style="font-size:0.82rem;color:#6b7280;padding:8px 0">Loading templates…</div>
          <div id="wa-templates-error" class="hidden" style="font-size:0.82rem;color:#b91c1c;padding:4px 0"></div>
          <select id="wa-template-select" class="hidden"
            style="width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:0.875rem;margin-bottom:10px;background:#fff;cursor:pointer"
            onchange="waOnTemplateChange()">
            <option value="">— Select a template —</option>
          </select>
          <div id="wa-template-preview" style="font-size:0.8rem;color:#374151;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;margin-bottom:10px;white-space:pre-wrap;display:none"></div>
          <div id="wa-template-params" style="display:none"></div>
        </div>

        <div id="wa-panel-freeform" class="hidden">
          <div style="font-size:0.78rem;background:#fef9c3;border:1px solid #fde68a;border-radius:8px;padding:8px 12px;color:#854d0e;margin-bottom:10px;line-height:1.5">
            <strong>24-hour rule:</strong> Free-form messages can only be sent within 24 hours of the customer last messaging your business. Outside that window, use a template.
          </div>
          <textarea id="wa-freeform-text" rows="4" placeholder="Type your message…"
            style="width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;font-size:0.875rem;resize:vertical;font-family:inherit;font-size:16px;box-sizing:border-box"></textarea>
        </div>

        <div id="wa-send-error" class="hidden" style="font-size:0.82rem;color:#b91c1c;margin-top:8px;padding:6px 10px;background:#fef2f2;border-radius:6px"></div>
        <div id="wa-send-success" class="hidden" style="font-size:0.82rem;color:#15803d;margin-top:8px;padding:6px 10px;background:#f0fdf4;border-radius:6px">Message sent successfully!</div>

        <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:14px">
          <button onclick="closeWhatsAppModal()" class="btn-cancel-note">Cancel</button>
          <button id="wa-send-btn" onclick="waSubmit()"
            style="background:#25D366;color:#fff;border:none;border-radius:8px;padding:9px 22px;font-size:0.875rem;font-weight:600;cursor:pointer;transition:background 0.15s">
            Send
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="/chrome.js"></script>
  <script src="/components.js"></script>
  <script src="/command-palette.js"></script>
  <script src="/core.js"></script>
  <script src="/workflow-core.js"></script>
  <script src="/invoices-core.js"></script>
  <script src="/workflow.js"></script>
  <script src="/customer-detail.js"></script>
  <script src="/card-action-handlers.js"></script>
  <script>
    // Override goBack so the back button in the workflow returns to the customers list.
    async function goBack() {
      if (typeof closeContactEditIfPristine === 'function') closeContactEditIfPristine();
      if (hasUnsavedChanges()) {
        showUnsavedChangesBar(
          async () => {
            try {
              await _commitActiveInlineEdit();
            } catch {
              // Commit failed (e.g. contact edit validation) — leave the user
              // on the page so they can fix the form. Don't navigate.
              return;
            }
            await persistCommentDraft();
            await flushDeferredSave();
            location.href = '/customers';
          },
          () => {
            _discardActiveInlineEdit();
            _clearCommentDraft();
            discardPendingSave();
            location.href = '/customers';
          }
        );
        return;
      }
      await flushDeferredSave();
      location.href = '/customers';
    }

    document.addEventListener('DOMContentLoaded', async () => {
      // Extract contact ID from URL path: /customers/:id
      const contactId = location.pathname.split('/').filter(Boolean).pop();

      if (!contactId || !/^\d+$/.test(contactId)) {
        document.getElementById('workflow-view').innerHTML =
          '<div class="p-6 text-red-500 text-sm">Invalid customer ID.</div>';
        return;
      }

      if (!await bootstrap()) return;

      // Update page title once we know the ID
      document.title = 'Customer · Measure Once';

      // If the contact is not already in state (bootstrap loaded open leads only),
      // fetch it individually so selectContact can find it.
      let contact = state.contacts.find(c => c.id === contactId);
      if (!contact) {
        try {
          contact = await GET(`/api/contacts/${contactId}`);
          if (contact && contact.id) {
            state.contacts.push(contact);
          }
        } catch (e) {
          document.getElementById('workflow-view').innerHTML =
            `<div class="p-6 text-red-500 text-sm">Failed to load customer: ${escHtml(e.message)}</div>`;
          return;
        }
      }

      if (contact && contact.properties) {
        const name = contactName(contact);
        document.title = `${name} · Measure Once`;

        try {
          const KEY = 'cp_recent_customers';
          const MAX = 5;
          const entry = {
            id: contactId,
            name,
            company: contact.properties.company || '',
            ts: Date.now(),
          };
          const existing = JSON.parse(localStorage.getItem(KEY) || '[]');
          const filtered = existing.filter(r => r.id !== contactId);
          filtered.unshift(entry);
          localStorage.setItem(KEY, JSON.stringify(filtered.slice(0, MAX)));
        } catch (_) {}
      }

      const roomParam = new URLSearchParams(location.search).get('room');
      const roomIdx = roomParam ? Math.max(0, parseInt(roomParam, 10) || 0) : 0;
      await selectContact(contactId, roomIdx);
    });
  </script>
</body>
</html>
