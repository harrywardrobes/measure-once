<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A · Time-grid week</title>
<style>
  :root {
    --orchid: #9b669b; --orchid-deep: #7d4b7d;
    --ink-1: #1a1a1a; --ink-2: #404040; --ink-3: #737373;
    --stone-soft: #fafaf7; --stone-light: #e7e5e0; --stone-deep: #a8a29e;
  }
  * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  body { margin: 0; background: #fff; color: var(--ink-1); font-size: 14px; }
  .shell { max-width: 100%; padding: 12px; }
  .hdr { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
  .nav-grp { display: flex; align-items: center; gap: 6px; }
  .iconbtn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--stone-light); background: #fff; cursor: pointer; font-size: 18px; line-height: 1; color: var(--ink-2); }
  .today-btn { height: 32px; padding: 0 12px; border-radius: 8px; border: 1px solid var(--stone-light); background: #fff; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--ink-2); }
  .title { margin-left: 8px; font-size: 16px; font-weight: 600; }
  .actions { display: flex; align-items: center; gap: 10px; }
  .view-toggle { display: flex; border: 1px solid var(--stone-light); border-radius: 8px; overflow: hidden; }
  .view-btn { padding: 6px 12px; background: #fff; border: none; cursor: pointer; font-size: 13px; color: var(--ink-2); border-right: 1px solid var(--stone-light); }
  .view-btn:last-child { border: none; }
  .view-btn.active { background: var(--orchid); color: #fff; }
  .ws-toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--ink-2); }
  .new-btn { height: 32px; padding: 0 14px; border-radius: 8px; border: none; background: var(--orchid); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }
  .grid { display: flex; border: 1px solid var(--stone-light); border-radius: 8px; overflow: hidden; }
  .time-col { width: 56px; flex-shrink: 0; border-right: 1px solid var(--stone-light); }
  .day-col { flex: 1; min-width: 0; border-right: 1px solid var(--stone-light); position: relative; }
  .day-col:last-child { border-right: none; }
  .day-head { height: 52px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 1px solid var(--stone-light); background: var(--stone-soft); }
  .day-head.today { background: rgba(155,102,155,0.13); }
  .day-name { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--stone-deep); letter-spacing: 0.04em; }
  .day-num { font-size: 17px; font-weight: 600; }
  .day-grid, .time-grid { position: relative; height: 728px; /* 13h × 56px */ }
  .slot { height: 56px; border-bottom: 1px solid var(--stone-light); }
  .time-label { height: 56px; font-size: 11px; color: var(--stone-deep); text-align: right; padding: 2px 6px 0 0; }
  .blk { position: absolute; left: 3px; right: 3px; border-radius: 6px; padding: 4px 7px; color: #fff; font-size: 12px; line-height: 1.25; cursor: pointer; overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,0.15); }
  .blk-time { font-weight: 700; font-size: 11px; opacity: 0.95; }
  .blk-title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; padding: 10px 4px 0; font-size: 12px; color: var(--ink-3); }
  .legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
</style>
</head>
<body>
  <div class="shell">
    <div class="hdr">
      <div class="nav-grp">
        <button class="iconbtn">‹</button>
        <button class="today-btn">Today</button>
        <button class="iconbtn">›</button>
        <span class="title">18–24 May 2026</span>
      </div>
      <div class="actions">
        <div class="view-toggle">
          <button class="view-btn">Day</button>
          <button class="view-btn active">Week</button>
          <button class="view-btn">Month</button>
        </div>
        <label class="ws-toggle"><input type="checkbox" checked> Workshop time</label>
        <button class="new-btn">+ New visit</button>
      </div>
    </div>

    <div class="grid" id="grid"></div>
    <div class="legend">
      <span><span class="legend-dot" style="background:#3b82f6"></span>Design visit</span>
      <span><span class="legend-dot" style="background:#f59e0b"></span>Survey</span>
      <span><span class="legend-dot" style="background:#10b981"></span>Installation</span>
      <span><span class="legend-dot" style="background:#ef4444"></span>Remedial</span>
      <span><span class="legend-dot" style="background:#8b5cf6"></span>Workshop</span>
    </div>
  </div>

<script>
const TYPES = {
  design: '#3b82f6', survey: '#f59e0b', installation: '#10b981',
  remedial: '#ef4444', workshop: '#8b5cf6', other: '#6b7280'
};
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAY_NUMS = [18,19,20,21,22,23,24];
const TODAY_IDX = 0; // Monday is today
const HOUR_START = 7, HOUR_END = 20, HOUR_PX = 56;

// dayIdx, startHr, durHr, type, label
const VISITS = [
  [0,  9.0, 1.5, 'survey',      'Wilson · Survey'],
  [0, 11.0, 1.5, 'design',      'Patel · Design'],
  [0, 14.0, 3.0, 'workshop',    'Workshop · Henderson'],
  [1,  8.0, 9.0, 'installation','Henderson · Install'],
  [1, 18.0, 1.5, 'remedial',    'Carter · Remedial'],
  [2, 10.0, 1.5, 'design',      'Brown · Design'],
  [2, 13.0, 1.5, 'survey',      'Davis · Survey'],
  [2, 15.5, 2.0, 'workshop',    'Workshop · Patel'],
  [3,  9.5, 6.0, 'installation','Wilson · Install day 2'],
  [3, 16.5, 1.5, 'design',      'Singh · Design'],
  [4, 10.0, 1.5, 'survey',      'Khan · Survey'],
  [4, 14.0, 1.0, 'remedial',    'Brown · Remedial'],
  [4, 16.0, 2.5, 'workshop',    'Workshop · Singh'],
];

function render() {
  const grid = document.getElementById('grid');
  // time col
  let timeHtml = '<div class="day-head"></div><div class="time-grid">';
  for (let h = HOUR_START; h < HOUR_END; h++) timeHtml += `<div class="time-label">${h}:00</div>`;
  timeHtml += '</div>';
  grid.innerHTML = `<div class="time-col">${timeHtml}</div>`;

  // day cols
  DAYS.forEach((dn, di) => {
    const blocks = VISITS.filter(v => v[0] === di).map(([_, sh, dur, t, lbl]) => {
      const top = (sh - HOUR_START) * HOUR_PX;
      const h = Math.max(22, dur * HOUR_PX);
      const startStr = `${String(Math.floor(sh)).padStart(2,'0')}:${sh%1?'30':'00'}`;
      return `<div class="blk" style="top:${top}px;height:${h}px;background:${TYPES[t]}">
        <div class="blk-time">${startStr}</div><div class="blk-title">${lbl}</div></div>`;
    }).join('');
    const slots = Array.from({length: HOUR_END - HOUR_START}, () => '<div class="slot"></div>').join('');
    grid.innerHTML += `<div class="day-col">
      <div class="day-head${di === TODAY_IDX ? ' today' : ''}">
        <div class="day-name">${dn}</div><div class="day-num">${DAY_NUMS[di]}</div>
      </div>
      <div class="day-grid">${slots}${blocks}</div>
    </div>`;
  });
}
render();
</script>
</body>
</html>
