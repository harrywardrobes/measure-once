<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B · Day-grouped agenda</title>
<style>
  :root {
    --orchid: #9b669b; --orchid-deep: #7d4b7d;
    --ink-1: #1a1a1a; --ink-2: #404040; --ink-3: #737373;
    --stone-soft: #fafaf7; --stone-light: #e7e5e0; --stone-deep: #a8a29e;
  }
  * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  body { margin: 0; background: var(--stone-soft); color: var(--ink-1); font-size: 14px; }
  .shell { max-width: 100%; padding: 12px; }
  .hdr { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
  .nav-grp { display: flex; align-items: center; gap: 6px; }
  .iconbtn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--stone-light); background: #fff; cursor: pointer; font-size: 18px; line-height: 1; color: var(--ink-2); }
  .today-btn { height: 32px; padding: 0 12px; border-radius: 8px; border: 1px solid var(--stone-light); background: #fff; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--ink-2); }
  .title { margin-left: 8px; font-size: 16px; font-weight: 600; }
  .actions { display: flex; align-items: center; gap: 10px; }
  .view-toggle { display: flex; border: 1px solid var(--stone-light); border-radius: 8px; overflow: hidden; background: #fff; }
  .view-btn { padding: 6px 12px; background: #fff; border: none; cursor: pointer; font-size: 13px; color: var(--ink-2); border-right: 1px solid var(--stone-light); }
  .view-btn:last-child { border: none; }
  .view-btn.active { background: var(--orchid); color: #fff; }
  .ws-toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--ink-2); }
  .new-btn { height: 32px; padding: 0 14px; border-radius: 8px; border: none; background: var(--orchid); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }

  .day-card { background: #fff; border: 1px solid var(--stone-light); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .day-card-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--stone-light); }
  .day-card-today { border-color: var(--orchid); box-shadow: 0 0 0 1px var(--orchid); }
  .day-card-today .day-card-head { background: rgba(155,102,155,0.08); }
  .day-meta { display: flex; align-items: baseline; gap: 10px; }
  .day-meta-num { font-size: 22px; font-weight: 700; color: var(--ink-1); line-height: 1; }
  .day-meta-name { font-size: 13px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
  .day-meta-rel { font-size: 12px; color: var(--orchid); font-weight: 600; margin-left: 4px; }
  .day-count { font-size: 12px; color: var(--ink-3); background: var(--stone-soft); padding: 4px 10px; border-radius: 999px; font-weight: 500; }

  .mini-timeline { position: relative; height: 26px; margin: 12px 16px 0; border-radius: 6px; background: var(--stone-soft); overflow: hidden; }
  .mini-timeline::after { content: ''; position: absolute; left: 0; right: 0; top: 50%; height: 1px; background: var(--stone-light); }
  .mini-blk { position: absolute; top: 4px; bottom: 4px; border-radius: 4px; opacity: 0.85; }
  .mini-axis { display: flex; justify-content: space-between; padding: 2px 16px 0; font-size: 10px; color: var(--stone-deep); }

  .visit-list { padding: 8px 12px 14px; }
  .visit-row { display: flex; align-items: center; gap: 12px; padding: 10px 8px; border-radius: 8px; cursor: pointer; }
  .visit-row:hover { background: var(--stone-soft); }
  .visit-pill { width: 4px; align-self: stretch; border-radius: 2px; flex-shrink: 0; }
  .visit-time { font-variant-numeric: tabular-nums; font-weight: 600; font-size: 13px; color: var(--ink-1); min-width: 96px; }
  .visit-body { flex: 1; min-width: 0; }
  .visit-title { font-weight: 600; font-size: 14px; color: var(--ink-1); }
  .visit-meta { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
  .visit-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 999px; color: #fff; margin-right: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
  .empty-day { padding: 16px; text-align: center; color: var(--ink-3); font-size: 13px; font-style: italic; }
</style>
</head>
<body>
  <div class="shell">
    <div class="hdr">
      <div class="nav-grp">
        <button class="iconbtn">‹</button>
        <button class="today-btn">Today</button>
        <button class="iconbtn">›</button>
        <span class="title">This week · 18–24 May</span>
      </div>
      <div class="actions">
        <div class="view-toggle">
          <button class="view-btn">Day</button>
          <button class="view-btn active">Week</button>
          <button class="view-btn">Month</button>
        </div>
        <label class="ws-toggle"><input type="checkbox" checked> Workshop time</label>
        <button class="new-btn">+ New visit</button>
      </div>
    </div>

    <div id="days"></div>
  </div>

<script>
const TYPES = {
  design:       { color:'#3b82f6', label:'Design' },
  survey:       { color:'#f59e0b', label:'Survey' },
  installation: { color:'#10b981', label:'Install' },
  remedial:     { color:'#ef4444', label:'Remedial' },
  workshop:     { color:'#8b5cf6', label:'Workshop' },
};
const HOUR_START = 7, HOUR_END = 20;

const DAY_DATA = [
  { name:'Mon', num:18, rel:'Today', visits:[
    { sh:9.0,  dur:1.5, type:'survey',      cust:'James Wilson',     loc:'Putney',     notes:'Initial kitchen survey' },
    { sh:11.0, dur:1.5, type:'design',      cust:'Priya Patel',      loc:'Showroom',   notes:'Walk-through of plan v2' },
    { sh:14.0, dur:3.0, type:'workshop',    cust:'Henderson job',    loc:'Workshop',   notes:'Cabinet prep · 5 carcasses' },
  ]},
  { name:'Tue', num:19, rel:'',      visits:[
    { sh:8.0,  dur:9.0, type:'installation',cust:'Henderson family', loc:'Wandsworth', notes:'Day 1 of 3 · full install' },
    { sh:18.0, dur:1.5, type:'remedial',    cust:'Mark Carter',      loc:'Balham',     notes:'Drawer adjustment' },
  ]},
  { name:'Wed', num:20, rel:'',      visits:[
    { sh:10.0, dur:1.5, type:'design',      cust:'Brown household',  loc:'Showroom',   notes:'First design meeting' },
    { sh:13.0, dur:1.5, type:'survey',      cust:'Sarah Davis',      loc:'Clapham',    notes:'' },
    { sh:15.5, dur:2.0, type:'workshop',    cust:'Patel job',        loc:'Workshop',   notes:'Door spraying' },
  ]},
  { name:'Thu', num:21, rel:'',      visits:[
    { sh:9.5,  dur:6.0, type:'installation',cust:'James Wilson',     loc:'Putney',     notes:'Day 2 install · finish trim' },
    { sh:16.5, dur:1.5, type:'design',      cust:'Amar Singh',       loc:'Showroom',   notes:'Final sign-off' },
  ]},
  { name:'Fri', num:22, rel:'',      visits:[
    { sh:10.0, dur:1.5, type:'survey',      cust:'Khan family',      loc:'Tooting',    notes:'New utility room' },
    { sh:14.0, dur:1.0, type:'remedial',    cust:'Brown household',  loc:'Clapham',    notes:'Hinge replacement' },
    { sh:16.0, dur:2.5, type:'workshop',    cust:'Singh job',        loc:'Workshop',   notes:'Worktop templating' },
  ]},
  { name:'Sat', num:23, rel:'',      visits:[] },
  { name:'Sun', num:24, rel:'',      visits:[] },
];

function fmtTime(t) {
  const h = Math.floor(t), m = Math.round((t-h)*60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function render() {
  const out = document.getElementById('days');
  out.innerHTML = DAY_DATA.map(d => {
    const isToday = d.rel === 'Today';
    if (d.visits.length === 0) {
      return `<div class="day-card${isToday?' day-card-today':''}">
        <div class="day-card-head">
          <div class="day-meta">
            <span class="day-meta-num">${d.num}</span>
            <span class="day-meta-name">${d.name}${d.rel?` <span class="day-meta-rel">· ${d.rel}</span>`:''}</span>
          </div>
        </div>
        <div class="empty-day">No visits scheduled</div>
      </div>`;
    }
    const span = HOUR_END - HOUR_START;
    const mini = d.visits.map(v => {
      const left = ((v.sh - HOUR_START) / span) * 100;
      const width = (v.dur / span) * 100;
      return `<div class="mini-blk" style="left:${left}%;width:${width}%;background:${TYPES[v.type].color}"></div>`;
    }).join('');
    const rows = d.visits.map(v => {
      const meta = TYPES[v.type];
      const end = fmtTime(v.sh + v.dur);
      return `<div class="visit-row">
        <div class="visit-pill" style="background:${meta.color}"></div>
        <div class="visit-time">${fmtTime(v.sh)} – ${end}</div>
        <div class="visit-body">
          <div class="visit-title"><span class="visit-tag" style="background:${meta.color}">${meta.label}</span>${v.cust}</div>
          <div class="visit-meta">${v.loc}${v.notes?` · ${v.notes}`:''}</div>
        </div>
      </div>`;
    }).join('');
    return `<div class="day-card${isToday?' day-card-today':''}">
      <div class="day-card-head">
        <div class="day-meta">
          <span class="day-meta-num">${d.num}</span>
          <span class="day-meta-name">${d.name}${d.rel?` <span class="day-meta-rel">· ${d.rel}</span>`:''}</span>
        </div>
        <span class="day-count">${d.visits.length} visit${d.visits.length>1?'s':''}</span>
      </div>
      <div class="mini-timeline">${mini}</div>
      <div class="mini-axis"><span>${HOUR_START}:00</span><span>13:00</span><span>${HOUR_END}:00</span></div>
      <div class="visit-list">${rows}</div>
    </div>`;
  }).join('');
}
render();
</script>
</body>
</html>
