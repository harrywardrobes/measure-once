<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#200842">
  <meta name="color-scheme" content="light">
  <title>Home · Measure Once</title>
  <link rel="stylesheet" href="/tailwind.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div id="tab-home" class="home-tab">
    <div id="home-view" class="home-inner"></div>
  </div>

  <script src="/chrome.js"></script>
  <script src="/core.js"></script>
  <script src="/workflow-core.js"></script>
  <script src="/invoices-core.js"></script>
  <script src="/home.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!await bootstrap()) return;
      // Home needs personal tasks and upcoming calendar events for its cards.
      try {
        const [tasks, cal] = await Promise.all([
          GET('/api/personal-tasks').catch(() => []),
          GET('/api/calendar/upcoming').catch(() => ({ events: [], connected: false })),
        ]);
        state.personalTasks    = tasks || [];
        state.calendarEvents   = cal.events || [];
        state.calendarConnected = !!cal.connected;
      } catch {}
      renderHomeTab();
    });
  </script>
</body>
</html>
