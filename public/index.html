<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#200842">
  <meta name="color-scheme" content="light">
  <title>Home · Measure Once</title>
  <link rel="stylesheet" href="/tailwind.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div id="tab-home" class="home-tab">
    <div id="home-view" class="home-inner"></div>
  </div>

  <script src="/chrome.js"></script>
  <script src="/components.js"></script>
  <script type="module" src="/react/main.js"></script>
  <script src="/command-palette.js"></script>
  <script src="/core.js"></script>
  <script src="/workflow-core.js"></script>
  <script src="/invoices-core.js"></script>
  <script src="/home.js"></script>
  <script>
    async function loadCalendarForHome() {
      state.calendarError = false;
      state.calendarLoading = true;
      state.calendarErrorCode = null;
      renderHomeTab();
      try {
        const cal = await GET('/api/calendar/upcoming');
        if (cal && cal.error) {
          state.calendarError     = true;
          state.calendarErrorCode = cal.code || 'GOOGLE_ERROR';
          state.calendarConnected = !!(cal && cal.connected);
          state.calendarEvents    = [];
        } else {
          state.calendarError     = false;
          state.calendarErrorCode = null;
          state.calendarEvents    = (cal && cal.events) || [];
          state.calendarConnected = !!(cal && cal.connected);
        }
      } catch {
        state.calendarError     = true;
        state.calendarErrorCode = 'GOOGLE_ERROR';
        state.calendarConnected = false;
        state.calendarEvents    = [];
      }
      state.calendarLoading = false;
      renderHomeTab();
    }

    document.addEventListener('DOMContentLoaded', async () => {
      // Show skeleton immediately while data loads.
      state.homeLoading = true;
      renderHomeTab();

      if (!await bootstrap()) return;
      // Home needs personal tasks and upcoming calendar events for its cards.
      const [tasks, cal] = await Promise.all([
        GET('/api/personal-tasks').catch(() => []),
        GET('/api/calendar/upcoming').catch(e => ({ _error: true, errorMsg: e.message })),
      ]);
      state.personalTasks = tasks || [];
      if (cal && (cal._error || cal.error)) {
        state.calendarError     = true;
        state.calendarErrorCode = cal._error ? 'GOOGLE_ERROR' : (cal.code || 'GOOGLE_ERROR');
        state.calendarConnected = !!(cal && cal.connected);
        state.calendarEvents    = [];
      } else {
        state.calendarError     = false;
        state.calendarErrorCode = null;
        state.calendarEvents    = (cal && cal.events) || [];
        state.calendarConnected = !!(cal && cal.connected);
      }
      state.homeLoading = false;
      renderHomeTab();
    });
  </script>
</body>
</html>
