  const DV_HANDLE_STYLES = ['Cup', 'Bar', 'Knob', 'Pull', 'Finger Pull', 'Other'];

  async function openDvItemEditor(type, existingId) {
    let item = null;
    if (existingId) {
      try {
        const listUrl = {
          handle:      '/api/admin/design-visit-handles',
          furniture:   '/api/admin/design-visit-furniture-ranges',
          'door-style': '/api/admin/design-visit-door-styles',
        }[type];
        const list = await api('GET', listUrl);
        item = list.find(x => x.id === existingId) || null;
      } catch {}
    }
    const typeLabels = {
      handle:      'Handle', furniture: 'Furniture Range', 'door-style': 'Door Style',
    };
    const hasDescription = (type === 'furniture');
    const hasStyleSelect = (type === 'handle');
    const hasImageUrl    = (type !== 'furniture');
    const wrap = document.createElement('div');
    wrap.className = 'js-modal-scrim js-modal-scrim--below';
    wrap.innerHTML = `
      <div style="background:#fff;border-radius:12px;padding:22px 24px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.25);">
        <h3 style="margin:0 0 16px;font-size:1rem;font-weight:700;">${item ? 'Edit' : 'Add'} ${esc(typeLabels[type])}</h3>
        <label style="display:block;font-size:.78rem;color:#4b5563;margin:0 0 4px;font-weight:600;">Name <span style="color:#991b1b;">*</span></label>
        <input id="dvie-name" type="text" class="field" maxlength="200" value="${esc(item?.name || '')}" style="font-size:.88rem;">
        ${hasStyleSelect ? `
          <label style="display:block;font-size:.78rem;color:#4b5563;margin:10px 0 4px;font-weight:600;">Style${item ? '' : ' <span style="color:#991b1b;">*</span>'}</label>
          <select id="dvie-style" class="field" style="font-size:.85rem;">
            <option value="">— select —</option>
            ${DV_HANDLE_STYLES.map(s => `<option value="${esc(s)}"${item?.style === s ? ' selected' : ''}>${esc(s)}</option>`).join('')}
          </select>
        ` : ''}
        ${hasDescription ? `
          <label style="display:block;font-size:.78rem;color:#4b5563;margin:10px 0 4px;font-weight:600;">Description</label>
          <textarea id="dvie-desc" class="field" rows="2" maxlength="500" style="font-size:.85rem;resize:vertical;">${esc(item?.description || '')}</textarea>
        ` : ''}
        ${hasImageUrl ? `
          <label style="display:block;font-size:.78rem;color:#4b5563;margin:10px 0 4px;font-weight:600;">Image${type === 'handle' ? '' : ' URL'}</label>
          ${type === 'handle' ? `
            <div id="dvie-img-preview-wrap" style="margin-bottom:6px;${item?.image_url ? '' : 'display:none;'}">
              <img id="dvie-img-preview" src="${esc(item?.image_url || '')}" alt="Current image"
                style="max-height:80px;max-width:160px;border-radius:6px;border:1px solid var(--border);object-fit:contain;">
            </div>
            <input id="dvie-img-file" type="file" accept="image/*" class="field" style="font-size:.85rem;padding:4px;">
          ` : `
            <input id="dvie-img" type="url" class="field" maxlength="500" value="${esc(item?.image_url || '')}" placeholder="https://…" style="font-size:.85rem;">
          `}
        ` : ''}
        <div id="dvie-err" style="color:#b91c1c;font-size:.82rem;margin-top:8px;min-height:16px;"></div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;">
          <button class="btn btn-ghost" id="dvie-cancel">Cancel</button>
          <button class="btn btn-primary" id="dvie-save">${item ? 'Save' : 'Add'}</button>
        </div>
      </div>`;
    document.body.appendChild(wrap);
    wrap.addEventListener('click', e => { if (e.target === wrap) wrap.remove(); });
    wrap.querySelector('#dvie-cancel').addEventListener('click', () => wrap.remove());

    // Live preview for handle file upload
    if (type === 'handle') {
      const fileInput = wrap.querySelector('#dvie-img-file');
      if (fileInput) {
        fileInput.addEventListener('change', () => {
          const f = fileInput.files[0];
          if (!f) return;
          const previewWrap = wrap.querySelector('#dvie-img-preview-wrap');
          const previewImg  = wrap.querySelector('#dvie-img-preview');
          const url = URL.createObjectURL(f);
          previewImg.src = url;
          previewWrap.style.display = '';
        });
      }
    }

    wrap.querySelector('#dvie-save').addEventListener('click', async () => {
      const errEl   = wrap.querySelector('#dvie-err');
      const saveBtn = wrap.querySelector('#dvie-save');
      const origLabel = saveBtn.textContent;
      errEl.textContent = '';

      const name = wrap.querySelector('#dvie-name').value.trim();
      if (!name) { errEl.textContent = 'Name is required.'; return; }

      const styleValue = hasStyleSelect ? (wrap.querySelector('#dvie-style').value || '') : '';
      if (hasStyleSelect && !item && !styleValue) {
        errEl.textContent = 'Style is required.';
        return;
      }

      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving…';

      const payload = { name };
      if (hasStyleSelect) payload.style = styleValue || null;
      if (hasDescription) payload.description = wrap.querySelector('#dvie-desc').value;

      const postUrl = {
        handle:      '/api/admin/design-visit-handles',
        furniture:   '/api/admin/design-visit-furniture-ranges',
        'door-style': '/api/admin/design-visit-door-styles',
      }[type];

      try {
        let savedId = item?.id;
        if (item) {
          if (type !== 'handle') payload.image_url = wrap.querySelector('#dvie-img')?.value || '';
          await api('PATCH', `${postUrl}/${item.id}`, payload);
          toast('Saved.');
        } else {
          if (type !== 'handle') payload.image_url = wrap.querySelector('#dvie-img')?.value || '';
          const created = await api('POST', postUrl, payload);
          savedId = created.id;
          toast('Added.');
        }

        // Upload image file for handles
        if (type === 'handle' && savedId) {
          const fileInput = wrap.querySelector('#dvie-img-file');
          if (fileInput && fileInput.files[0]) {
            const fd = new FormData();
            fd.append('image', fileInput.files[0]);
            const uploadRes = await fetch(`/api/admin/dv-handles/${savedId}/image`, {
              method: 'POST',
              body: fd,
            });
            if (!uploadRes.ok) {
              const err = await uploadRes.json().catch(() => ({}));
              errEl.textContent = 'Image upload failed: ' + (err.error || uploadRes.status);
              saveBtn.disabled = false;
              saveBtn.textContent = origLabel;
              // Item was saved; refresh list but keep modal open for retry
              _broadcastDvCatalogueChange(type);
              loadDvHandles();
              return;
            }
          }
        }

        _broadcastDvCatalogueChange(type);
        wrap.remove();
        if (type === 'handle')      loadDvHandles();
        if (type === 'furniture')   loadDvFurniture();
        if (type === 'door-style')  loadDvDoorStyles();
      } catch (e) {
        errEl.textContent = e.message || 'Save failed.';
        saveBtn.disabled = false;
        saveBtn.textContent = origLabel;
      }
    });
  }
  window.openDvItemEditor = openDvItemEditor;

  // ── T&C version history ───────────────────────────────────────────────────
  async function loadDvTerms() {
    const currentEl = document.getElementById('dv-terms-current');
    const historyEl = document.getElementById('dv-terms-history');
    if (!currentEl) return;
    try {
      const versions = await api('GET', '/api/admin/terms-conditions/versions');
      if (!versions.length) {
        currentEl.innerHTML = `<p style="font-size:.82rem;color:var(--ink-4);font-style:italic;">No terms published yet. Click "Publish new version" to add the first version.</p>`;
        if (historyEl) historyEl.innerHTML = '';
        return;
      }
      const latest = versions[0];
      const fmtDate = d => new Date(d).toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' });
      // Current version display
      currentEl.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          <span style="display:inline-block;padding:2px 10px;border-radius:var(--radius-pill);background:var(--plum);color:#fff;font-size:.72rem;font-weight:700;">v${latest.version_number} (current)</span>
          <span style="font-size:.78rem;color:var(--ink-4);">Published ${fmtDate(latest.created_at)} by ${esc(latest.created_by || '—')}</span>
        </div>
        <div style="background:#fff;border:1px solid var(--stone);border-radius:var(--radius-sm);padding:10px 12px;font-size:.82rem;color:var(--ink-2);white-space:pre-line;max-height:140px;overflow-y:auto;line-height:1.6;">${esc(latest.terms_text) || '<em style="color:var(--ink-4)">Empty</em>'}</div>`;
      // Version history (all versions except current)
      if (historyEl) {
        const older = versions.slice(1);
        if (!older.length) { historyEl.innerHTML = ''; return; }
        historyEl.innerHTML = `
          <details style="margin-top:10px;">
            <summary style="font-size:.78rem;font-weight:600;color:var(--ink-3);cursor:pointer;">Version history (${older.length} older revision${older.length > 1 ? 's' : ''})</summary>
            <div style="margin-top:10px;display:flex;flex-direction:column;gap:10px;">
              ${older.map(v => `
                <details style="border:1px solid var(--stone);border-radius:var(--radius-sm);padding:8px 12px;">
                  <summary style="cursor:pointer;display:flex;align-items:center;gap:10px;list-style:none;">
                    <span style="font-size:.72rem;font-weight:700;padding:1px 8px;border-radius:var(--radius-pill);background:var(--stone);color:var(--ink-2);">v${v.version_number}</span>
                    <span style="font-size:.78rem;color:var(--ink-4);">${fmtDate(v.created_at)} · ${esc(v.created_by || '—')}</span>
                  </summary>
                  <div style="margin-top:8px;font-size:.8rem;color:var(--ink-2);white-space:pre-line;max-height:120px;overflow-y:auto;line-height:1.6;">${esc(v.terms_text)}</div>
                </details>`).join('')}
            </div>
          </details>`;
      }
    } catch (e) {
      if (currentEl) currentEl.innerHTML = `<p style="font-size:.82rem;color:#991b1b;">Could not load terms versions: ${esc(e.message)}</p>`;
    }
  }

  window.closeDvTermsEditor = closeDvTermsEditor;

  async function publishDvTermsVersion() {
    const textarea = document.getElementById('dv-terms-new-text');
    const errEl = document.getElementById('dv-terms-publish-err');
    if (!textarea) return;
    const text = textarea.value.trim();
    if (!text) {
      if (errEl) { errEl.textContent = 'Terms text cannot be empty.'; errEl.style.display = ''; }
      return;
    }
    try {
      await api('POST', '/api/admin/terms-conditions/versions', { terms_text: text });
      closeDvTermsEditor();
      toast('New terms version published.');
      await loadDvTerms();
    } catch (e) {
      if (errEl) { errEl.textContent = e.message || 'Publish failed.'; errEl.style.display = ''; }
    }
  }
  window.publishDvTermsVersion = publishDvTermsVersion;

  // ── Search Settings tab ──────────────────────────────────────────────────────
  const SEARCH_ACTIONS_META = [
    { id: 'new-customer',     label: 'New customer',             category: 'Action',   hint: 'Create a new customer record' },
    { id: 'go-customers',     label: 'All customers',            category: 'Navigate', hint: 'Browse your customer list' },
    { id: 'go-home',          label: 'Home dashboard',           category: 'Navigate', hint: 'Go to the main dashboard' },
    { id: 'go-sales',         label: 'Sales board',              category: 'Navigate', hint: 'Manage leads and open deals' },
    { id: 'go-survey',        label: 'Survey pipeline',          category: 'Navigate', hint: 'Track survey and design visit stages' },
    { id: 'go-projects',      label: 'Projects tracker',         category: 'Navigate', hint: 'Active workshop and delivery jobs' },
    { id: 'go-calendar',      label: 'Calendar',                 category: 'Navigate', hint: 'Appointments and scheduled visits' },
    { id: 'go-invoices',      label: 'Invoices & payments',      category: 'Navigate', hint: 'View and send invoices via QuickBooks' },
    { id: 'go-trades',        label: 'Trade contacts',           category: 'Navigate', hint: 'Suppliers and contractor directory' },
    { id: 'go-ideas',         label: 'Ideas board',              category: 'Navigate', hint: 'Capture and review design ideas' },
    { id: 'go-admin',         label: 'Admin panel',              category: 'Navigate', hint: 'Manage users and team access' },
    { id: 'go-profile',       label: 'Your profile',             category: 'Account',  hint: 'Update your account details' },
    { id: 'filter-sales',     label: 'Customers · Sales stage',  category: 'Filter',   hint: 'Show only customers in the Sales stage' },
    { id: 'filter-workshop',  label: 'Customers · Workshop',     category: 'Filter',   hint: 'Show only customers in Workshop' },
    { id: 'sign-out',         label: 'Sign out',                 category: 'Account',  hint: 'End your current session' },
  ];

  let _ssLoaded = false;
  let _ssDisabled = new Set();
  let _ssOrder = [];
  let _ssDragSrc = null;

  async function loadSearchSettings() {
    if (_ssLoaded) return;
    const listEl = document.getElementById('ss-actions-list');
    const phEl   = document.getElementById('ss-hint-placeholder');
    if (!listEl) return;
    try {
      const data = await api('GET', '/api/admin/search-settings');
      _ssDisabled = new Set(data.disabled_actions || []);
      _ssOrder = (data.action_order && data.action_order.length)
        ? data.action_order
        : SEARCH_ACTIONS_META.map(a => a.id);
      if (phEl) phEl.value = data.hint_placeholder || '';
      _ssLoaded = true;
      renderSearchActionsList();
    } catch (e) {
      if (listEl) listEl.innerHTML = `<p style="color:#991b1b;font-size:.82rem;">Could not load: ${esc(e.message)}</p>`;
    }
  }

  function _ssGetOrdered() {
    const mapped = _ssOrder.map(id => SEARCH_ACTIONS_META.find(a => a.id === id)).filter(Boolean);
    const extra  = SEARCH_ACTIONS_META.filter(a => !_ssOrder.includes(a.id));
    return [...mapped, ...extra];
  }

  function renderSearchActionsList() {
    const el = document.getElementById('ss-actions-list');
    if (!el) return;
    el.innerHTML = _ssGetOrdered().map(a => {
      const on = !_ssDisabled.has(a.id);
      return `<div class="ss-action-row${on ? '' : ' ss-action-disabled'}" draggable="true" data-id="${esc(a.id)}"
        ondragstart="_ssDragStart(event,'${esc(a.id)}')" ondragover="_ssDragOver(event)"
        ondrop="_ssDrop(event,'${esc(a.id)}')" ondragleave="_ssDragLeave(event)" ondragend="_ssDragEnd()">
        <span class="ss-drag-handle" title="Drag to reorder">⠿</span>
        <label class="ss-toggle" title="${on ? 'Disable' : 'Enable'}">
          <input type="checkbox" ${on ? 'checked' : ''} onchange="_ssToggle('${esc(a.id)}',this.checked)">
          <span class="ss-toggle-track"></span>
        </label>
        <span class="ss-action-label">${esc(a.label)}</span>
        <span class="ss-action-category">${esc(a.category)}</span>
        <span class="ss-action-hint">${esc(a.hint)}</span>
      </div>`;
    }).join('');
  }

  function _ssToggle(id, checked) {
    if (checked) _ssDisabled.delete(id); else _ssDisabled.add(id);
    const row = document.querySelector(`.ss-action-row[data-id="${id}"]`);
    if (row) row.classList.toggle('ss-action-disabled', !checked);
  }

  function _ssDragStart(e, id) {
    _ssDragSrc = id;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => { const r = document.querySelector(`.ss-action-row[data-id="${id}"]`); if (r) r.classList.add('ss-dragging'); }, 0);
  }
  function _ssDragOver(e) {
    e.preventDefault(); e.dataTransfer.dropEffect = 'move';
    const row = e.target.closest('.ss-action-row');
    if (row && row.dataset.id !== _ssDragSrc) row.classList.add('ss-drag-over');
    return false;
  }
  function _ssDragLeave(e) {
    const row = e.target.closest('.ss-action-row');
    if (row) row.classList.remove('ss-drag-over');
  }
  function _ssDrop(e, id) {
    e.preventDefault();
    document.querySelectorAll('.ss-action-row').forEach(r => r.classList.remove('ss-drag-over'));
    if (_ssDragSrc === id) return;
    const ordered = _ssGetOrdered().map(a => a.id);
    const fi = ordered.indexOf(_ssDragSrc), ti = ordered.indexOf(id);
    if (fi === -1 || ti === -1) return;
    ordered.splice(fi, 1);
    ordered.splice(ti, 0, _ssDragSrc);
    _ssOrder = ordered;
    renderSearchActionsList();
  }
  function _ssDragEnd() {
    _ssDragSrc = null;
    document.querySelectorAll('.ss-action-row').forEach(r => r.classList.remove('ss-dragging', 'ss-drag-over'));
  }

  async function saveSearchSettings() {
    const btn      = document.querySelector('[onclick="saveSearchSettings()"]');
    const phEl     = document.getElementById('ss-hint-placeholder');
    const statusEl = document.getElementById('ss-save-status');
    if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
    try {
      await api('PUT', '/api/admin/search-settings', {
        disabled_actions: Array.from(_ssDisabled),
        hint_placeholder: phEl ? phEl.value.trim() : '',
        action_order:     _ssGetOrdered().map(a => a.id),
      });
      if (statusEl) {
        statusEl.textContent = 'Saved ✓';
        statusEl.style.color = '#166534';
        setTimeout(() => { statusEl.textContent = ''; }, 2500);
      }
    } catch (e) {
      if (statusEl) { statusEl.textContent = 'Save failed: ' + e.message; statusEl.style.color = '#991b1b'; }
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = 'Save'; }
    }
  }

  // ── Workshop Settings tab ────────────────────────────────────────────────────
  let _workshopLoaded = false;
  let _workshopData   = [];

  async function loadWorkshopSettings() {
    if (_workshopLoaded) return;
    const wrap = document.getElementById('workshop-settings-wrap');
    if (!wrap) return;
    try {
      _workshopData   = await api('GET', '/api/admin/workshop-settings');
      _workshopLoaded = true;
      renderWorkshopSettings();
    } catch (e) {
      if (wrap) wrap.innerHTML = `<p style="color:#991b1b;font-size:.82rem;">Could not load: ${esc(e.message)}</p>`;
    }
  }

  function renderWorkshopSettings() {
    const wrap = document.getElementById('workshop-settings-wrap');
    if (!wrap) return;
    if (!_workshopData.length) {
      wrap.innerHTML = `<p style="color:var(--ink-4);font-size:.82rem;font-style:italic;">No settings found.</p>`;
      return;
    }
    wrap.innerHTML = _workshopData.map(row => {
      const updatedBy = row.updated_by ? ` · last updated by ${esc(row.updated_by)}` : '';
      const updatedAt = row.updated_at
        ? ` on ${new Date(row.updated_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}`
        : '';
      return `
        <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--stone-soft);" data-ws-key="${esc(row.key)}">
          <div style="flex:1;">
            <div style="font-weight:600;font-size:.875rem;color:var(--ink-1);">${esc(row.label)}</div>
            <div style="font-size:.72rem;color:var(--ink-4);margin-top:2px;">key: <code>${esc(row.key)}</code>${updatedAt}${updatedBy}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
            <input type="number" min="0" step="1" class="field ws-value-input"
              data-key="${esc(row.key)}"
              value="${esc(row.value)}"
              style="width:90px;text-align:right;"
              aria-label="${esc(row.label)} (days)">
            <span style="font-size:.82rem;color:var(--ink-3);white-space:nowrap;">days</span>
            <button class="btn btn-primary ws-save-btn"
              data-key="${esc(row.key)}"
              onclick="saveWorkshopSetting('${esc(row.key)}', this)"
              style="padding:5px 14px;font-size:.82rem;">Save</button>
          </div>
        </div>
      `;
    }).join('') + `<div style="height:4px;"></div>`;
  }

  async function saveWorkshopSetting(key, btn) {
    const input = document.querySelector(`.ws-value-input[data-key="${key}"]`);
    if (!input) return;
    const value = input.value.trim();
    if (value === '' || isNaN(Number(value)) || Number(value) < 0) {
      showToast('Please enter a valid number of days.', true);
      return;
    }
    const origText = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
      await api('PATCH', '/api/admin/workshop-settings', { key, value });
      const row = _workshopData.find(r => r.key === key);
      if (row) { row.value = value; row.updated_at = new Date().toISOString(); }
      showToast('Lead time saved.');
      _workshopLoaded = false;
      await loadWorkshopSettings();
    } catch (e) {
      showToast('Save failed: ' + e.message, true);
    } finally {
      btn.disabled = false;
      btn.textContent = origText;
    }
  }

  init();
</script>
</body>
</html>
