      title="Multiple handlers are bound to this slot — click to resolve"
      style="display:inline-flex;align-items:center;gap:3px;padding:1px 8px;margin-left:4px;
        background:#fef3c7;color:#92400e;border:1px solid #fbbf24;border-radius:999px;
        font-size:.7rem;font-weight:700;line-height:1.5;white-space:nowrap;
        vertical-align:middle;cursor:pointer;">
      ⚠ Fix
    </button>`;
    return badges + fixBtn;
  }

  function renderCardActionsTable() {
    const wrap = document.getElementById('card-actions-table-wrap');
    if (!wrap) return;
    const stages = _buildCardActionsModel();

    wrap.innerHTML = stages.map(stage => {
      const collapsed = _collapsedCardActionStages.has(stage.key);
      const bodyId    = `ca-stage-body-${esc(stage.key)}`;
      return `
      <section data-stage-section="${esc(stage.key)}" style="margin-bottom:22px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;">
        <button type="button" class="ca-stage-toggle" data-stage-toggle="${esc(stage.key)}"
          aria-expanded="${collapsed ? 'false' : 'true'}" aria-controls="${bodyId}"
          style="width:100%;display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--stone-soft);border:0;border-bottom:${collapsed ? '0' : '1px solid var(--border)'};font-weight:600;font-size:.85rem;color:var(--ink-2);cursor:pointer;text-align:left;font:inherit;">
          <span class="ca-stage-chevron" aria-hidden="true" style="display:inline-block;width:10px;transition:transform .15s ease;transform:rotate(${collapsed ? '-90deg' : '0deg'});">▾</span>
          <span style="font-weight:600;">${esc(stage.label)}</span>
        </button>
        <div id="${bodyId}" data-stage-body="${esc(stage.key)}"${collapsed ? ' hidden' : ''}>
        ${stage.statuses.length === 0 ? `
          <div style="padding:14px;font-size:.78rem;color:var(--ink-4);"><em>No lead statuses configured for this stage yet.</em></div>
        ` : stage.statuses.map(ls => `
          <div data-ls-block="${esc(ls.key)}" style="padding:12px 14px;border-bottom:1px solid var(--border);">
            <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:8px;">
              <strong style="font-size:.85rem;color:var(--ink-1);${ls.isNullRow ? 'font-style:italic;' : ''}">${esc(ls.label)}</strong>
              ${ls.isNullRow
                ? `<span style="font-size:.7rem;color:var(--ink-4);">contact has no <code>hs_lead_status</code></span>`
                : `<span style="font-family:monospace;font-size:.7rem;color:var(--ink-4);">${esc(ls.key)}</span>`}
            </div>

            <!-- Lead-status default row -->
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap;">
              <div style="flex:0 0 220px;font-size:.78rem;color:var(--ink-3);">Default action label</div>
              <input type="text" class="field ca-default-input" maxlength="128"
                data-kind="ls-default" data-stage="${esc(stage.key)}" data-status="${esc(ls.defaultStatusKey)}"
                data-original="${esc(ls.defaultLabel)}"
                value="${esc(ls.defaultLabel)}"
                placeholder="(used when no sub-status set)"
                style="flex:1;min-width:160px;padding:5px 8px;font-size:.82rem;"
                onkeydown="if(event.key==='Enter')this.blur()">
              ${_handlerBadgesHtml({ stage_key: stage.key, status_key: ls.defaultStatusKey })}
            </div>

            <!-- Sub-statuses -->
            <div data-sub-list="${esc(ls.key)}" style="margin-top:8px;">
              ${ls.substatuses.map((sub, i, arr) => _renderSubstatusRow(ls.key, sub, i, arr.length)).join('')}
            </div>

            <div style="margin-top:8px;">
              <button class="btn btn-ghost" style="padding:4px 10px;font-size:.74rem;"
                onclick="addCardActionSubstatus('${esc(ls.key)}')">+ Add sub-status</button>
            </div>
          </div>
        `).join('')}
        </div>
      </section>
    `;
    }).join('');

    if (!_cardActionsToggleBound) {
      wrap.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-stage-toggle]');
        if (!btn || !wrap.contains(btn)) return;
        const key = btn.dataset.stageToggle;
        if (_collapsedCardActionStages.has(key)) _collapsedCardActionStages.delete(key);
        else _collapsedCardActionStages.add(key);
        _applyCardActionStageCollapse(key);
      });
      _cardActionsToggleBound = true;
    }
  }

  function _applyCardActionStageCollapse(stageKey) {
    const wrap = document.getElementById('card-actions-table-wrap');
    if (!wrap) return;
    const btn  = wrap.querySelector(`[data-stage-toggle="${CSS.escape(stageKey)}"]`);
    const body = wrap.querySelector(`[data-stage-body="${CSS.escape(stageKey)}"]`);
    if (!btn || !body) return;
    const collapsed = _collapsedCardActionStages.has(stageKey);
    btn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
    btn.style.borderBottom = collapsed ? '0' : '1px solid var(--border)';
    const chev = btn.querySelector('.ca-stage-chevron');
    if (chev) chev.style.transform = `rotate(${collapsed ? '-90deg' : '0deg'})`;
    if (collapsed) body.setAttribute('hidden', '');
    else           body.removeAttribute('hidden');
  }

  function _renderSubstatusRow(lsKey, sub, idx, total) {
    // Existing row: data-sub-id is the DB id and inputs carry originals so Save
    // only PATCHes when something changed.
    const id           = sub.id;
    const subKey       = sub.substatus_key || '';
    const subLabel     = sub.label || '';
    const subAction    = sub.action_label || '';
    const isFirst      = idx === 0;
    const isLast       = idx === (total - 1);
    // Mirror the new-row layout from addCardActionSubstatus: when the LS has a
    // shorthand and this row's key starts with "{SHORTHAND}_", render the
    // prefix as a non-editable pill and put only the suffix inside the input.
    // data-orig-key still holds the full key so PATCH diffing is unchanged
    // (saveAllCardActionLabels rebuilds subKey = prefix + suffix on Save).
    const ls = (_leadStatusesData || []).find(s => s.key === lsKey);
    const sh = (ls && ls.shorthand) ? String(ls.shorthand).toUpperCase() : '';
    const prefix = (sh && subKey.toUpperCase().startsWith(`${sh}_`)) ? `${sh}_` : '';
    const suffix = prefix ? subKey.slice(prefix.length) : subKey;
    const prefixHtml = prefix
      ? `<span class="ca-sub-key-prefix"
            title="Lead-status shorthand (not editable)"
            style="flex:0 0 auto;padding:4px 0 4px 7px;font-size:.78rem;font-family:monospace;color:var(--ink-3);background:#f3f4f6;border:1px solid var(--border);border-right:none;border-radius:6px 0 0 6px;line-height:1.4;user-select:none;">${esc(prefix)}</span>`
      : '';
    const keyInputStyle = prefix
      ? 'flex:0 0 90px;padding:4px 7px;font-size:.78rem;font-family:monospace;text-transform:uppercase;border-radius:0 6px 6px 0;'
      : 'flex:0 0 140px;padding:4px 7px;font-size:.78rem;font-family:monospace;text-transform:uppercase;';
    return `
      <div class="ca-sub-row" data-sub-id="${esc(id)}" data-sub-ls="${esc(lsKey)}"
           data-orig-key="${esc(subKey)}" data-orig-label="${esc(subLabel)}" data-orig-action="${esc(subAction)}"
           style="display:flex;align-items:center;gap:8px;padding:5px 0;border-top:1px dashed var(--border);">
        <div style="flex:0 0 auto;display:flex;flex-direction:column;line-height:1;">
          <button class="btn btn-ghost" title="Move up" ${isFirst ? 'disabled' : ''}
            style="padding:0 5px;font-size:.7rem;line-height:1;${isFirst ? 'opacity:.3;' : ''}"
            onclick="moveCardActionSubstatus(${esc(id)}, 'up')">▲</button>
          <button class="btn btn-ghost" title="Move down" ${isLast ? 'disabled' : ''}
            style="padding:0 5px;font-size:.7rem;line-height:1;${isLast ? 'opacity:.3;' : ''}"
            onclick="moveCardActionSubstatus(${esc(id)}, 'down')">▼</button>
        </div>
        <div style="display:flex;align-items:stretch;flex:0 0 auto;">
          ${prefixHtml}
          <input type="text" class="field ca-sub-key" maxlength="64"
            data-key-prefix="${esc(prefix)}"
            value="${esc(suffix)}"
            placeholder="${prefix ? 'SUFFIX' : 'KEY'}"
            style="${keyInputStyle}">
        </div>
        <input type="text" class="field ca-sub-label" maxlength="128"
          value="${esc(subLabel)}"
          placeholder="Display label"
          style="flex:1;padding:4px 7px;font-size:.78rem;">
        <input type="text" class="field ca-sub-action" maxlength="128"
          value="${esc(subAction)}"
          placeholder="Action label"
          style="flex:1;padding:4px 7px;font-size:.78rem;">
        ${_handlerBadgesHtml({ substatus_id: id })}
      </div>`;
  }

  // Reorder a sub-status within its lead-status group. Mirrors moveLeadStatus:
  // swap sort_order with the adjacent sibling via two PATCH calls, then mutate
  // local data and re-render. Unsaved edits in other rows are lost on
  // re-render — accept this to match the lead-status pattern.
  async function moveCardActionSubstatus(id, direction) {
    const subId = Number(id);
    const me = _cardSubstatusesData.find(s => Number(s.id) === subId);
    if (!me) return;
    // Siblings = same status_key, sorted as they are rendered.
    const siblings = _cardSubstatusesData
      .filter(s => String(s.status_key) === String(me.status_key))
      .sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
    const idx     = siblings.findIndex(s => Number(s.id) === subId);
    const swapIdx = direction === 'up' ? idx - 1 : idx + 1;
    if (swapIdx < 0 || swapIdx >= siblings.length) return;
    const a = siblings[idx];
    const b = siblings[swapIdx];
    // If both sort_orders are equal (e.g. all 0 by default), assign a
    // sequence first so the swap actually changes order on reload.
    if ((a.sort_order || 0) === (b.sort_order || 0)) {
      siblings.forEach((s, i) => { s.sort_order = i; });
    }
    const aOrder = a.sort_order;
    const bOrder = b.sort_order;
    try {
      await Promise.all([
        api('PATCH', `/api/admin/lead-substatuses/${a.id}`, { sort_order: bOrder }),
        api('PATCH', `/api/admin/lead-substatuses/${b.id}`, { sort_order: aOrder }),
      ]);
      a.sort_order = bOrder;
      b.sort_order = aOrder;
      renderCardActionsTable();
    } catch (e) {
      toast(`Failed to reorder: ${e.message}`, true);
    }
  }

  // Append an empty sub-status row to the named lead status block. New rows
  // have data-sub-new="1" and no data-sub-id so Save knows to POST them.
  function addCardActionSubstatus(lsKey) {
    const list = document.querySelector(`[data-sub-list="${CSS.escape(lsKey)}"]`);
    if (!list) return;
    // If the surrounding stage is currently collapsed, expand it so the new
    // row is visible rather than appended into hidden DOM.
    const stageBody = list.closest('[data-stage-body]');
    if (stageBody) {
      const stageKey = stageBody.dataset.stageBody;
      if (_collapsedCardActionStages.has(stageKey)) {
        _collapsedCardActionStages.delete(stageKey);
        _applyCardActionStageCollapse(stageKey);
      }
    }
    _newSubstatusCounter++;
    // Render the LS shorthand as a non-editable prefix (e.g. "ATCT_") shown
    // immediately before the KEY input — visible context for the admin but
    // not deletable. The actual substatus_key is rebuilt at Save time by
    // concatenating data-key-prefix + the input value.
    // Falls back to no prefix if the LS has no shorthand yet.
    const ls = (_leadStatusesData || []).find(s => s.key === lsKey);
    const sh = (ls && ls.shorthand) ? String(ls.shorthand).toUpperCase() : '';
    const prefix = sh ? `${sh}_` : '';
    const prefixHtml = prefix
      ? `<span class="ca-sub-key-prefix"
            title="Lead-status shorthand (not editable)"
            style="flex:0 0 auto;padding:4px 0 4px 7px;font-size:.78rem;font-family:monospace;color:var(--ink-3);background:#f3f4f6;border:1px solid var(--border);border-right:none;border-radius:6px 0 0 6px;line-height:1.4;user-select:none;">${esc(prefix)}</span>`
      : '';
    const keyInputStyle = prefix
      ? 'flex:0 0 90px;padding:4px 7px;font-size:.78rem;font-family:monospace;text-transform:uppercase;border-radius:0 6px 6px 0;'
      : 'flex:0 0 140px;padding:4px 7px;font-size:.78rem;font-family:monospace;text-transform:uppercase;';
    const tmp = document.createElement('div');
    tmp.innerHTML = `
      <div class="ca-sub-row" data-sub-new="1" data-sub-ls="${esc(lsKey)}"
           data-orig-key="" data-orig-label="" data-orig-action=""
           style="display:flex;align-items:center;gap:8px;padding:5px 0;border-top:1px dashed var(--border);background:#fffbeb;">
        <div style="display:flex;align-items:stretch;flex:0 0 auto;">
          ${prefixHtml}
          <input type="text" class="field ca-sub-key" maxlength="64"
            data-key-prefix="${esc(prefix)}"
            placeholder="SUFFIX"
            style="${keyInputStyle}">
        </div>
        <input type="text" class="field ca-sub-label" maxlength="128"
          placeholder="Display label"
          style="flex:1;padding:4px 7px;font-size:.78rem;">
        <input type="text" class="field ca-sub-action" maxlength="128"
          placeholder="Action label"
          style="flex:1;padding:4px 7px;font-size:.78rem;">
      </div>`;
    list.appendChild(tmp.firstElementChild);
    const newRow = list.lastElementChild;
    const keyInput = newRow && newRow.querySelector('.ca-sub-key');
    if (keyInput) keyInput.focus();
  }

  // Save sweeps every dirty row, in order:
  //   1. stage-default + ls-default inputs → PUT /api/admin/stage-action-labels
  //   2. existing sub-status rows with changes → PATCH /api/admin/lead-substatuses/:id
  //   3. new sub-status rows → POST /api/admin/lead-substatuses
  // Deletion is intentionally not supported — admins must remove sub-statuses
  // in HubSpot, after which they stop appearing here on the next sync.
  async function saveAllCardActionLabels() {
    let saved = 0, failed = 0;
    const failures = [];

    // 1) Default labels (global "no status" + per-LS defaults).
    const defaultInputs = document.querySelectorAll('#card-actions-table-wrap .ca-default-input');
    console.log('[card-actions] save: found', defaultInputs.length, 'default inputs');
    for (const input of defaultInputs) {
      const value    = input.value.trim();
      const original = input.dataset.original || '';
      console.log('[card-actions] input', input.dataset.kind,
        'stage=', input.dataset.stage, 'status=', input.dataset.status,
        'value=', JSON.stringify(value), 'orig=', JSON.stringify(original),
        'changed=', value && value !== original);
      if (!value) {
        // Empty + had an original value → user wants to clear the action
        // label. PUT an empty label so the row stays in the table marked
        // as "explicitly cleared"; the client resolver uses presence-with-
        // empty-label to suppress the strip for that LS only (without
        // resurrecting the per-stage default fallback).
        if (original) {
          try {
            await api('PUT', '/api/admin/stage-action-labels', {
              stage_key: input.dataset.stage,
              status_key: input.dataset.status,
              label: '',
            });
            input.dataset.original = '';
            saved++;
          } catch (e) {
            console.warn('[card-actions] PUT empty failed', e);
            input.value = original;
            failed++;
            failures.push(`default (${input.dataset.stage}/${input.dataset.status || '—'}): ${e.message || 'error'}`);
          }
        }
        continue;
      }
      if (value === original) continue;

      // Per-lead-status default (includes the synthetic "No lead status" row
      // inside Sales, which uses data-stage="sales" data-status="").
      try {
        await api('PUT', '/api/admin/stage-action-labels', {
          stage_key: input.dataset.stage,
          status_key: input.dataset.status,
          label: value,
        });
        input.dataset.original = value;
        saved++;
      } catch (e) {
        input.value = original;
        failed++;
        failures.push(`default (${input.dataset.stage}/${input.dataset.status || '—'}): ${e.message || 'error'}`);
      }
    }

    // 2) + 3) Sub-status rows.
    const subRows = document.querySelectorAll('#card-actions-table-wrap .ca-sub-row');
    for (const row of subRows) {
      const isNew = !!row.dataset.subNew;
      const idStr = row.dataset.subId;
      const lsKey      = row.dataset.subLs;
      const keyInput   = row.querySelector('.ca-sub-key');
      const labelInput = row.querySelector('.ca-sub-label');
      const actInput   = row.querySelector('.ca-sub-action');
      // New rows split the key into a non-editable prefix span + suffix input;
      // rebuild the full substatus_key here. Existing rows have no data-key-prefix
      // and the input still holds the full key.
      const keyPrefix  = keyInput.dataset.keyPrefix || '';
      const keySuffix  = keyInput.value.trim().toUpperCase().replace(/[^A-Z0-9_]/g, '_');
      const subKey     = (keyPrefix + keySuffix).toUpperCase().replace(/[^A-Z0-9_]/g, '_');
      const label      = labelInput.value.trim();
      const action     = actInput.value.trim();

      if (isNew) {
        // Reject prefix-only keys ("ATCT_" alone is meaningless without a suffix).
        if (keyPrefix && !keySuffix) {
          if (label || action) {
            failed++;
            failures.push(`new sub-status (${lsKey}): type a suffix after ${keyPrefix}`);
          }
          continue;
        }
        if (!subKey || !label) {
          if (subKey || label || action) {
            failed++;
            failures.push(`new sub-status (${lsKey}): key and display label are required.`);
          }
          continue;
        }
        try {
          const created = await api('POST', '/api/admin/lead-substatuses', {
            status_key:    lsKey,
            substatus_key: subKey,
            label, action_label: action, sort_order: 0,
          });
          // Convert the row into a saved row in place.
          row.removeAttribute('data-sub-new');
          row.style.background = '';
          row.dataset.subId      = created.id;
          row.dataset.origKey    = created.substatus_key;
          row.dataset.origLabel  = created.label;
          row.dataset.origAction = created.action_label || '';
          // Input shows only the suffix when a prefix pill is present, so a
          // second Save doesn't re-concatenate the prefix and produce
          // ATCT_ATCT_FOO. The prefix pill + data-key-prefix stay intact.
          keyInput.value = keyPrefix && created.substatus_key.startsWith(keyPrefix)
            ? created.substatus_key.slice(keyPrefix.length)
            : created.substatus_key;
          saved++;
        } catch (e) {
          failed++;
          failures.push(`new sub-status (${lsKey}/${subKey}): ${e.message || 'error'}`);
        }
      } else {
        const origKey    = row.dataset.origKey    || '';
        const origLabel  = row.dataset.origLabel  || '';
        const origAction = row.dataset.origAction || '';
        const patch = {};
        if (subKey  !== origKey)    patch.substatus_key = subKey;
        if (label   !== origLabel)  patch.label         = label;
        if (action  !== origAction) patch.action_label  = action;
        if (!Object.keys(patch).length) continue;
        if (patch.label === '') { failed++; failures.push(`sub-status #${idStr}: label cannot be empty.`); continue; }
        try {
          const updated = await api('PATCH', `/api/admin/lead-substatuses/${idStr}`, patch);
          row.dataset.origKey    = updated.substatus_key;
          row.dataset.origLabel  = updated.label;
          row.dataset.origAction = updated.action_label || '';
          // Mirror the POST branch: strip the prefix from the visible value
          // so re-saving doesn't double-prefix.
          keyInput.value = keyPrefix && updated.substatus_key.startsWith(keyPrefix)
            ? updated.substatus_key.slice(keyPrefix.length)
            : updated.substatus_key;
          saved++;
        } catch (e) {
          failed++;
          failures.push(`sub-status #${idStr}: ${e.message || 'error'}`);
        }
      }
    }

    // 4) Persist DOM order per LS group. New rows POST with sort_order=0,
    // and admins may also have manually rearranged rows (future drag-drop).
    // For each LS group, walk rows in DOM order and PATCH any whose
    // sort_order differs from its DOM index. Rows that just got saved have
    // a fresh data-sub-id; rows that failed to save have no id and are
    // skipped (otherwise we'd 404 on PATCH).
    const groups = new Map(); // lsKey → [{id, idx}]
    const allRows = document.querySelectorAll('#card-actions-table-wrap .ca-sub-row');
    for (const row of allRows) {
      const ls = row.dataset.subLs;
      const id = row.dataset.subId ? Number(row.dataset.subId) : null;
      if (!ls || !id) continue;
      if (!groups.has(ls)) groups.set(ls, []);
      groups.get(ls).push(id);
    }
    for (const [, ids] of groups) {
      for (let i = 0; i < ids.length; i++) {
        const id = ids[i];
        const sub = _cardSubstatusesData.find(s => Number(s.id) === id);
        // If we don't know the current sort_order (e.g. just-created row
        // not yet reloaded), treat it as "needs update".
        const current = sub ? (sub.sort_order || 0) : -1;
        if (current === i) continue;
        try {
          await api('PATCH', `/api/admin/lead-substatuses/${id}`, { sort_order: i });
          if (sub) sub.sort_order = i;
          saved++;
        } catch (e) {
          failed++;
          failures.push(`reorder sub-status #${id}: ${e.message || 'error'}`);
        }
      }
    }

    if (saved === 0 && failed === 0) { toast('No changes to save.'); return; }
    if (failed) {
      console.warn('Card actions save: some changes failed', failures);
      toast(`Saved ${saved}, failed ${failed}.`, true);
    } else {
      toast(`${saved} change${saved !== 1 ? 's' : ''} saved.`);
    }

    _broadcastCardActionsChanged();
    try { new BroadcastChannel('lead_substatuses_changed').postMessage({ ts: Date.now() }); } catch (_) {}

    // Refresh in-memory copies so a follow-up Save doesn't re-send, then
    // re-render so newly-saved sub-status rows pick up the ↑/▼ arrow
    // controls (those are only rendered for rows that exist in
    // _cardSubstatusesData with a real id).
    try {
      const [labels, subs] = await Promise.all([
        api('GET', '/api/admin/stage-action-labels'),
        api('GET', '/api/admin/lead-substatuses'),
      ]);
      _cardActionsData     = Array.isArray(labels) ? labels : _cardActionsData;
      _cardSubstatusesData = Array.isArray(subs)   ? subs   : _cardSubstatusesData;
      renderCardActionsTable();
    } catch (_) {}
  }

  // Cross-tab sync: when the Lead Statuses panel is changed in another tab,
  // refresh the card action labels here so the order stays in lock-step.
  if (typeof BroadcastChannel !== 'undefined') {
    try {
      new BroadcastChannel('lead_statuses_changed').addEventListener('message', () => {
        if (_cardActionsEverLoaded) loadCardActionsAdmin();
      });
    } catch (_) {}
    // When handlers are added / edited / deleted (here or in another tab),
    // refresh _handlersData so the per-row badges in the labels table stay
    // in sync. loadCardActionHandlersAdmin() also re-renders the table.
    try {
      new BroadcastChannel('card_action_handlers_changed').addEventListener('message', () => {
        if (document.getElementById('card-action-handlers-wrap')) {
          loadCardActionHandlersAdmin();
        }
      });
    } catch (_) {}
  }

  // Expose handlers used from inline onclick handlers + the lead-status
  // notify hook.
  window.loadCardActionsAdmin       = loadCardActionsAdmin;
  window.saveAllCardActionLabels    = saveAllCardActionLabels;
  window.addCardActionSubstatus     = addCardActionSubstatus;
  window.moveCardActionSubstatus    = moveCardActionSubstatus;

  // ── Card Action Handlers ───────────────────────────────────────────────────
  let _handlersData     = [];
  let _handlersLoaded   = false;
  const HANDLER_TYPE_LABELS = {
    add_design_visit_to_calendar: 'Add design visit to calendar',
    summarise_phone_call:         'Summarise phone call',
    show_message:                 'Show informational message',
    start_design_visit:           'Start design visit wizard',
  };
  // Detailed, plain-English description of what each handler actually does at
  // run-time — shown on the row once an action is attached so admins can see
  // exactly which emails get sent, which calendars get amended, etc.
  const HANDLER_TYPE_DESCRIPTIONS = {
    add_design_visit_to_calendar:
      'Clicking the action on a Sales/Survey card opens a modal asking for ' +
      'visit date, time, duration, title and notes.\n' +
      '• On submit, a visit is created in this CRM (POST /api/visits) and ' +
      'appears in the "Upcoming visits" section of the customer page.\n' +
      '• If the operator ticks "Also add to my Google Calendar", a matching ' +
      'event is also created in their personal Google Calendar (POST ' +
      '/api/events) using their stored Google OAuth credentials. No email is ' +
      'sent by this app — Google Calendar may email invitees if attendees ' +
      'are added.\n' +
      '• No HubSpot record is changed by this action.',
    summarise_phone_call:
      'Clicking the action on a Sales/Survey card opens a modal with a ' +
      'textarea for raw call notes.\n' +
      '• On submit the notes are sent to POST ' +
      '/api/card-actions/phone-call-summary, which asks the LLM to produce ' +
      'a structured summary.\n' +
      '• The summary is saved as a timestamped note against the HubSpot ' +
      'contact (HubSpot Engagements API). No email or calendar event is ' +
      'created.',
    show_message:
      'Clicking the action on a Sales/Survey card opens a simple popup ' +
      'showing the message you write below. Nothing else happens — no API ' +
      'call, no email, no calendar event, no HubSpot or CRM record change. ' +
      'Use this when you just need to remind the operator what to do for ' +
      'this stage/lead-status (e.g. "Send the quote PDF from the shared ' +
      'drive and tick the next step manually.").',
    start_design_visit:
      'Clicking the action on a Sales/Survey card opens a full multi-step design visit wizard.\n' +
      '• Two-phase HubSpot status update: when the wizard opens the contact\'s lead status is set to the "In-progress" status (if configured); when the wizard is submitted it is set to the "Submitted" status (if configured).\n' +
      '• Step 1 — Visit details: date/time, designer name, handle selection, furniture range, T&C acceptance.\n' +
      '• Step 2 — Rooms: add/remove rooms with name, door style, dimensions (mm), unit count, unit price, notes, and optional photo upload.\n' +
      '• Step 3 — Review: read-only summary before submission.\n' +
      '• On submit: creates a design_visits DB record, updates HubSpot lead status to the configured submitted status, creates a HubSpot note, attempts a QuickBooks Estimate (non-fatal), generates a single-use sign-off token, emails the customer a "See Your Design & Sign Off" link, and notifies the admin team.',
  };

  async function loadCardActionHandlersAdmin() {
    const wrap = document.getElementById('card-action-handlers-wrap');
    if (!wrap) return;
    try {
      const [handlers, labels, subs, statuses] = await Promise.all([
        api('GET', '/api/admin/card-action-handlers'),
        _cardActionsData.length ? Promise.resolve(_cardActionsData) : api('GET', '/api/admin/stage-action-labels'),
        _cardSubstatusesData.length ? Promise.resolve(_cardSubstatusesData) : api('GET', '/api/admin/lead-substatuses'),
        _leadStatusesData.length ? Promise.resolve(_leadStatusesData) : api('GET', '/api/admin/lead-statuses'),
      ]);
      _handlersData = Array.isArray(handlers) ? handlers : [];
      if (Array.isArray(labels))   _cardActionsData    = labels;
      if (Array.isArray(subs))     _cardSubstatusesData = subs;
      if (Array.isArray(statuses)) _leadStatusesData    = statuses;
      _handlersLoaded = true;
      renderHandlersTable();
      // The labels table above shows a per-row badge for any attached
      // handler; re-render it now that we know the bindings.
      if (document.getElementById('card-actions-table-wrap')) {
        renderCardActionsTable();
      }
      refreshHandlerConflictsBanner();
    } catch (e) {
      wrap.innerHTML = `<p style="font-size:.82rem;color:#991b1b;">Could not load handlers: ${esc(e.message)}</p>`;
    }
  }
  window.loadCardActionHandlersAdmin = loadCardActionHandlersAdmin;

  // Surface server-side duplicate-handler-binding detection in the admin UI.
  // The server logs a warning on boot and exposes
  // GET /api/admin/card-action-handlers/conflicts; without this banner an
  // admin would only notice if they checked the server log or knew about the
  // endpoint. The banner re-renders after every save/delete (both call
  // loadCardActionHandlersAdmin), so it disappears as soon as the last
  // conflict is resolved. Admins can also dismiss it for the current page
  // load; a fresh conflict count re-shows it.
  let _conflictsBannerDismissedKey = '';
  async function refreshHandlerConflictsBanner() {
    const banner = document.getElementById('card-action-handlers-conflict-banner');
    if (!banner) return;
    let data;
    try {
      data = await api('GET', '/api/admin/card-action-handlers/conflicts');
    } catch (_) {
      // Non-fatal: if the endpoint fails we just hide the banner.
      banner.style.display = 'none';
      banner.innerHTML = '';
      return;
    }
    const conflicts = Array.isArray(data?.conflicts) ? data.conflicts : [];
    const total = Number(data?.total) || conflicts.length;
    if (!total) {
      banner.style.display = 'none';
      banner.innerHTML = '';
      _conflictsBannerDismissedKey = '';
      return;
    }
    // Build a stable key from the conflict set so a new conflict re-shows
    // the banner even if a previous one was dismissed.
    const key = conflicts.map(c =>
      c.substatus_id != null ? `s:${c.substatus_id}` : `l:${c.stage_key}/${c.status_key}`
    ).sort().join('|');
    if (_conflictsBannerDismissedKey === key) {
      banner.style.display = 'none';
      return;
    }
    const itemsHtml = conflicts.map((c, idx) => {
      let slotDesc;
      let args;
      if (c.substatus_id != null) {
        const sub = (_cardSubstatusesData || []).find(s => Number(s.id) === Number(c.substatus_id));
        slotDesc = sub
          ? `Sub-status “${esc(sub.label || sub.substatus_key)}”`
          : `Sub-status #${c.substatus_id}`;
        args = `null, null, ${Number(c.substatus_id)}`;
      } else {
        const ls = (_leadStatusesData || []).find(s => s.key === c.status_key);
        const lsLbl = ls ? (ls.label || ls.key) : c.status_key;
        slotDesc = `${esc(c.stage_key)} / ${esc(lsLbl)}`;
        args = `${JSON.stringify(String(c.stage_key || ''))}, ${JSON.stringify(String(c.status_key || ''))}, null`;
      }
      const names = Array.isArray(c.handler_names) ? c.handler_names.filter(Boolean) : [];
      const namesHtml = names.length
        ? ` — bound to <strong>${names.map(n => esc(n)).join('</strong>, <strong>')}</strong>`
        : '';
      return `
        <li style="display:flex;align-items:center;gap:10px;padding:6px 0;border-top:${idx === 0 ? '0' : '1px solid #fde68a'};">
          <div style="flex:1;min-width:0;font-size:.8rem;color:#78350f;line-height:1.45;">
            <strong>${slotDesc}</strong> has <strong>${Number(c.count) || names.length || 2} handlers</strong>${namesHtml}.
          </div>
          <button type="button" class="btn" data-cah-fix
            data-args="${esc(args)}"
            style="flex:0 0 auto;font-size:.78rem;padding:4px 12px;background:#d97706;color:#fff;border:none;border-radius:6px;cursor:pointer;white-space:nowrap;">
            Fix
          </button>
        </li>`;
    }).join('');
    banner.innerHTML = `
      <div style="border:1px solid #fbbf24;border-radius:10px;background:#fffbeb;padding:12px 14px;">
        <div style="display:flex;align-items:flex-start;gap:10px;">
          <div style="font-size:1.1rem;line-height:1.2;" aria-hidden="true">⚠️</div>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:700;font-size:.88rem;color:#92400e;">
              ${total === 1 ? '1 slot has' : `${total} slots have`} duplicate handler bindings
            </div>
            <div style="font-size:.78rem;color:#92400e;margin-top:2px;line-height:1.5;">
              Only one of the bound handlers will run when the action is clicked. Resolve each conflict by removing the extras.
            </div>
          </div>
          <button type="button" id="cah-conflict-banner-dismiss"
            aria-label="Dismiss"
            style="flex:0 0 auto;background:transparent;border:none;color:#92400e;font-size:1rem;line-height:1;cursor:pointer;padding:2px 6px;">
            ✕
          </button>
        </div>
        <ul style="list-style:none;margin:8px 0 0;padding:0;">${itemsHtml}</ul>
      </div>`;
    banner.style.display = '';
    banner.querySelectorAll('[data-cah-fix]').forEach(btn => {
      btn.addEventListener('click', () => {
        // data-args is a tiny, self-authored JSON-arg fragment. Build the
        // call from parsed values rather than eval-ing the string.
        const raw = btn.getAttribute('data-args') || '';
        // Format: '"stage", "status", null' OR 'null, null, 42'
        try {
          const parsed = JSON.parse('[' + raw + ']');
          openConflictResolver(parsed[0], parsed[1], parsed[2]);
        } catch (_) { /* ignore */ }
      });
    });
    banner.querySelector('#cah-conflict-banner-dismiss').addEventListener('click', () => {
      _conflictsBannerDismissedKey = key;
      banner.style.display = 'none';
    });
  }
  window.refreshHandlerConflictsBanner = refreshHandlerConflictsBanner;

  // Walk the same model the labels table renders, in the same order, and
  // emit one "action slot" per place that has a visible action label. Each
  // stage section in the output mirrors a stage section above (Sales →
  // Design Visit → Survey); within a stage, lead statuses appear in the
  // same order, with the LS default row first and its sub-statuses after.
  // Result shape: [{ stage:{key,label}, groups:[{ls:{key,label}, slots:[…]}] }]
  function _buildActionSlotGroups() {
    const stages = (typeof _buildCardActionsModel === 'function') ? _buildCardActionsModel() : [];
    const out = [];
    for (const stage of stages) {
      const groups = [];
      for (const ls of stage.statuses) {
        const slots = [];
        const dflt = (ls.defaultLabel || '').trim();
        if (dflt) {
          slots.push({
            kind:       'ls',
            stage_key:  stage.key,
            status_key: ls.defaultStatusKey || '',
            label:      dflt,
            rowLabel:   'Default action',
          });
        }
        for (const sub of ls.substatuses || []) {
          const action = (sub.action_label || '').trim();
          if (!action) continue;
          slots.push({
            kind:         'sub',
            substatus_id: Number(sub.id),
            status_key:   sub.status_key,
            label:        action,
            rowLabel:     `Sub-status${sub.label ? ' · ' + sub.label : ''}`,
          });
        }
        // Only show this LS group if at least one action label exists —
        // either the LS default itself or any of its sub-statuses.
        if (slots.length) {
          groups.push({
            ls: { key: ls.key, label: ls.label, isNullRow: !!ls.isNullRow },
            slots,
          });
        }
      }
      if (groups.length) out.push({ stage: { key: stage.key, label: stage.label }, groups });
    }
    return out;
  }

  // Detailed, plain-English summary of the handler currently attached to a
  // slot. This is the "what does this actually do" block the user asked for.
  function _resolveLeadStatusLabel(key) {
    if (!key) return '';
    const ls = (_leadStatusesData || []).find(s => s.key === key);
    if (ls) return ls.label || ls.key;
    const sub = (_cardSubstatusesData || []).find(s => s.substatus_key === key);
    if (sub) {
      const parent = (_leadStatusesData || []).find(s => s.key === sub.status_key);
      const parentLbl = parent ? (parent.label || parent.key) : sub.status_key;
      return `${sub.label || sub.substatus_key} (${parentLbl})`;
    }
    return key;
  }

  function _handlerSummaryHtml(h) {
    const typeLbl = HANDLER_TYPE_LABELS[h.type] || h.type;
    const desc    = HANDLER_TYPE_DESCRIPTIONS[h.type] || 'No description available for this handler type.';
    const actionName = h.config?.action_name ? `<span style="display:inline-block;margin-left:6px;padding:1px 7px;background:#ede9fe;color:#5b21b6;border-radius:999px;font-size:.72rem;font-weight:600;letter-spacing:.01em;">${esc(h.config.action_name)}</span>` : '';
    let extraHtml = '';
    if (h.type === 'start_design_visit') {
      const rows = [];
      const intermediate = h.config?.intermediateLeadStatus;
      const submitted    = h.config?.submittedLeadStatus;
      if (intermediate) {
        rows.push(`<div><span style="color:var(--ink-4);">In-progress status:</span> <strong>${esc(_resolveLeadStatusLabel(intermediate))}</strong></div>`);
      }
      if (submitted) {
        rows.push(`<div><span style="color:var(--ink-4);">Submitted status:</span> <strong>${esc(_resolveLeadStatusLabel(submitted))}</strong></div>`);
      }
      if (rows.length) {
        extraHtml = `<div style="margin-top:6px;padding-top:6px;border-top:1px dashed #d8c7f5;font-size:.76rem;color:var(--ink-2);line-height:1.5;">${rows.join('')}</div>`;
      }
    }
    return `
      <div style="border:1px solid #d8c7f5;border-radius:8px;padding:8px 10px;background:#f7f2ff;">
        <div style="display:flex;align-items:center;gap:6px;font-weight:600;font-size:.82rem;color:#3d0f7a;">
          <span aria-hidden="true">⚡</span><span>${esc(typeLbl)}</span>${actionName}
        </div>
        <div style="margin-top:5px;font-size:.78rem;color:var(--ink-2);line-height:1.5;white-space:pre-line;">${esc(desc)}</div>
        ${extraHtml}
      </div>`;
  }

  function renderHandlersTable() {
    const wrap = document.getElementById('card-action-handlers-wrap');
    if (!wrap) return;
    const stages = _buildActionSlotGroups();
    if (!stages.length) {
      wrap.innerHTML = `<p style="font-size:.82rem;color:var(--ink-4);">No action labels defined yet — add labels in the table above first.</p>`;
      return;
    }
    // Flat index so row buttons can resolve back to the slot they were
    // rendered from without depending on DOM ordering.
    const slotIndex = [];
    const html = stages.map(stage => {
      const groupsHtml = stage.groups.map(g => {
        const rowsHtml = g.slots.map(slot => {
          const idx = slotIndex.push(slot) - 1;
          const handler = _handlersForSlot(slot)[0] || null;
          const actionHtml = handler
            ? _handlerSummaryHtml(handler)
            : `<em style="color:var(--ink-4);font-size:.82rem;">No action attached.</em>`;
          const btnHtml = handler
            ? `<button class="btn btn-ghost" data-slot-idx="${idx}" data-act="change">Change</button>
               <button class="btn btn-ghost" data-handler-id="${handler.id}" data-act="remove" style="color:#991b1b;">Remove</button>`
            : `<button class="btn btn-primary" data-slot-idx="${idx}" data-act="add" style="padding:4px 12px;font-size:.78rem;">+ Add action</button>`;
          return `
            <tr style="border-top:1px solid var(--stone-light);">
              <td style="padding:10px 12px;vertical-align:top;width:34%;">
                <div style="font-weight:600;font-size:.85rem;color:var(--ink-1);">${esc(slot.label)}</div>
                <div style="font-size:.72rem;color:var(--ink-4);margin-top:2px;">${esc(slot.rowLabel)}</div>
              </td>
              <td style="padding:10px 12px;vertical-align:top;">${actionHtml}</td>
              <td style="padding:10px 12px;vertical-align:top;text-align:right;white-space:nowrap;">${btnHtml}</td>
            </tr>`;
        }).join('');
        const lsLabel = g.ls.isNullRow ? `${esc(g.ls.label)} (no lead status)` : esc(g.ls.label);
        return `
          <div style="border-top:1px solid var(--stone-light);">
            <div style="padding:7px 12px;font-size:.74rem;font-weight:600;color:var(--ink-3);background:#fafaf7;text-transform:uppercase;letter-spacing:.04em;">
              ${lsLabel}
            </div>
            <table style="width:100%;border-collapse:collapse;font-size:.85rem;">
              <tbody>${rowsHtml}</tbody>
            </table>
          </div>`;
      }).join('');
      return `
        <section style="margin-bottom:18px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;">
          <div style="padding:10px 14px;background:var(--stone-soft);font-weight:600;font-size:.85rem;color:var(--ink-2);">
            ${esc(stage.stage.label)}
          </div>
          ${groupsHtml}
        </section>`;
    }).join('');
    wrap.innerHTML = html;

    wrap.querySelectorAll('[data-act]').forEach(btn => {
      btn.addEventListener('click', () => {
        const act = btn.dataset.act;
        if (act === 'remove') {
          deleteHandler(Number(btn.dataset.handlerId));
        } else {
          const slot = slotIndex[Number(btn.dataset.slotIdx)];
          const existing = _handlersForSlot(slot)[0] || null;
          openHandlerEditor(slot, existing);
        }
      });
    });
  }

  // Build <option> HTML for the lead-status selects in the start_design_visit
  // config block. Uses the already-cached _leadStatusesData and _cardSubstatusesData.
  //
  // _buildLeadStatusOnlyOptions — lead statuses only (for intermediateLeadStatus,
  //   which maps to hs_lead_status and must be a top-level lead status key).
  // _buildLeadStatusWithSubsOptions — lead statuses + sub-statuses in optgroups
  //   (for submittedLeadStatus, which may be a sub-status key via the existing path).
  function _buildLeadStatusOnlyOptions(selectedKey) {
    const real = (_leadStatusesData || []).filter(s => !s.is_null_row);
    let html = `<option value="">— none —</option>`;
    for (const ls of real) {
      const sel = ls.key === selectedKey ? ' selected' : '';
      html += `<option value="${esc(ls.key)}"${sel}>${esc(ls.label || ls.key)}</option>`;
    }
    return html;
  }

  function _buildLeadStatusWithSubsOptions(selectedKey) {
    const real = (_leadStatusesData || []).filter(s => !s.is_null_row);
    const subs  = _cardSubstatusesData || [];
    let html = `<option value="">— none —</option>`;
    if (real.length) {
      html += `<optgroup label="Lead statuses">`;
      for (const ls of real) {
        const sel = ls.key === selectedKey ? ' selected' : '';
        html += `<option value="${esc(ls.key)}"${sel}>${esc(ls.label || ls.key)}</option>`;
      }
      html += `</optgroup>`;
    }
    if (subs.length) {
      html += `<optgroup label="Lead sub-statuses">`;
      for (const s of subs) {
        const val = s.substatus_key;
        const sel = val === selectedKey ? ' selected' : '';
        const lbl = s.label ? `${esc(s.label)} (${esc(s.status_key)})` : `${esc(val)} (${esc(s.status_key)})`;
        html += `<option value="${esc(val)}"${sel}>${lbl}</option>`;
      }
      html += `</optgroup>`;
    }
    return html;
  }

  // Per-slot editor: pick the handler type and (optional) JSON config. The
  // binding is fixed to the row the admin clicked from.
  function openHandlerEditor(slot, existing) {
    const type   = existing?.type   || 'add_design_visit_to_calendar';
    const config = existing?.config || {};
    const binding = slot.kind === 'sub'
      ? { substatus_id: slot.substatus_id }
      : { stage_key: slot.stage_key, status_key: slot.status_key };

    const wrap = document.createElement('div');
    wrap.className = 'js-modal-scrim';
    wrap.innerHTML = `
      <div style="background:var(--surface-card);border-radius:var(--radius-2xl);padding:20px;width:100%;max-width:560px;box-shadow:var(--shadow-modal);max-height:90vh;overflow:auto;">
        <h3 style="margin:0 0 4px;font-size:1.05rem;font-weight:700;">${existing ? 'Change action' : 'Add action'}</h3>
        <p style="margin:0 0 14px;font-size:.78rem;color:var(--ink-4);">for <strong>${esc(slot.label)}</strong> <span style="color:var(--ink-4);font-weight:normal;">(${esc(slot.rowLabel || '')})</span></p>
        <label style="display:block;font-size:.78rem;color:#4b5563;margin:10px 0 4px;font-weight:600;">Action name <span style="font-weight:400;color:var(--ink-4);">(optional)</span></label>
        <input id="cah-action-name" type="text" class="field" maxlength="80" placeholder="e.g. send_quote" style="font-size:.85rem;" value="${esc(config.action_name || '')}">
        <div id="cah-action-name-err" style="display:none;color:#b91c1c;font-size:.78rem;margin-top:3px;">Only lowercase letters, digits, and underscores are allowed (e.g. <code>send_quote</code>).</div>
        <div style="margin-top:4px;padding:6px 10px;border-radius:6px;background:#fef3c7;border:1px solid #fcd34d;font-size:.75rem;color:#92400e;line-height:1.5;">⚙️ Backend automation coming soon — this name will be used to trigger workflows automatically once wired up. When set, it also displays as the label on the card action strip.</div>
        <label style="display:block;font-size:.78rem;color:#4b5563;margin:10px 0 4px;font-weight:600;">Action type</label>
        <select id="cah-type" class="field">
          ${Object.entries(HANDLER_TYPE_LABELS).map(([k, v]) =>
            `<option value="${k}" ${k === type ? 'selected' : ''}>${esc(v)}</option>`).join('')}
        </select>
        <div id="cah-type-desc" style="margin-top:8px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--stone-soft);font-size:.78rem;color:var(--ink-2);line-height:1.5;white-space:pre-line;"></div>

        <!-- show_message: dedicated message field. Hidden for other types. -->
        <div id="cah-msg-block" style="display:none;margin-top:12px;">
          <label style="display:block;font-size:.78rem;color:#4b5563;margin:0 0 4px;font-weight:600;">Popup title (optional)</label>
          <input id="cah-msg-title" type="text" class="field" maxlength="120" style="font-size:.85rem;">
          <label style="display:block;font-size:.78rem;color:#4b5563;margin:8px 0 4px;font-weight:600;">Message to display <span style="color:#991b1b;">*</span></label>
          <textarea id="cah-msg-body" class="field" rows="4" maxlength="2000" placeholder="What should the operator do when they click this label?" style="font-size:.85rem;"></textarea>
          <div style="font-size:.7rem;color:var(--ink-4);margin-top:3px;">Shown verbatim in a popup. Plain text only; line breaks are preserved.</div>
        </div>

        <!-- start_design_visit: dedicated config fields. -->
        <div id="cah-sdv-block" style="display:none;margin-top:12px;">
          <div>
            <label style="display:block;font-size:.78rem;color:#4b5563;margin:0 0 4px;font-weight:600;">Default duration (min)</label>
            <input id="cah-sdv-duration" type="number" class="field" min="5" max="1440" step="5" value="${esc(String(config.defaultDurationMin || 90))}" style="font-size:.85rem;">
          </div>
          <div style="margin-top:10px;">
            <label style="display:block;font-size:.78rem;color:#4b5563;margin:0 0 4px;font-weight:600;">In-progress lead status <span style="font-weight:400;color:var(--ink-4);">(optional — set when wizard opens)</span></label>
            <select id="cah-sdv-lead-status-intermediate" class="field" style="font-size:.85rem;">${_buildLeadStatusOnlyOptions(config.intermediateLeadStatus || '')}</select>
          </div>
          <div style="margin-top:8px;padding:7px 10px;border-radius:6px;background:#eff6ff;border:1px solid #bfdbfe;font-size:.75rem;color:#1e40af;line-height:1.5;">
            <strong>Two-phase status flow:</strong> Opening the wizard sets the in-progress status. Submitting the form sets the submitted status.
          </div>
          <div style="margin-top:8px;">
            <label style="display:block;font-size:.78rem;color:#4b5563;margin:0 0 4px;font-weight:600;">Submitted lead status <span style="font-weight:400;color:var(--ink-4);">(optional — set on submit)</span></label>
            <select id="cah-sdv-lead-status-submitted" class="field" style="font-size:.85rem;">${_buildLeadStatusWithSubsOptions(config.submittedLeadStatus || '')}</select>
          </div>
          <div style="margin-top:10px;">
            <label style="display:block;font-size:.78rem;color:#4b5563;margin:0 0 4px;font-weight:600;">Terms &amp; Conditions <span style="font-weight:400;color:var(--ink-4);">(optional, ≤4000 chars — also editable in the T&C section below)</span></label>
            <textarea id="cah-sdv-terms" class="field" rows="4" maxlength="4000" placeholder="Your terms and conditions text…" style="font-size:.82rem;">${esc(config.termsAndConditions || '')}</textarea>
          </div>
          <div style="margin-top:8px;">
            <label style="display:flex;align-items:center;gap:6px;font-size:.82rem;color:#4b5563;cursor:pointer;">
              <input type="checkbox" id="cah-sdv-google" ${config.addToGoogleCalendar !== false ? 'checked' : ''}>
              Also add to Google Calendar
            </label>
          </div>
        </div>

        <!-- Advanced JSON config: hidden for show_message and start_design_visit since they have dedicated fields. -->
        <div id="cah-cfg-block" style="margin-top:12px;">
          <label style="display:block;font-size:.78rem;color:#4b5563;margin:0 0 4px;font-weight:600;">Advanced configuration (JSON, optional)</label>
          <textarea id="cah-config" class="field" rows="4" style="font-family:monospace;font-size:.82rem;">${esc(JSON.stringify(config, null, 2))}</textarea>
        </div>

        <div id="cah-conflict" style="display:none;margin-top:12px;padding:10px 12px;border:1px solid #fbbf24;border-radius:8px;background:#fffbeb;">
          <div style="font-size:.8rem;font-weight:600;color:#92400e;margin-bottom:6px;">⚠️ Slot already has a handler</div>
          <div id="cah-conflict-list" style="font-size:.78rem;color:#78350f;margin-bottom:10px;line-height:1.6;"></div>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-ghost" id="cah-conflict-cancel" style="font-size:.78rem;padding:4px 12px;">Keep editing</button>
            <button class="btn" id="cah-conflict-confirm" style="font-size:.78rem;padding:4px 12px;background:#d97706;color:#fff;border:none;border-radius:6px;cursor:pointer;">Bind anyway</button>
          </div>
        </div>
        <div id="cah-edit-err" style="color:#b91c1c;font-size:.82rem;margin-top:8px;min-height:18px;"></div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;">
          <button class="btn btn-ghost" id="cah-cancel">Cancel</button>
          <button class="btn btn-primary" id="cah-save">${existing ? 'Save' : 'Add'}</button>
        </div>
      </div>`;
    document.body.appendChild(wrap);
    const descEl       = wrap.querySelector('#cah-type-desc');
    const typeSel      = wrap.querySelector('#cah-type');
    const msgBlock     = wrap.querySelector('#cah-msg-block');
    const sdvBlock     = wrap.querySelector('#cah-sdv-block');
    const cfgBlock     = wrap.querySelector('#cah-cfg-block');
    const msgTitle     = wrap.querySelector('#cah-msg-title');
    const msgBody      = wrap.querySelector('#cah-msg-body');
    const conflictBox  = wrap.querySelector('#cah-conflict');
    const conflictList = wrap.querySelector('#cah-conflict-list');
    // Pre-fill message fields from existing show_message config.
    if (type === 'show_message') {
      msgTitle.value = String(config.title   || '');
      msgBody.value  = String(config.message || '');
    }
    const renderForType = () => {
      const t = typeSel.value;
      descEl.textContent = HANDLER_TYPE_DESCRIPTIONS[t] || 'No description available for this handler type.';
      const isMsg = (t === 'show_message');
      const isSdv = (t === 'start_design_visit');
      msgBlock.style.display = isMsg ? '' : 'none';
      sdvBlock.style.display = isSdv ? '' : 'none';
      cfgBlock.style.display = (isMsg || isSdv) ? 'none' : '';
    };
    renderForType();
    typeSel.addEventListener('change', () => { conflictBox.style.display = 'none'; renderForType(); });
    wrap.addEventListener('click', e => { if (e.target === wrap) wrap.remove(); });
    wrap.querySelector('#cah-cancel').addEventListener('click', () => wrap.remove());
    wrap.querySelector('#cah-conflict-cancel').addEventListener('click', () => { conflictBox.style.display = 'none'; });

    const actionNameInput = wrap.querySelector('#cah-action-name');
    const actionNameErr   = wrap.querySelector('#cah-action-name-err');
    const SNAKE_RE = /^[a-z0-9_]*$/;
    const validateActionName = () => {
      const v = actionNameInput.value.trim();
      const invalid = v.length > 0 && !SNAKE_RE.test(v);
      actionNameErr.style.display = invalid ? '' : 'none';
      return !invalid;
    };
    actionNameInput.addEventListener('blur', validateActionName);

    const buildPayload = () => {
      const tp = typeSel.value;
      const errEl = wrap.querySelector('#cah-edit-err');
      errEl.textContent = '';
      if (!validateActionName()) { errEl.textContent = 'Action name may only contain lowercase letters, digits, and underscores.'; return null; }
      let cfg;
      if (tp === 'show_message') {
        const message = msgBody.value.trim();
        if (!message) { errEl.textContent = 'Message is required for "Show informational message".'; return null; }
        cfg = { message };
        const titleV = msgTitle.value.trim();
        if (titleV) cfg.title = titleV;
      } else if (tp === 'start_design_visit') {
        const durVal       = parseInt(wrap.querySelector('#cah-sdv-duration').value, 10);
        const lsIntermediate = wrap.querySelector('#cah-sdv-lead-status-intermediate').value;
        const lsSubmitted    = wrap.querySelector('#cah-sdv-lead-status-submitted').value;
        const terms        = wrap.querySelector('#cah-sdv-terms').value;
        const gcal         = wrap.querySelector('#cah-sdv-google').checked;
        if (durVal && (isNaN(durVal) || durVal < 5 || durVal > 1440)) {
          errEl.textContent = 'Default duration must be between 5 and 1440 minutes.'; return null;
        }
        cfg = {};
        if (durVal) cfg.defaultDurationMin = durVal;
        if (lsIntermediate) cfg.intermediateLeadStatus = lsIntermediate;
        if (lsSubmitted)    cfg.submittedLeadStatus = lsSubmitted;
        if (terms)  cfg.termsAndConditions = terms;
        cfg.addToGoogleCalendar = gcal;
      } else {
        const cfgTxt = wrap.querySelector('#cah-config').value.trim() || '{}';
        try { cfg = JSON.parse(cfgTxt); }
        catch { errEl.textContent = 'Configuration is not valid JSON.'; return null; }
      }
      const actionNameV = actionNameInput.value.trim();
      if (actionNameV) cfg.action_name = actionNameV;
      else delete cfg.action_name;
      return { name: '', type: tp, config: cfg, bindings: [binding] };
    };

    const doSave = async (payload) => {
      const errEl = wrap.querySelector('#cah-edit-err');
      try {
        if (existing) {
          await api('PATCH', `/api/admin/card-action-handlers/${existing.id}`, payload);
        } else {
          await api('POST', '/api/admin/card-action-handlers', payload);
        }
        wrap.remove();
        await loadCardActionHandlersAdmin();
        try { new BroadcastChannel('card_action_handlers_changed').postMessage({ ts: Date.now() }); } catch (_) {}
        toast(existing ? 'Action updated.' : 'Action added.');
      } catch (e) {
        errEl.textContent = e.message || 'Save failed.';
      }
    };

    wrap.querySelector('#cah-conflict-confirm').addEventListener('click', async () => {
      conflictBox.style.display = 'none';
      const payload = buildPayload();
      if (!payload) return;
      await doSave(payload);
    });

    wrap.querySelector('#cah-save').addEventListener('click', async () => {
      const payload = buildPayload();
      if (!payload) return;

      // Conflict detection: find handlers already bound to this slot that aren't the one being edited.
      const conflicts = _handlersForSlot(slot).filter(h => !existing || h.id !== existing.id);
      if (conflicts.length > 0) {
        const slotLabel = slot.label || (slot.substatus_id != null
          ? `sub-status #${slot.substatus_id}`
          : `${slot.stage_key} / ${slot.status_key}`);
        conflictList.innerHTML = conflicts.map(h => {
          const typeLbl = HANDLER_TYPE_LABELS[h.type] || h.type;
          return `<div>• <strong>${esc(slotLabel)}</strong> is already wired to <strong>${esc(h.name || typeLbl)}</strong> (${esc(typeLbl)}) — bind anyway?</div>`;
        }).join('');
        conflictBox.style.display = '';
        conflictBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        return;
      }

      await doSave(payload);
    });
  }
  window.openHandlerEditor = openHandlerEditor;

  async function deleteHandler(id) {
    if (!confirm('Remove this action from the label?')) return;
    try {
      await api('DELETE', `/api/admin/card-action-handlers/${id}`);
      await loadCardActionHandlersAdmin();
      try { new BroadcastChannel('card_action_handlers_changed').postMessage({ ts: Date.now() }); } catch (_) {}
      toast('Action removed.');
    } catch (e) {
      toast('Remove failed: ' + e.message, true);
    }
  }
  window.deleteHandler = deleteHandler;

  // Briefly flashes a "✓ Resolved" green pill on the table row that corresponds
  // to the given slot, immediately after the conflict modal auto-closes.
  // Called after renderCardActionsTable has already re-rendered the row.
  function _flashResolvedBadge(slot) {
    const tableWrap = document.getElementById('card-actions-table-wrap');
    if (!tableWrap) return;
    let target;
    if (slot.substatus_id != null) {
      target = tableWrap.querySelector(`.ca-sub-row[data-sub-id="${CSS.escape(String(slot.substatus_id))}"]`);
    } else {
      const input = tableWrap.querySelector(
        `.ca-default-input[data-stage="${CSS.escape(String(slot.stage_key))}"][data-status="${CSS.escape(String(slot.status_key))}"]`
      );
      target = input ? input.parentElement : null;
    }
    if (!target) return;
    const pill = document.createElement('span');
    pill.className = 'ca-resolved-pill';
    pill.textContent = '✓ Resolved';
    pill.style.cssText = 'display:inline-flex;align-items:center;padding:1px 8px;margin-left:6px;' +
      'background:#d1fae5;color:#065f46;border-radius:999px;font-size:.7rem;font-weight:600;' +
      'line-height:1.5;white-space:nowrap;vertical-align:middle;transition:opacity .4s ease;';
    target.appendChild(pill);
    setTimeout(() => {
      pill.style.opacity = '0';
      setTimeout(() => pill.remove(), 400);
    }, 1500);
  }

  // Lightweight conflict-resolver modal — opened from the Fix button that
  // appears in _handlerBadgesHtml whenever a slot has more than one handler.
  // Args are decoded back into a slot object so _handlersForSlot can be reused.
  function openConflictResolver(stageKey, statusKey, substatusId) {
    const slot = substatusId != null
      ? { substatus_id: Number(substatusId) }
      : { stage_key: stageKey, status_key: statusKey };

    const handlers = _handlersForSlot(slot);
    if (!handlers.length) return;

    // Build a human-readable slot description for the modal heading.
    let slotDesc;
    if (substatusId != null) {
      const sub = (_cardSubstatusesData || []).find(s => Number(s.id) === Number(substatusId));
      slotDesc = sub ? `sub-status "${esc(sub.label || sub.substatus_key)}"` : `sub-status #${substatusId}`;
    } else {
      const ls = (_leadStatusesData || []).find(s => s.key === statusKey);
      slotDesc = ls ? `"${esc(ls.label)}"` : `${esc(stageKey)} / ${esc(statusKey)}`;
    }

    const wrap = document.createElement('div');
    wrap.className = 'js-modal-scrim';

    const rowsHtml = handlers.map(h => {
      const typeLbl = HANDLER_TYPE_LABELS[h.type] || h.type;
      const desc    = HANDLER_TYPE_DESCRIPTIONS[h.type] || '';
      return `
        <div class="ca-conflict-row" data-handler-id="${h.id}"
          style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:#fafaf7;">
          <div style="flex:1;min-width:0;">
            <div style="font-weight:600;font-size:.85rem;color:var(--ink-1);">
              <span aria-hidden="true" style="margin-right:4px;">⚡</span>${esc(typeLbl)}
            </div>
            ${desc ? `<div style="font-size:.75rem;color:var(--ink-4);margin-top:2px;line-height:1.4;">${esc(desc)}</div>` : ''}
          </div>
          <button type="button" class="btn btn-ghost ca-conflict-remove-btn"
            data-handler-id="${h.id}"
            style="flex:0 0 auto;font-size:.78rem;padding:4px 12px;color:#991b1b;white-space:nowrap;">
            Remove
          </button>
        </div>`;
    }).join('');

    wrap.innerHTML = `
      <div style="background:#fff;border-radius:12px;padding:20px;width:100%;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,0.25);max-height:90vh;overflow:auto;">
        <h3 style="margin:0 0 6px;font-size:1.05rem;font-weight:700;">Fix conflicting handlers</h3>
        <p style="margin:0 0 14px;font-size:.8rem;color:var(--ink-4);line-height:1.5;">
          The slot ${slotDesc} has <strong>${handlers.length} handlers</strong> bound to it.
          Remove all but one to resolve the conflict.
        </p>
        <div style="display:flex;flex-direction:column;gap:8px;" id="ca-conflict-list">
          ${rowsHtml}
        </div>
        <div id="ca-conflict-err" style="color:#b91c1c;font-size:.82rem;margin-top:8px;min-height:18px;"></div>

      const id = Number(btn.dataset.handlerId);
      const errEl = wrap.querySelector('#ca-conflict-err');
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Removing…';
      try {

        await loadCardActionHandlersAdmin();
        try { new BroadcastChannel('card_action_handlers_changed').postMessage({ ts: Date.now() }); } catch (_) {}
        toast('Handler removed.');
        // If only one handler remains, close the modal; otherwise re-check.
        const remaining = _handlersForSlot(slot);
        if (remaining.length <= 1) {
          wrap.remove();
          _flashResolvedBadge(slot);
        } else {
          // Remove just the row that was deleted so the admin can continue.
          const row = wrap.querySelector(`.ca-conflict-row[data-handler-id="${id}"]`);
          if (row) row.remove();
          btn.disabled = false;
          btn.textContent = 'Remove';
        }
      } catch (err) {
        errEl.textContent = 'Remove failed: ' + (err.message || 'unknown error');

        btn.textContent = 'Remove';
      }

  async function saveAllLeadStatuses() {
    const rows = document.querySelectorAll('#lead-statuses-table-wrap tr[data-ls-key]');
    const changed = [];
    rows.forEach(row => {
      const key      = row.dataset.lsKey;
      const existing = _leadStatusesData.find(s => s.key === key);
      if (!existing) return;
      const labelEl   = row.querySelector('.ls-label-input');
      const stageEl   = row.querySelector('.ls-stage-select');
      const exclEl    = row.querySelector('input[type="checkbox"]');
      const shortEl   = row.querySelector('.ls-shorthand-input');
      const newLabel     = labelEl  ? labelEl.value.trim()      : existing.label;
      const newStage     = stageEl  ? (stageEl.value || null)   : existing.stage;
      const newExcl      = exclEl   ? exclEl.checked             : existing.excluded_from_sales;
      const newShorthand = shortEl  ? shortEl.value.trim().toUpperCase() : (existing.shorthand || '');
      const curShorthand = (existing.shorthand || '').toUpperCase();
      const diff = {};
      if (newLabel !== existing.label)                 diff.label = newLabel;
      if (newStage !== (existing.stage || null))       diff.stage = newStage;
      if (newExcl  !== existing.excluded_from_sales)   diff.excluded_from_sales = newExcl;
      if (newShorthand && newShorthand !== curShorthand) {
        if (!/^[A-Z0-9]{4}$/.test(newShorthand)) {
          toast(`Shorthand for ${key} must be 4 characters (A–Z, 0–9).`, true);
          if (shortEl) shortEl.value = curShorthand;
          return;
        }
        diff.shorthand = newShorthand;
      }
      if (!newLabel) return;
      if (Object.keys(diff).length) changed.push({ key, diff, labelEl, stageEl, exclEl, shortEl, existing });
    });
    if (!changed.length) { toast('No changes to save.'); return; }
    let saved = 0, failed = 0;
    const failureMessages = [];
    for (const { key, diff, labelEl, stageEl, exclEl, shortEl, existing } of changed) {
      try {
        const updated = await api('PATCH', `/api/admin/lead-statuses/${encodeURIComponent(key)}`, diff);
        const idx = _leadStatusesData.findIndex(s => s.key === key);
        if (idx !== -1) _leadStatusesData[idx] = updated;
        saved++;
      } catch (e) {
        if (labelEl)  labelEl.value   = existing.label;
        if (stageEl)  stageEl.value   = existing.stage || '';
        if (exclEl)   exclEl.checked  = existing.excluded_from_sales;
        if (shortEl)  shortEl.value   = existing.shorthand || '';
        failureMessages.push(`${key}: ${e.message}`);
        failed++;
      }
    }
    if (failed) toast(`Saved ${saved}, failed ${failed}. ${failureMessages[0] || ''}`.trim(), true);
    else toast(`${saved} change${saved !== 1 ? 's' : ''} saved.`);
    _notifyLeadStatusChanged();
  }

  async function saveLeadStatusKey(input) {
    const oldKey = input.dataset.oldKey;
    const newKey = input.value.trim().toUpperCase();
    if (!newKey) return;
    if (!/^[A-Z0-9_]+$/.test(newKey)) { toast('Key may only contain uppercase letters, digits, and underscores.', true); return; }
    try {
      const updated = await api('PATCH', `/api/admin/lead-statuses/${encodeURIComponent(oldKey)}`, { new_key: newKey });
      const idx = _leadStatusesData.findIndex(s => s.key === oldKey);
      if (idx !== -1) _leadStatusesData[idx] = updated;
      renderLeadStatusesTable();
      _notifyLeadStatusChanged();
    } catch (e) {
      toast(`Failed to set key: ${e.message}`, true);
    }
  }

  async function saveLeadStatusLabel(input) {
    const key = input.dataset.key;
    const label = input.value.trim();
    if (!label) { input.value = (_leadStatusesData.find(s => s.key === key)?.label || ''); return; }
    const existing = _leadStatusesData.find(s => s.key === key);
    if (existing && existing.label === label) return;
    try {
      const updated = await api('PATCH', `/api/admin/lead-statuses/${encodeURIComponent(key)}`, { label });
      const idx = _leadStatusesData.findIndex(s => s.key === key);
      if (idx !== -1) _leadStatusesData[idx] = updated;
      _notifyLeadStatusChanged();
    } catch (e) {
      toast(`Failed to save label: ${e.message}`, true);
      input.value = existing?.label || '';
    }
  }

  async function toggleLeadStatusExclusion(checkbox) {
    const key = checkbox.dataset.key;
    const excluded = checkbox.checked;
    try {
      const updated = await api('PATCH', `/api/admin/lead-statuses/${encodeURIComponent(key)}`, { excluded_from_sales: excluded });
      const idx = _leadStatusesData.findIndex(s => s.key === key);
      if (idx !== -1) _leadStatusesData[idx] = updated;
      _notifyLeadStatusChanged();
    } catch (e) {
      toast(`Failed to update: ${e.message}`, true);
      checkbox.checked = !excluded;
    }
  }

  async function moveLeadStatus(key, direction) {
    const idx = _leadStatusesData.findIndex(s => s.key === key);
    if (idx === -1) return;
    const swapIdx = direction === 'up' ? idx - 1 : idx + 1;
    if (swapIdx < 0 || swapIdx >= _leadStatusesData.length) return;

    const a = _leadStatusesData[idx];
    const b = _leadStatusesData[swapIdx];
    const aOrder = a.sort_order;
    const bOrder = b.sort_order;

    try {
      await Promise.all([
        api('PATCH', `/api/admin/lead-statuses/${encodeURIComponent(a.key)}`, { sort_order: bOrder }),
        api('PATCH', `/api/admin/lead-statuses/${encodeURIComponent(b.key)}`, { sort_order: aOrder }),
      ]);
      a.sort_order = bOrder;
      b.sort_order = aOrder;
      _leadStatusesData[idx]     = b;
      _leadStatusesData[swapIdx] = a;
      renderLeadStatusesTable();
      _notifyLeadStatusChanged();
    } catch (e) {
      toast(`Failed to reorder: ${e.message}`, true);
    }
  }

  async function addLeadStatus() {
    const keyInput   = document.getElementById('ls-new-key');
    const labelInput = document.getElementById('ls-new-label');
    const stageInput = document.getElementById('ls-new-stage');
    const errEl      = document.getElementById('ls-add-error');
    const key        = (keyInput?.value || '').trim().toUpperCase();
    const label      = (labelInput?.value || '').trim();
    const stage      = (stageInput?.value || '').trim() || null;

    const showErr = msg => { if (errEl) { errEl.textContent = msg; errEl.style.display = ''; } };
    const clearErr = () => { if (errEl) errEl.style.display = 'none'; };

    if (!key)   { showErr('Key is required.'); return; }
    if (!label) { showErr('Display label is required.'); return; }
    clearErr();

    try {
      const created = await api('POST', '/api/admin/lead-statuses', { key, label, stage });
      _leadStatusesData.push(created);
      if (keyInput)   keyInput.value   = '';
      if (labelInput) labelInput.value = '';
      if (stageInput) stageInput.value = '';
      renderLeadStatusesTable();
      _notifyLeadStatusChanged();
    } catch (e) {
      showErr(e.message || 'Failed to add status.');
    }
  }

      else if (savedTab === 'designsystem') { switchTab('designsystem'); renderDesignSystemTab(); }

  async function _applyDevEnvTabVisibility() {

      } catch { _devMode = false; }

      if (btn)   btn.style.display   = 'none';
      if (panel) panel.style.display = 'none';

  // ── Catalogue move helper ─────────────────────────────────────────────────
  async function moveDvItem(type, id, direction) {
    const cacheMap = {
      handle:       _dvHandlesData,
      furniture:    _dvFurnitureData,
      'door-style': _dvDoorStylesData,
    };
    const endpointMap = {
      handle:       '/api/admin/design-visit-handles',
      furniture:    '/api/admin/design-visit-furniture-ranges',
      'door-style': '/api/admin/design-visit-door-styles',
    };
    const wrapIdMap = {
      handle:       'dv-handles-wrap',
      furniture:    'dv-furniture-wrap',
      'door-style': 'dv-door-styles-wrap',
    };
    const cache = cacheMap[type];
    if (!cache) return;
    const sorted = [...cache].sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0) || a.id - b.id);
    const idx = sorted.findIndex(s => s.id === id);
    if (idx === -1) return;
    const swapIdx = direction === 'up' ? idx - 1 : idx + 1;
    if (swapIdx < 0 || swapIdx >= sorted.length) return;
    const a = sorted[idx];
    const b = sorted[swapIdx];
    if ((a.sort_order || 0) === (b.sort_order || 0)) {
      sorted.forEach((s, i) => { s.sort_order = i; });
    }
    const aOrder = a.sort_order;
    const bOrder = b.sort_order;
    try {
      await Promise.all([
        api('PATCH', `${endpointMap[type]}/${a.id}`, { sort_order: bOrder }),
        api('PATCH', `${endpointMap[type]}/${b.id}`, { sort_order: aOrder }),
      ]);
      a.sort_order = bOrder;
      b.sort_order = aOrder;
      const wrap = document.getElementById(wrapIdMap[type]);
      if (type === 'handle') {
        renderDvHandleList(wrap, _dvHandlesData);
      } else if (type === 'furniture') {
        renderDvList(wrap, _dvFurnitureData, 'furniture', { fields: ['name','description'], labels: ['Name','Description'] });
      } else {
        renderDvList(wrap, _dvDoorStylesData, 'door-style', { fields: ['name','image_url'], labels: ['Name','Image URL'] });
      }
      _broadcastDvCatalogueChange(type);
    } catch (e) {
      toast(`Failed to reorder: ${e.message}`, true);
    }
  }
  window.moveDvItem = moveDvItem;

  function _broadcastDvCatalogueChange(type) {
    const chanMap = {
      handle:       'design_visit_handles_changed',
      furniture:    'design_visit_furniture_ranges_changed',
      'door-style': 'design_visit_door_styles_changed',
    };
    const chanName = chanMap[type];
    if (!chanName) return;
    try { const ch = new BroadcastChannel(chanName); ch.postMessage({ ts: Date.now() }); ch.close(); } catch {}
  }

  async function deleteDvItem(type, id) {
    if (!confirm('Delete this item? This cannot be undone.')) return;
    const urlMap = {
      handle:      `/api/admin/design-visit-handles/${id}`,
      furniture:   `/api/admin/design-visit-furniture-ranges/${id}`,
      'door-style': `/api/admin/design-visit-door-styles/${id}`,
    };
    try {
      await api('DELETE', urlMap[type]);
      toast('Deleted.');
      _broadcastDvCatalogueChange(type);
      if (type === 'handle')      return loadDvHandles();
      if (type === 'furniture')   return loadDvFurniture();
      if (type === 'door-style')  return loadDvDoorStyles();
    } catch (e) {
      toast('Delete failed: ' + e.message, true);
    }
  }
  window.deleteDvItem = deleteDvItem;
