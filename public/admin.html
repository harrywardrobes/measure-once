      const bodyId    = `ca-stage-body-${esc(stage.key)}`;
      return `
      <section data-stage-section="${esc(stage.key)}" style="margin-bottom:22px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;">
        <button type="button" class="ca-stage-toggle" data-stage-toggle="${esc(stage.key)}"
          aria-expanded="${collapsed ? 'false' : 'true'}" aria-controls="${bodyId}"
          style="width:100%;display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--stone-soft);border:0;border-bottom:${collapsed ? '0' : '1px solid var(--border)'};font-weight:600;font-size:.85rem;color:var(--ink-2);cursor:pointer;text-align:left;font:inherit;">
          <span class="ca-stage-chevron" aria-hidden="true" style="display:inline-block;width:10px;transition:transform .15s ease;transform:rotate(${collapsed ? '-90deg' : '0deg'});">▾</span>
          <span style="font-weight:600;">${esc(stage.label)}</span>
        </button>
        <div id="${bodyId}" data-stage-body="${esc(stage.key)}"${collapsed ? ' hidden' : ''}>
        ${stage.statuses.length === 0 ? `
          <div style="padding:14px;font-size:.78rem;color:var(--ink-4);"><em>No lead statuses configured for this stage yet.</em></div>
        ` : stage.statuses.map(ls => `
          <div data-ls-block="${esc(ls.key)}" style="padding:12px 14px;border-bottom:1px solid var(--border);">
            <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:8px;">
              <strong style="font-size:.85rem;color:var(--ink-1);">${esc(ls.label)}</strong>
              <span style="font-family:monospace;font-size:.7rem;color:var(--ink-4);">${esc(ls.key)}</span>
            </div>

            <!-- Lead-status default row -->
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;">
              <div style="flex:0 0 220px;font-size:.78rem;color:var(--ink-3);">Default action label</div>
              <input type="text" class="field ca-default-input" maxlength="128"
                data-kind="ls-default" data-stage="${esc(stage.key)}" data-status="${esc(ls.key.toLowerCase())}"
                data-original="${esc(ls.defaultLabel)}"
                value="${esc(ls.defaultLabel)}"
                placeholder="(used when no sub-status set)"
                style="flex:1;padding:5px 8px;font-size:.82rem;"
                onkeydown="if(event.key==='Enter')this.blur()">
            </div>

            <!-- Sub-statuses -->
            <div data-sub-list="${esc(ls.key)}" style="margin-top:8px;">
              ${ls.substatuses.map(sub => _renderSubstatusRow(ls.key, sub)).join('')}
            </div>

            <div style="margin-top:8px;">
              <button class="btn btn-ghost" style="padding:4px 10px;font-size:.74rem;"
                onclick="addCardActionSubstatus('${esc(ls.key)}')">+ Add sub-status</button>
            </div>
          </div>
        `).join('')}
        </div>
      </section>
    `;
    }).join('');

    if (!_cardActionsToggleBound) {
      wrap.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-stage-toggle]');
        if (!btn || !wrap.contains(btn)) return;
        const key = btn.dataset.stageToggle;
        if (_collapsedCardActionStages.has(key)) _collapsedCardActionStages.delete(key);
        else _collapsedCardActionStages.add(key);
        _applyCardActionStageCollapse(key);
      });
      _cardActionsToggleBound = true;
    }
  }

  function _applyCardActionStageCollapse(stageKey) {
    const wrap = document.getElementById('card-actions-table-wrap');
    if (!wrap) return;
    const btn  = wrap.querySelector(`[data-stage-toggle="${CSS.escape(stageKey)}"]`);
    const body = wrap.querySelector(`[data-stage-body="${CSS.escape(stageKey)}"]`);
    if (!btn || !body) return;
    const collapsed = _collapsedCardActionStages.has(stageKey);
    btn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
    btn.style.borderBottom = collapsed ? '0' : '1px solid var(--border)';
    const chev = btn.querySelector('.ca-stage-chevron');
    if (chev) chev.style.transform = `rotate(${collapsed ? '-90deg' : '0deg'})`;
    if (collapsed) body.setAttribute('hidden', '');
    else           body.removeAttribute('hidden');
  }

  function _renderSubstatusRow(lsKey, sub) {
    // Existing row: data-sub-id is the DB id and inputs carry originals so Save
    // only PATCHes when something changed.
    const id           = sub.id;
    const subKey       = sub.substatus_key || '';
    const subLabel     = sub.label || '';
    const subAction    = sub.action_label || '';
    return `
      <div class="ca-sub-row" data-sub-id="${esc(id)}" data-sub-ls="${esc(lsKey)}"
           data-orig-key="${esc(subKey)}" data-orig-label="${esc(subLabel)}" data-orig-action="${esc(subAction)}"
           style="display:flex;align-items:center;gap:8px;padding:5px 0;border-top:1px dashed var(--border);">
        <input type="text" class="field ca-sub-key" maxlength="64"
          value="${esc(subKey)}"
          placeholder="KEY"
          style="flex:0 0 140px;padding:4px 7px;font-size:.78rem;font-family:monospace;text-transform:uppercase;">
        <input type="text" class="field ca-sub-label" maxlength="128"
          value="${esc(subLabel)}"
          placeholder="Display label"
          style="flex:1;padding:4px 7px;font-size:.78rem;">
        <input type="text" class="field ca-sub-action" maxlength="128"
          value="${esc(subAction)}"
          placeholder="Action label"
          style="flex:1;padding:4px 7px;font-size:.78rem;">
        <button class="btn btn-ghost" style="padding:3px 9px;font-size:.74rem;color:#991b1b;"
          onclick="deleteCardActionSubstatus(this)">Delete</button>
      </div>`;
  }

  // Append an empty sub-status row to the named lead status block. New rows
  // have data-sub-new="1" and no data-sub-id so Save knows to POST them.
  function addCardActionSubstatus(lsKey) {
    const list = document.querySelector(`[data-sub-list="${CSS.escape(lsKey)}"]`);
    if (!list) return;
    // If the surrounding stage is currently collapsed, expand it so the new
    // row is visible rather than appended into hidden DOM.
    const stageBody = list.closest('[data-stage-body]');
    if (stageBody) {
      const stageKey = stageBody.dataset.stageBody;
      if (_collapsedCardActionStages.has(stageKey)) {
        _collapsedCardActionStages.delete(stageKey);
        _applyCardActionStageCollapse(stageKey);
      }
    }
    _newSubstatusCounter++;
    // Prefill the KEY input with the LS shorthand + underscore so admins start
    // from a unique, predictable prefix (e.g. "ATCT_" for Attempted to Contact).
    // Falls back to empty if the LS has no shorthand yet (older row that
    // hasn't been backfilled, or sentinel).
    const ls = (_leadStatusesData || []).find(s => s.key === lsKey);
    const sh = (ls && ls.shorthand) ? String(ls.shorthand).toUpperCase() : '';
    const keyPrefill = sh ? `${sh}_` : '';
    const tmp = document.createElement('div');
    tmp.innerHTML = `
      <div class="ca-sub-row" data-sub-new="1" data-sub-ls="${esc(lsKey)}"
           data-orig-key="" data-orig-label="" data-orig-action=""
           style="display:flex;align-items:center;gap:8px;padding:5px 0;border-top:1px dashed var(--border);background:#fffbeb;">
        <input type="text" class="field ca-sub-key" maxlength="64"
          value="${esc(keyPrefill)}"
          placeholder="KEY"
          style="flex:0 0 140px;padding:4px 7px;font-size:.78rem;font-family:monospace;text-transform:uppercase;">
        <input type="text" class="field ca-sub-label" maxlength="128"
          placeholder="Display label"
          style="flex:1;padding:4px 7px;font-size:.78rem;">
        <input type="text" class="field ca-sub-action" maxlength="128"
          placeholder="Action label"
          style="flex:1;padding:4px 7px;font-size:.78rem;">
        <button class="btn btn-ghost" style="padding:3px 9px;font-size:.74rem;color:#991b1b;"
          onclick="deleteCardActionSubstatus(this)">Delete</button>
      </div>`;
    list.appendChild(tmp.firstElementChild);
    // Drop the cursor after the prefill so the admin types the unique suffix.
    const newRow = list.lastElementChild;
    const keyInput = newRow && newRow.querySelector('.ca-sub-key');
    if (keyInput) {
      keyInput.focus();
      try { keyInput.setSelectionRange(keyPrefill.length, keyPrefill.length); } catch (_) {}
    }
  }

  // Delete a sub-status row. New (unsaved) rows just vanish; existing rows are
  // queued for deletion on next Save.
  function deleteCardActionSubstatus(btn) {
    const row = btn.closest('.ca-sub-row');
    if (!row) return;
    if (row.dataset.subNew) {
      row.remove();
      return;
    }
    const id = parseInt(row.dataset.subId, 10);
    if (!Number.isInteger(id)) { row.remove(); return; }
    if (!confirm('Delete this sub-status? It will also be removed from HubSpot on Save.')) return;
    _pendingSubstatusDeletes.add(id);
    row.style.opacity   = '0.4';
    row.style.background = '#fee2e2';
    row.querySelectorAll('input,button').forEach(el => { el.disabled = true; });
    // Re-enable the delete button so users can undo their queued deletion.
    const undoBtn = document.createElement('button');
    undoBtn.className = 'btn btn-ghost';
    undoBtn.style.cssText = 'padding:3px 9px;font-size:.74rem;';
    undoBtn.textContent = 'Undo';
    undoBtn.onclick = () => {
      _pendingSubstatusDeletes.delete(id);
      row.style.opacity = '';
      row.style.background = '';
      row.querySelectorAll('input').forEach(el => { el.disabled = false; });
      undoBtn.replaceWith(btn);
      btn.disabled = false;
    };
    btn.replaceWith(undoBtn);
  }

  // Save sweeps every dirty row, in order:
  //   1. stage-default + ls-default inputs → PUT /api/admin/stage-action-labels
  //   2. existing sub-status rows with changes → PATCH /api/admin/lead-substatuses/:id
  //   3. new sub-status rows → POST /api/admin/lead-substatuses
  //   4. queued deletes → DELETE /api/admin/lead-substatuses/:id
  async function saveAllCardActionLabels() {
    let saved = 0, failed = 0;
    const failures = [];

    // 1) Default labels (global "no status" + per-LS defaults).
    const defaultInputs = document.querySelectorAll('#card-actions-table-wrap .ca-default-input');
    console.log('[card-actions] save: found', defaultInputs.length, 'default inputs');
    for (const input of defaultInputs) {
      const value    = input.value.trim();
      const original = input.dataset.original || '';
      console.log('[card-actions] input', input.dataset.kind,
        'stage=', input.dataset.stage, 'status=', input.dataset.status,
        'value=', JSON.stringify(value), 'orig=', JSON.stringify(original),
        'changed=', value && value !== original);
      if (!value) {
        // Empty: server requires non-empty label. Surface this so the admin
        // knows their clear-attempt didn't save (rather than silently skipping).
        if (original) {
          failures.push(`${input.dataset.kind} (${input.dataset.stage || ''}/${input.dataset.status || ''}): label cannot be empty.`);
          failed++;
        }
        continue;
      }
      if (value === original) continue;

      if (input.dataset.kind === 'no-status-global') {
        // The global "no lead status" row writes through to all three
        // stage_action_labels[stage|''] rows so contacts with no hs_lead_status
        // get the same label regardless of which column they land in.
        let allOk = true;
        for (const stageKey of ['sales', 'designvisit', 'survey']) {
          try {
            await api('PUT', '/api/admin/stage-action-labels', {
              stage_key: stageKey, status_key: '', label: value,
            });
          } catch (e) {
            allOk = false;
            failures.push(`no-status (${stageKey}): ${e.message || 'error'}`);
          }
        }
        if (allOk) { input.dataset.original = value; saved++; }
        else       { input.value = original;          failed++; }
        continue;
      }

      // Per-lead-status default.
      try {
        await api('PUT', '/api/admin/stage-action-labels', {
          stage_key: input.dataset.stage,
          status_key: input.dataset.status,
          label: value,
        });
        input.dataset.original = value;
        saved++;
      } catch (e) {
        input.value = original;
        failed++;
        failures.push(`default (${input.dataset.stage}/${input.dataset.status || '—'}): ${e.message || 'error'}`);
      }
    }

    // 2) + 3) Sub-status rows.
    const subRows = document.querySelectorAll('#card-actions-table-wrap .ca-sub-row');
    for (const row of subRows) {
      const isNew = !!row.dataset.subNew;
      const idStr = row.dataset.subId;
      // Skip rows queued for delete — handled below.
      if (!isNew && _pendingSubstatusDeletes.has(parseInt(idStr, 10))) continue;

      const lsKey      = row.dataset.subLs;
      const keyInput   = row.querySelector('.ca-sub-key');
      const labelInput = row.querySelector('.ca-sub-label');
      const actInput   = row.querySelector('.ca-sub-action');
      const subKey     = keyInput.value.trim().toUpperCase().replace(/[^A-Z0-9_]/g, '_');
      const label      = labelInput.value.trim();
      const action     = actInput.value.trim();

      if (isNew) {
        if (!subKey || !label) {
          if (subKey || label || action) {
            failed++;
            failures.push(`new sub-status (${lsKey}): key and display label are required.`);
          }
          continue;
        }
        try {
          const created = await api('POST', '/api/admin/lead-substatuses', {
            status_key:    lsKey,
            substatus_key: subKey,
            label, action_label: action, sort_order: 0,
          });
          // Convert the row into a saved row in place.
          row.removeAttribute('data-sub-new');
          row.style.background = '';
          row.dataset.subId      = created.id;
          row.dataset.origKey    = created.substatus_key;
          row.dataset.origLabel  = created.label;
          row.dataset.origAction = created.action_label || '';
          keyInput.value = created.substatus_key;
          saved++;
        } catch (e) {
          failed++;
          failures.push(`new sub-status (${lsKey}/${subKey}): ${e.message || 'error'}`);
        }
      } else {
        const origKey    = row.dataset.origKey    || '';
        const origLabel  = row.dataset.origLabel  || '';
        const origAction = row.dataset.origAction || '';
        const patch = {};
        if (subKey  !== origKey)    patch.substatus_key = subKey;
        if (label   !== origLabel)  patch.label         = label;
        if (action  !== origAction) patch.action_label  = action;
        if (!Object.keys(patch).length) continue;
        if (patch.label === '') { failed++; failures.push(`sub-status #${idStr}: label cannot be empty.`); continue; }
        try {
          const updated = await api('PATCH', `/api/admin/lead-substatuses/${idStr}`, patch);
          row.dataset.origKey    = updated.substatus_key;
          row.dataset.origLabel  = updated.label;
          row.dataset.origAction = updated.action_label || '';
          keyInput.value = updated.substatus_key;
          saved++;
        } catch (e) {
          failed++;
          failures.push(`sub-status #${idStr}: ${e.message || 'error'}`);
        }
      }
    }

    // 4) Deletes.
    for (const id of Array.from(_pendingSubstatusDeletes)) {
      try {
        await api('DELETE', `/api/admin/lead-substatuses/${id}`);
        _pendingSubstatusDeletes.delete(id);
        const row = document.querySelector(`.ca-sub-row[data-sub-id="${id}"]`);
        if (row) row.remove();
        saved++;
      } catch (e) {
        failed++;
        failures.push(`delete sub-status #${id}: ${e.message || 'error'}`);
      }
    }

    if (saved === 0 && failed === 0) { toast('No changes to save.'); return; }
    if (failed) {
      console.warn('Card actions save: some changes failed', failures);
      toast(`Saved ${saved}, failed ${failed}.`, true);
    } else {
      toast(`${saved} change${saved !== 1 ? 's' : ''} saved.`);
    }

    _broadcastCardActionsChanged();
    try { new BroadcastChannel('lead_substatuses_changed').postMessage({ ts: Date.now() }); } catch (_) {}

    // Refresh in-memory copies so a follow-up Save doesn't re-send.
    try {
      const [labels, subs] = await Promise.all([
        api('GET', '/api/admin/stage-action-labels'),
        api('GET', '/api/admin/lead-substatuses'),
      ]);
      _cardActionsData     = Array.isArray(labels) ? labels : _cardActionsData;
      _cardSubstatusesData = Array.isArray(subs)   ? subs   : _cardSubstatusesData;
    } catch (_) {}
  }

  // Cross-tab sync: when the Lead Statuses panel is changed in another tab,
  // refresh the card action labels here so the order stays in lock-step.
  if (typeof BroadcastChannel !== 'undefined') {
    try {
      new BroadcastChannel('lead_statuses_changed').addEventListener('message', () => {
        if (_cardActionsEverLoaded) loadCardActionsAdmin();
      });
    } catch (_) {}
  }

  // Expose handlers used from inline onclick handlers + the lead-status
  // notify hook.
  window.loadCardActionsAdmin       = loadCardActionsAdmin;
  window.saveAllCardActionLabels    = saveAllCardActionLabels;
  window.addCardActionSubstatus     = addCardActionSubstatus;
  window.deleteCardActionSubstatus  = deleteCardActionSubstatus;

  async function loadLeadStatusesAdmin() {
    if (_leadStatusesLoaded) return;
    const wrap = document.getElementById('lead-statuses-table-wrap');
    if (!wrap) return;
    try {
      _leadStatusesData = await api('GET', '/api/admin/lead-statuses');
      _leadStatusesLoaded = true;
      renderLeadStatusesTable();
    } catch (e) {
      wrap.innerHTML = `<p style="font-size:.82rem;color:#991b1b;">Could not load lead statuses: ${esc(e.message)}</p>`;
    }
  }

  function renderLeadStatusesTable() {
    const wrap = document.getElementById('lead-statuses-table-wrap');
    if (!wrap) return;
    const data = _leadStatusesData;
    const realStatuses = data.filter(s => !s.is_null_row);
    const nullRow      = data.find(s => s.is_null_row);
    if (!nullRow && !realStatuses.length) {
      wrap.innerHTML = `<p style="font-size:.82rem;color:var(--ink-4);">No statuses configured yet.</p>`;
      return;
    }

    // NOTE: The null-status sentinel row (is_null_row=TRUE) intentionally has no
    // delete button. The server also rejects DELETE requests for this row with 400.
    // Do NOT add a generic delete button here without re-checking is_null_row first.
    const nullRowHtml = nullRow ? `
      <tr style="border-bottom:1px solid var(--border);background:var(--stone-soft);" data-ls-key="${esc(nullRow.key)}" data-ls-no-delete="1">
        <td style="padding:7px 8px;text-align:center;white-space:nowrap;">
          <button class="btn btn-ghost" disabled style="padding:2px 7px;font-size:1rem;line-height:1;opacity:.3;" title="Cannot reorder">↑</button>
          <button class="btn btn-ghost" disabled style="padding:2px 7px;font-size:1rem;line-height:1;opacity:.3;" title="Cannot reorder">↓</button>
        </td>
        <td style="padding:7px 8px;color:var(--ink-4);font-size:.78rem;font-style:italic;">—</td>
        <td style="padding:7px 8px;font-family:monospace;color:var(--ink-4);font-size:.78rem;font-style:italic;">— none —</td>
        <td style="padding:7px 8px;font-family:monospace;color:var(--ink-4);font-size:.78rem;font-style:italic;">—</td>
        <td style="padding:7px 8px;">
          <input type="text" class="field ls-label-input" value="${esc(nullRow.label)}" data-key="${esc(nullRow.key)}"
            style="padding:4px 7px;font-size:.82rem;width:100%;min-width:120px;"
            onkeydown="if(event.key==='Enter')this.blur()">
        </td>
        <td style="padding:7px 8px;text-align:center;color:var(--ink-4);font-size:.72rem;font-style:italic;">—</td>
      </tr>
    ` : '';

    wrap.innerHTML = `
      <table style="width:100%;border-collapse:collapse;font-size:.82rem;">
        <thead>
          <tr style="border-bottom:1px solid var(--border);">
            <th style="text-align:center;padding:6px 8px;font-weight:600;color:var(--ink-3);font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;">Order</th>
            <th style="text-align:left;padding:6px 8px;font-weight:600;color:var(--ink-3);font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;">Stage</th>
            <th style="text-align:left;padding:6px 8px;font-weight:600;color:var(--ink-3);font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;">Key</th>
            <th style="text-align:left;padding:6px 8px;font-weight:600;color:var(--ink-3);font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;" title="4-character shorthand used to prefix new sub-status keys (must be unique).">Shorthand</th>
            <th style="text-align:left;padding:6px 8px;font-weight:600;color:var(--ink-3);font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;">Display Label</th>
            <th style="text-align:center;padding:6px 8px;font-weight:600;color:var(--ink-3);font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;">Excl. from Sales</th>
          </tr>
        </thead>
        <tbody>

  async function saveAllLeadStatuses() {
    const rows = document.querySelectorAll('#lead-statuses-table-wrap tr[data-ls-key]');
    const changed = [];
    rows.forEach(row => {
      const key      = row.dataset.lsKey;
      const existing = _leadStatusesData.find(s => s.key === key);
      if (!existing) return;
      const labelEl   = row.querySelector('.ls-label-input');
      const stageEl   = row.querySelector('.ls-stage-select');
      const exclEl    = row.querySelector('input[type="checkbox"]');
      const shortEl   = row.querySelector('.ls-shorthand-input');
      const newLabel     = labelEl  ? labelEl.value.trim()      : existing.label;
      const newStage     = stageEl  ? (stageEl.value || null)   : existing.stage;
      const newExcl      = exclEl   ? exclEl.checked             : existing.excluded_from_sales;
      const newShorthand = shortEl  ? shortEl.value.trim().toUpperCase() : (existing.shorthand || '');
      const curShorthand = (existing.shorthand || '').toUpperCase();
      const diff = {};
      if (newLabel !== existing.label)                 diff.label = newLabel;
      if (newStage !== (existing.stage || null))       diff.stage = newStage;
      if (newExcl  !== existing.excluded_from_sales)   diff.excluded_from_sales = newExcl;
      if (newShorthand && newShorthand !== curShorthand) {
        if (!/^[A-Z0-9]{4}$/.test(newShorthand)) {
          toast(`Shorthand for ${key} must be 4 characters (A–Z, 0–9).`, true);
          if (shortEl) shortEl.value = curShorthand;
          return;
        }
        diff.shorthand = newShorthand;
      }
      if (!newLabel) return;
      if (Object.keys(diff).length) changed.push({ key, diff, labelEl, stageEl, exclEl, shortEl, existing });
    });
    if (!changed.length) { toast('No changes to save.'); return; }
    let saved = 0, failed = 0;
    const failureMessages = [];
    for (const { key, diff, labelEl, stageEl, exclEl, shortEl, existing } of changed) {
      try {
        const updated = await api('PATCH', `/api/admin/lead-statuses/${encodeURIComponent(key)}`, diff);
        const idx = _leadStatusesData.findIndex(s => s.key === key);
        if (idx !== -1) _leadStatusesData[idx] = updated;
        saved++;
      } catch (e) {
        if (labelEl)  labelEl.value   = existing.label;
        if (stageEl)  stageEl.value   = existing.stage || '';
        if (exclEl)   exclEl.checked  = existing.excluded_from_sales;
        if (shortEl)  shortEl.value   = existing.shorthand || '';
        failureMessages.push(`${key}: ${e.message}`);
        failed++;
      }
    }
    if (failed) toast(`Saved ${saved}, failed ${failed}. ${failureMessages[0] || ''}`.trim(), true);
    else toast(`${saved} change${saved !== 1 ? 's' : ''} saved.`);
    _notifyLeadStatusChanged();
  }

  async function saveLeadStatusKey(input) {
    const oldKey = input.dataset.oldKey;
    const newKey = input.value.trim().toUpperCase();
    if (!newKey) return;
    if (!/^[A-Z0-9_]+$/.test(newKey)) { toast('Key may only contain uppercase letters, digits, and underscores.', true); return; }
    try {
      const updated = await api('PATCH', `/api/admin/lead-statuses/${encodeURIComponent(oldKey)}`, { new_key: newKey });
      const idx = _leadStatusesData.findIndex(s => s.key === oldKey);
      if (idx !== -1) _leadStatusesData[idx] = updated;
      renderLeadStatusesTable();
      _notifyLeadStatusChanged();
    } catch (e) {
      toast(`Failed to set key: ${e.message}`, true);
    }
  }

  async function saveLeadStatusLabel(input) {
    const key = input.dataset.key;
    const label = input.value.trim();
    if (!label) { input.value = (_leadStatusesData.find(s => s.key === key)?.label || ''); return; }
    const existing = _leadStatusesData.find(s => s.key === key);
    if (existing && existing.label === label) return;
    try {
      const updated = await api('PATCH', `/api/admin/lead-statuses/${encodeURIComponent(key)}`, { label });
      const idx = _leadStatusesData.findIndex(s => s.key === key);
      if (idx !== -1) _leadStatusesData[idx] = updated;
      _notifyLeadStatusChanged();
    } catch (e) {
      toast(`Failed to save label: ${e.message}`, true);
      input.value = existing?.label || '';
    }
  }

  async function toggleLeadStatusExclusion(checkbox) {
    const key = checkbox.dataset.key;
    const excluded = checkbox.checked;
    try {
      const updated = await api('PATCH', `/api/admin/lead-statuses/${encodeURIComponent(key)}`, { excluded_from_sales: excluded });
      const idx = _leadStatusesData.findIndex(s => s.key === key);
      if (idx !== -1) _leadStatusesData[idx] = updated;
      _notifyLeadStatusChanged();
    } catch (e) {
      toast(`Failed to update: ${e.message}`, true);
      checkbox.checked = !excluded;
    }
  }

  async function moveLeadStatus(key, direction) {
    const idx = _leadStatusesData.findIndex(s => s.key === key);
    if (idx === -1) return;
    const swapIdx = direction === 'up' ? idx - 1 : idx + 1;
    if (swapIdx < 0 || swapIdx >= _leadStatusesData.length) return;

    const a = _leadStatusesData[idx];
    const b = _leadStatusesData[swapIdx];
    const aOrder = a.sort_order;
    const bOrder = b.sort_order;

    try {
      await Promise.all([
        api('PATCH', `/api/admin/lead-statuses/${encodeURIComponent(a.key)}`, { sort_order: bOrder }),
        api('PATCH', `/api/admin/lead-statuses/${encodeURIComponent(b.key)}`, { sort_order: aOrder }),
      ]);
      a.sort_order = bOrder;
      b.sort_order = aOrder;
      _leadStatusesData[idx]     = b;
      _leadStatusesData[swapIdx] = a;
      renderLeadStatusesTable();
      _notifyLeadStatusChanged();
    } catch (e) {
      toast(`Failed to reorder: ${e.message}`, true);
    }
  }

  async function addLeadStatus() {
    const keyInput   = document.getElementById('ls-new-key');
    const labelInput = document.getElementById('ls-new-label');
    const stageInput = document.getElementById('ls-new-stage');
    const errEl      = document.getElementById('ls-add-error');
    const key        = (keyInput?.value || '').trim().toUpperCase();
    const label      = (labelInput?.value || '').trim();
    const stage      = (stageInput?.value || '').trim() || null;

    const showErr = msg => { if (errEl) { errEl.textContent = msg; errEl.style.display = ''; } };
    const clearErr = () => { if (errEl) errEl.style.display = 'none'; };

    if (!key)   { showErr('Key is required.'); return; }
    if (!label) { showErr('Display label is required.'); return; }
    clearErr();

    try {
      const created = await api('POST', '/api/admin/lead-statuses', { key, label, stage });
      _leadStatusesData.push(created);
      if (keyInput)   keyInput.value   = '';
      if (labelInput) labelInput.value = '';
      if (stageInput) stageInput.value = '';
      renderLeadStatusesTable();
      _notifyLeadStatusChanged();
    } catch (e) {
      showErr(e.message || 'Failed to add status.');
    }
  }

              <button class="btn btn-primary" onclick="addLeadStatus()" style="white-space:nowrap;align-self:flex-end;">Add status</button>
            </div>
            <div id="ls-add-error" style="display:none;font-size:.78rem;color:#991b1b;margin-top:6px;"></div>
          </div>
        </div>
      </div>

      <!-- CARD ACTIONS -->
      <div class="tab-panel" id="tab-cardactions">
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;">
            <div>
              <div class="card-title" style="margin:0;">Card action labels</div>
              <p class="card-desc" style="margin:2px 0 0;">The bottom strip on Sales &amp; Survey cards. One row per (stage × lead status); rows mirror the order of the Lead Statuses table in Settings and refresh automatically when that table is reordered or renamed.</p>
            </div>
            <button class="btn btn-primary" style="white-space:nowrap;padding:6px 14px;font-size:.8rem;" onclick="saveAllCardActionLabels()">Save</button>
          </div>

          <div id="card-actions-table-wrap">
            <p style="font-size:.82rem;color:var(--ink-4);">Loading…</p>
          </div>
        </div>
      </div>

      <!-- SEARCH SETTINGS -->
      <div class="tab-panel" id="tab-search">
        <div class="card">
          <div class="card-title">Hint bar text</div>
          <p class="card-desc" style="margin-bottom:14px;">The placeholder shown in the ghost search bar beneath the header on every page. Leave blank to use the default: <em>Search customers, actions…</em></p>
          <div style="display:flex;gap:10px;align-items:center;">
            <input id="ss-hint-placeholder" type="text" class="field"
              maxlength="120" placeholder="Search customers, actions…" style="flex:1;">
          </div>
        </div>
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px;flex-wrap:wrap;">
            <div>
              <div class="card-title" style="margin-bottom:2px;">Quick actions</div>
              <p class="card-desc" style="margin:0;">Toggle which actions appear in the palette and drag rows to reorder them.</p>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              <span id="ss-save-status" style="font-size:.8rem;"></span>
              <button class="btn btn-primary" onclick="saveSearchSettings()" style="white-space:nowrap;padding:6px 16px;">Save</button>
            </div>
          </div>
          <div id="ss-actions-list" style="margin-top:10px;"></div>
        </div>
      </div>
    `;

    renderTeam();
    renderJobRoles();
    renderRequests();
    renderPhotoRequests();
    renderTradeSubmissions();
    await initAuditLog();

    const validTabs = ['team', 'permissions', 'requests', 'auditlog', 'settings', 'cardactions', 'search'];
    let savedTab;
    try { savedTab = localStorage.getItem('adminActiveTab'); } catch (_) {}
    if (savedTab && validTabs.includes(savedTab)) {
      if (savedTab === 'settings') { switchTab('settings'); loadHubspotStatus(); loadLeadStatusesAdmin(); }
      else if (savedTab === 'cardactions') { switchTab('cardactions'); loadCardActionsAdmin(); }
      else if (savedTab === 'search') { switchTab('search'); loadSearchSettings(); }
      else { switchTab(savedTab); }
    }
  }

  document.addEventListener('click', async function(e) {
    const resendBtn = e.target.closest('[data-resend-email]');
    if (resendBtn) {
      e.preventDefault();
      await resendSetPassword(resendBtn.dataset.resendEmail, resendBtn);
      return;
    }
    const forceResetBtn = e.target.closest('[data-force-reset-email]');
    if (forceResetBtn) {
      e.preventDefault();
      await forcePasswordReset(forceResetBtn.dataset.forceResetEmail, forceResetBtn);
      return;
    }
    const revokeBtn = e.target.closest('[data-revoke-email]');
    if (revokeBtn) {
      e.preventDefault();
      await revoke(revokeBtn.dataset.revokeEmail);
    }
  });

  // ── Search Settings tab ──────────────────────────────────────────────────────
  const SEARCH_ACTIONS_META = [
    { id: 'new-customer',     label: 'New customer',             category: 'Action',   hint: 'Create a new customer record' },
    { id: 'go-customers',     label: 'All customers',            category: 'Navigate', hint: 'Browse your customer list' },
    { id: 'go-home',          label: 'Home dashboard',           category: 'Navigate', hint: 'Go to the main dashboard' },
    { id: 'go-sales',         label: 'Sales board',              category: 'Navigate', hint: 'Manage leads and open deals' },
    { id: 'go-survey',        label: 'Survey pipeline',          category: 'Navigate', hint: 'Track survey and design visit stages' },
    { id: 'go-projects',      label: 'Projects tracker',         category: 'Navigate', hint: 'Active workshop and delivery jobs' },
    { id: 'go-calendar',      label: 'Calendar',                 category: 'Navigate', hint: 'Appointments and scheduled visits' },
    { id: 'go-invoices',      label: 'Invoices & payments',      category: 'Navigate', hint: 'View and send invoices via QuickBooks' },
    { id: 'go-trades',        label: 'Trade contacts',           category: 'Navigate', hint: 'Suppliers and contractor directory' },
    { id: 'go-ideas',         label: 'Ideas board',              category: 'Navigate', hint: 'Capture and review design ideas' },
    { id: 'go-admin',         label: 'Admin panel',              category: 'Navigate', hint: 'Manage users and team access' },
    { id: 'go-profile',       label: 'Your profile',             category: 'Account',  hint: 'Update your account details' },
    { id: 'filter-sales',     label: 'Customers · Sales stage',  category: 'Filter',   hint: 'Show only customers in the Sales stage' },
    { id: 'filter-workshop',  label: 'Customers · Workshop',     category: 'Filter',   hint: 'Show only customers in Workshop' },
    { id: 'sign-out',         label: 'Sign out',                 category: 'Account',  hint: 'End your current session' },
  ];

  let _ssLoaded = false;
  let _ssDisabled = new Set();
  let _ssOrder = [];
  let _ssDragSrc = null;

  async function loadSearchSettings() {
    if (_ssLoaded) return;
    const listEl = document.getElementById('ss-actions-list');
    const phEl   = document.getElementById('ss-hint-placeholder');
    if (!listEl) return;
    try {
      const data = await api('GET', '/api/admin/search-settings');
      _ssDisabled = new Set(data.disabled_actions || []);
      _ssOrder = (data.action_order && data.action_order.length)
        ? data.action_order
        : SEARCH_ACTIONS_META.map(a => a.id);
      if (phEl) phEl.value = data.hint_placeholder || '';
      _ssLoaded = true;
      renderSearchActionsList();
    } catch (e) {
      if (listEl) listEl.innerHTML = `<p style="color:#991b1b;font-size:.82rem;">Could not load: ${esc(e.message)}</p>`;
    }
  }

  function _ssGetOrdered() {
    const mapped = _ssOrder.map(id => SEARCH_ACTIONS_META.find(a => a.id === id)).filter(Boolean);
    const extra  = SEARCH_ACTIONS_META.filter(a => !_ssOrder.includes(a.id));
    return [...mapped, ...extra];
  }

  function renderSearchActionsList() {
    const el = document.getElementById('ss-actions-list');
    if (!el) return;
    el.innerHTML = _ssGetOrdered().map(a => {
      const on = !_ssDisabled.has(a.id);
      return `<div class="ss-action-row${on ? '' : ' ss-action-disabled'}" draggable="true" data-id="${esc(a.id)}"
        ondragstart="_ssDragStart(event,'${esc(a.id)}')" ondragover="_ssDragOver(event)"
        ondrop="_ssDrop(event,'${esc(a.id)}')" ondragleave="_ssDragLeave(event)" ondragend="_ssDragEnd()">
        <span class="ss-drag-handle" title="Drag to reorder">⠿</span>
        <label class="ss-toggle" title="${on ? 'Disable' : 'Enable'}">
          <input type="checkbox" ${on ? 'checked' : ''} onchange="_ssToggle('${esc(a.id)}',this.checked)">
          <span class="ss-toggle-track"></span>
        </label>
        <span class="ss-action-label">${esc(a.label)}</span>
        <span class="ss-action-category">${esc(a.category)}</span>
        <span class="ss-action-hint">${esc(a.hint)}</span>
      </div>`;
    }).join('');
  }

  function _ssToggle(id, checked) {
    if (checked) _ssDisabled.delete(id); else _ssDisabled.add(id);
    const row = document.querySelector(`.ss-action-row[data-id="${id}"]`);
    if (row) row.classList.toggle('ss-action-disabled', !checked);
  }

  function _ssDragStart(e, id) {
    _ssDragSrc = id;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => { const r = document.querySelector(`.ss-action-row[data-id="${id}"]`); if (r) r.classList.add('ss-dragging'); }, 0);
  }
  function _ssDragOver(e) {
    e.preventDefault(); e.dataTransfer.dropEffect = 'move';
    const row = e.target.closest('.ss-action-row');
    if (row && row.dataset.id !== _ssDragSrc) row.classList.add('ss-drag-over');
    return false;
  }
  function _ssDragLeave(e) {
    const row = e.target.closest('.ss-action-row');
    if (row) row.classList.remove('ss-drag-over');
  }
  function _ssDrop(e, id) {
    e.preventDefault();
    document.querySelectorAll('.ss-action-row').forEach(r => r.classList.remove('ss-drag-over'));
    if (_ssDragSrc === id) return;
    const ordered = _ssGetOrdered().map(a => a.id);
    const fi = ordered.indexOf(_ssDragSrc), ti = ordered.indexOf(id);
    if (fi === -1 || ti === -1) return;
    ordered.splice(fi, 1);
    ordered.splice(ti, 0, _ssDragSrc);
    _ssOrder = ordered;
    renderSearchActionsList();
  }
  function _ssDragEnd() {
    _ssDragSrc = null;
    document.querySelectorAll('.ss-action-row').forEach(r => r.classList.remove('ss-dragging', 'ss-drag-over'));
  }

  async function saveSearchSettings() {
    const btn      = document.querySelector('[onclick="saveSearchSettings()"]');
    const phEl     = document.getElementById('ss-hint-placeholder');
    const statusEl = document.getElementById('ss-save-status');
    if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
    try {
      await api('PUT', '/api/admin/search-settings', {
        disabled_actions: Array.from(_ssDisabled),
        hint_placeholder: phEl ? phEl.value.trim() : '',
        action_order:     _ssGetOrdered().map(a => a.id),
      });
      if (statusEl) {
        statusEl.textContent = 'Saved ✓';
        statusEl.style.color = '#166534';
        setTimeout(() => { statusEl.textContent = ''; }, 2500);
      }
    } catch (e) {
      if (statusEl) { statusEl.textContent = 'Save failed: ' + e.message; statusEl.style.color = '#991b1b'; }
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = 'Save'; }
    }
  }

  init();
</script>
</body>
</html>
