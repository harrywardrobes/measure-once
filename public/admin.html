  async function saveAllLeadStatuses() {
    const rows = document.querySelectorAll('#lead-statuses-table-wrap tr[data-ls-key]');
    const changed = [];
    rows.forEach(row => {
      const key      = row.dataset.lsKey;
      const existing = _leadStatusesData.find(s => s.key === key);
      if (!existing) return;
      const labelEl   = row.querySelector('.ls-label-input');
      const stageEl   = row.querySelector('.ls-stage-select');
      const exclEl    = row.querySelector('input[type="checkbox"]');
      const shortEl   = row.querySelector('.ls-shorthand-input');
      const newLabel     = labelEl  ? labelEl.value.trim()      : existing.label;
      const newStage     = stageEl  ? (stageEl.value || null)   : existing.stage;
      const newExcl      = exclEl   ? exclEl.checked             : existing.excluded_from_sales;
      const newShorthand = shortEl  ? shortEl.value.trim().toUpperCase() : (existing.shorthand || '');
      const curShorthand = (existing.shorthand || '').toUpperCase();
      const diff = {};
      if (newLabel !== existing.label)                 diff.label = newLabel;
      if (newStage !== (existing.stage || null))       diff.stage = newStage;
      if (newExcl  !== existing.excluded_from_sales)   diff.excluded_from_sales = newExcl;
      if (newShorthand && newShorthand !== curShorthand) {
        if (!/^[A-Z0-9]{4}$/.test(newShorthand)) {
          toast(`Shorthand for ${key} must be 4 characters (A–Z, 0–9).`, true);
          if (shortEl) shortEl.value = curShorthand;
          return;
        }
        diff.shorthand = newShorthand;
      }
      if (!newLabel) return;
      if (Object.keys(diff).length) changed.push({ key, diff, labelEl, stageEl, exclEl, shortEl, existing });
    });
    if (!changed.length) { toast('No changes to save.'); return; }
    let saved = 0, failed = 0;
    const failureMessages = [];
    for (const { key, diff, labelEl, stageEl, exclEl, shortEl, existing } of changed) {
      try {
        const updated = await api('PATCH', `/api/admin/lead-statuses/${encodeURIComponent(key)}`, diff);
        const idx = _leadStatusesData.findIndex(s => s.key === key);
        if (idx !== -1) _leadStatusesData[idx] = updated;
        saved++;
      } catch (e) {
        if (labelEl)  labelEl.value   = existing.label;
        if (stageEl)  stageEl.value   = existing.stage || '';
        if (exclEl)   exclEl.checked  = existing.excluded_from_sales;
        if (shortEl)  shortEl.value   = existing.shorthand || '';
        failureMessages.push(`${key}: ${e.message}`);
        failed++;
      }
    }
    if (failed) toast(`Saved ${saved}, failed ${failed}. ${failureMessages[0] || ''}`.trim(), true);
    else toast(`${saved} change${saved !== 1 ? 's' : ''} saved.`);
    _notifyLeadStatusChanged();
  }

  async function saveLeadStatusKey(input) {
    const oldKey = input.dataset.oldKey;
    const newKey = input.value.trim().toUpperCase();
    if (!newKey) return;
    if (!/^[A-Z0-9_]+$/.test(newKey)) { toast('Key may only contain uppercase letters, digits, and underscores.', true); return; }
    try {
      const updated = await api('PATCH', `/api/admin/lead-statuses/${encodeURIComponent(oldKey)}`, { new_key: newKey });
      const idx = _leadStatusesData.findIndex(s => s.key === oldKey);
      if (idx !== -1) _leadStatusesData[idx] = updated;
      renderLeadStatusesTable();
      _notifyLeadStatusChanged();
    } catch (e) {
      toast(`Failed to set key: ${e.message}`, true);
    }
  }

  async function saveLeadStatusLabel(input) {
    const key = input.dataset.key;
    const label = input.value.trim();
    if (!label) { input.value = (_leadStatusesData.find(s => s.key === key)?.label || ''); return; }
    const existing = _leadStatusesData.find(s => s.key === key);
    if (existing && existing.label === label) return;
    try {
      const updated = await api('PATCH', `/api/admin/lead-statuses/${encodeURIComponent(key)}`, { label });
      const idx = _leadStatusesData.findIndex(s => s.key === key);
      if (idx !== -1) _leadStatusesData[idx] = updated;
      _notifyLeadStatusChanged();
    } catch (e) {
      toast(`Failed to save label: ${e.message}`, true);
      input.value = existing?.label || '';
    }
  }

  async function toggleLeadStatusExclusion(checkbox) {
    const key = checkbox.dataset.key;
    const excluded = checkbox.checked;
    try {
      const updated = await api('PATCH', `/api/admin/lead-statuses/${encodeURIComponent(key)}`, { excluded_from_sales: excluded });
      const idx = _leadStatusesData.findIndex(s => s.key === key);
      if (idx !== -1) _leadStatusesData[idx] = updated;
      _notifyLeadStatusChanged();
    } catch (e) {
      toast(`Failed to update: ${e.message}`, true);
      checkbox.checked = !excluded;
    }
  }

  async function moveLeadStatus(key, direction) {
    const idx = _leadStatusesData.findIndex(s => s.key === key);
    if (idx === -1) return;
    const swapIdx = direction === 'up' ? idx - 1 : idx + 1;
    if (swapIdx < 0 || swapIdx >= _leadStatusesData.length) return;

    const a = _leadStatusesData[idx];
    const b = _leadStatusesData[swapIdx];
    const aOrder = a.sort_order;
    const bOrder = b.sort_order;

    try {
      await Promise.all([
        api('PATCH', `/api/admin/lead-statuses/${encodeURIComponent(a.key)}`, { sort_order: bOrder }),
        api('PATCH', `/api/admin/lead-statuses/${encodeURIComponent(b.key)}`, { sort_order: aOrder }),
      ]);
      a.sort_order = bOrder;
      b.sort_order = aOrder;
      _leadStatusesData[idx]     = b;
      _leadStatusesData[swapIdx] = a;
      renderLeadStatusesTable();
      _notifyLeadStatusChanged();
    } catch (e) {
      toast(`Failed to reorder: ${e.message}`, true);
    }
  }

  async function addLeadStatus() {
    const keyInput   = document.getElementById('ls-new-key');
    const labelInput = document.getElementById('ls-new-label');
    const stageInput = document.getElementById('ls-new-stage');
    const errEl      = document.getElementById('ls-add-error');
    const key        = (keyInput?.value || '').trim().toUpperCase();
    const label      = (labelInput?.value || '').trim();
    const stage      = (stageInput?.value || '').trim() || null;

    const showErr = msg => { if (errEl) { errEl.textContent = msg; errEl.style.display = ''; } };
    const clearErr = () => { if (errEl) errEl.style.display = 'none'; };

    if (!key)   { showErr('Key is required.'); return; }
    if (!label) { showErr('Display label is required.'); return; }
    clearErr();

    try {
      const created = await api('POST', '/api/admin/lead-statuses', { key, label, stage });
      _leadStatusesData.push(created);
      if (keyInput)   keyInput.value   = '';
      if (labelInput) labelInput.value = '';
      if (stageInput) stageInput.value = '';
      renderLeadStatusesTable();
      _notifyLeadStatusChanged();
    } catch (e) {
      showErr(e.message || 'Failed to add status.');
    }
  }

    const validTabs = ['team', 'permissions', 'requests', 'auditlog', 'settings', 'cardactions', 'actionhandlers', 'designvisit', 'search', 'workshop', 'designsystem', 'devenv'];
    let savedTab;
    try { savedTab = localStorage.getItem('adminActiveTab'); } catch (_) {}
    if (savedTab && validTabs.includes(savedTab)) {
      if (savedTab === 'settings') { switchTab('settings'); loadHubspotStatus(); loadLeadStatusesAdmin(); loadDevTestUsers(); }
      else if (savedTab === 'cardactions') { switchTab('cardactions'); loadCardActionsAdmin(); }
      else if (savedTab === 'actionhandlers') { switchTab('actionhandlers'); loadCardActionHandlersAdmin(); }
      else if (savedTab === 'designvisit') { switchTab('designvisit'); loadDvCatalogue(); }
      else if (savedTab === 'search') { switchTab('search'); }
      else if (savedTab === 'workshop') { switchTab('workshop'); }
      else if (savedTab === 'designsystem') { switchTab('designsystem'); }
      else { switchTab(savedTab); }
    }

    // Apply _devMode guard: hide Dev environment tab unless devMode is confirmed
    _applyDevEnvTabVisibility();
  }

      } catch { _devMode = false; }

  // ── Catalogue move helper ─────────────────────────────────────────────────
  async function moveDvItem(type, id, direction) {
    const cacheMap = {
      handle:       _dvHandlesData,
      furniture:    _dvFurnitureData,
      'door-style': _dvDoorStylesData,
    };
    const endpointMap = {
      handle:       '/api/admin/design-visit-handles',
      furniture:    '/api/admin/design-visit-furniture-ranges',
      'door-style': '/api/admin/design-visit-door-styles',
    };
    const wrapIdMap = {
      handle:       'dv-handles-wrap',
      furniture:    'dv-furniture-wrap',
      'door-style': 'dv-door-styles-wrap',
    };
    const cache = cacheMap[type];
    if (!cache) return;
    const sorted = [...cache].sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0) || a.id - b.id);
    const idx = sorted.findIndex(s => s.id === id);
    if (idx === -1) return;
    const swapIdx = direction === 'up' ? idx - 1 : idx + 1;
    if (swapIdx < 0 || swapIdx >= sorted.length) return;
    const a = sorted[idx];
    const b = sorted[swapIdx];
    if ((a.sort_order || 0) === (b.sort_order || 0)) {
      sorted.forEach((s, i) => { s.sort_order = i; });
    }
    const aOrder = a.sort_order;
    const bOrder = b.sort_order;
    try {
      await Promise.all([
        api('PATCH', `${endpointMap[type]}/${a.id}`, { sort_order: bOrder }),
        api('PATCH', `${endpointMap[type]}/${b.id}`, { sort_order: aOrder }),
      ]);
      a.sort_order = bOrder;
      b.sort_order = aOrder;
      const wrap = document.getElementById(wrapIdMap[type]);
      if (type === 'handle') {
        renderDvHandleList(wrap, _dvHandlesData);
      } else if (type === 'furniture') {
        renderDvList(wrap, _dvFurnitureData, 'furniture', { fields: ['name','description'], labels: ['Name','Description'] });
      } else {
        renderDvList(wrap, _dvDoorStylesData, 'door-style', { fields: ['name','image_url'], labels: ['Name','Image URL'] });
      }
      _broadcastDvCatalogueChange(type);
    } catch (e) {
      toast(`Failed to reorder: ${e.message}`, true);
    }
  }
  window.moveDvItem = moveDvItem;

  // ── Catalogue drag-and-drop reorder ───────────────────────────────────────
  const _DV_ENDPOINT_MAP = {
    handle:       '/api/admin/design-visit-handles',
    furniture:    '/api/admin/design-visit-furniture-ranges',
    'door-style': '/api/admin/design-visit-door-styles',
  };
  const _DV_WRAP_ID_MAP = {
    handle:       'dv-handles-wrap',
    furniture:    'dv-furniture-wrap',
    'door-style': 'dv-door-styles-wrap',
  };
  function _dvCacheFor(type) {
    if (type === 'handle')      return _dvHandlesData;
    if (type === 'furniture')   return _dvFurnitureData;
    if (type === 'door-style')  return _dvDoorStylesData;
    return null;
  }
  function _rerenderDvType(type) {
    const wrap = document.getElementById(_DV_WRAP_ID_MAP[type]);
    if (!wrap) return;
    if (type === 'handle') {
      renderDvHandleList(wrap, _dvHandlesData);
    } else if (type === 'furniture') {
      renderDvList(wrap, _dvFurnitureData, 'furniture', { fields: ['name','description'], labels: ['Name','Description'] });
    } else {
      renderDvList(wrap, _dvDoorStylesData, 'door-style', { fields: ['name','image_url'], labels: ['Name','Image URL'] });
    }
  }
  async function _reorderDvItems(type, newOrderIds) {
    const cache = _dvCacheFor(type);
    const endpoint = _DV_ENDPOINT_MAP[type];
    if (!cache || !endpoint) return;
    const byId = new Map(cache.map(x => [x.id, x]));
    const patches = [];
    newOrderIds.forEach((id, i) => {
      const item = byId.get(id);
      if (!item) return;
      if ((item.sort_order || 0) !== i) patches.push({ id, newOrder: i, item });
    });
    if (!patches.length) return;
    try {
      await Promise.all(patches.map(p =>
        api('PATCH', `${endpoint}/${p.id}`, { sort_order: p.newOrder })
      ));
      patches.forEach(p => { p.item.sort_order = p.newOrder; });
      _rerenderDvType(type);
      _broadcastDvCatalogueChange(type);
    } catch (e) {
      toast(`Failed to reorder: ${e.message}`, true);
      if (type === 'handle')      loadDvHandles();
      else if (type === 'furniture')  loadDvFurniture();
      else if (type === 'door-style') loadDvDoorStyles();
    }
  }
  function _attachDvDragHandlers(wrap, type) {
    const tbody = wrap && wrap.querySelector('tbody');
    if (!tbody) return;
    let draggedRow = null;
    const clearMarkers = () => {
      tbody.querySelectorAll('tr').forEach(r => {
        r.style.borderTop = '';
        r.style.borderBottom = '';
      });
    };
    tbody.querySelectorAll('tr[draggable="true"]').forEach(tr => {
      tr.addEventListener('dragstart', (e) => {
        draggedRow = tr;
        tr.style.opacity = '0.4';
        if (e.dataTransfer) {
          e.dataTransfer.effectAllowed = 'move';
          try { e.dataTransfer.setData('text/plain', tr.dataset.id || ''); } catch {}
        }
      });
      tr.addEventListener('dragend', () => {
        tr.style.opacity = '';
        clearMarkers();
        draggedRow = null;
      });
      tr.addEventListener('dragover', (e) => {
        if (!draggedRow || draggedRow === tr) return;
        e.preventDefault();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
        const rect = tr.getBoundingClientRect();
        const before = (e.clientY - rect.top) < rect.height / 2;
        clearMarkers();
        tr.style[before ? 'borderTop' : 'borderBottom'] = '2px solid #2563eb';
      });
      tr.addEventListener('drop', (e) => {
        if (!draggedRow || draggedRow === tr) return;
        e.preventDefault();
        const rect = tr.getBoundingClientRect();
        const before = (e.clientY - rect.top) < rect.height / 2;
        if (before) tbody.insertBefore(draggedRow, tr);
        else        tbody.insertBefore(draggedRow, tr.nextSibling);
        clearMarkers();
        const newOrderIds = Array.from(tbody.querySelectorAll('tr[data-id]'))
          .map(r => Number(r.dataset.id))
          .filter(n => Number.isFinite(n));
        _reorderDvItems(type, newOrderIds);
      });
    });
  }
  const _DV_DRAG_HANDLE_CELL =
    `<td class="adm-dv-drag-cell" title="Drag to reorder" aria-hidden="true">⋮⋮</td>`;
  const _DV_DRAG_HANDLE_TH =
    `<th class="adm-dv-drag-th"></th>`;

  // ── Handles ───────────────────────────────────────────────────────────────

      const items = await api('GET', '/api/admin/design-visit-handles');

    if (!wrap) return;
    const sorted = [...items].sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0) || a.id - b.id);
    if (!sorted.length) {
      wrap.innerHTML = `<p class="admin-msg admin-msg--muted">None added yet.</p>`;
      return;
    }
    wrap.innerHTML = `
      <table class="adm-table">
        <thead>
          <tr class="adm-tr">
            ${_DV_DRAG_HANDLE_TH}
            <th class="adm-th">Image</th>
            <th class="adm-th">Name</th>
            <th class="adm-th">Style</th>
            <th class="adm-dv-actions-th"></th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${sorted.map((item, i) => `
            <tr class="adm-tr${i % 2 ? ' adm-tr--alt' : ''}" draggable="true" data-id="${item.id}">
              ${_DV_DRAG_HANDLE_CELL}
              <td class="adm-td">
                ${item.image_url
                  ? `<img src="${esc(item.image_url)}" alt="${esc(item.name)}" class="adm-dv-thumb" onerror="this.style.display='none';">`
                  : '<span class="adm-dv-thumb-empty">—</span>'}
              </td>
              <td class="adm-td">${esc(item.name || '—')}</td>
              <td class="adm-td">${esc(item.style || '—')}</td>
              <td class="adm-td--actions">
                <button class="btn btn-ghost adm-iconbtn--xs" title="Move up"
                  ${i === 0 ? 'disabled' : ''}
                  onclick="moveDvItem('handle', ${item.id}, 'up')">▲</button>
                <button class="btn btn-ghost adm-iconbtn--xs" title="Move down"
                  ${i === sorted.length - 1 ? 'disabled' : ''}
                  onclick="moveDvItem('handle', ${item.id}, 'down')">▼</button>
              </td>
              <td class="adm-td adm-td--right adm-td--nowrap">
                <button class="btn btn-ghost adm-btn-xs"
                  onclick="openDvItemEditor('handle', ${item.id})">Edit</button>
                <button class="btn btn-ghost adm-btn-xs adm-btn-xs--danger"
                  onclick="deleteDvItem('handle', ${item.id})">Delete</button>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>`;
    _attachDvDragHandlers(wrap, 'handle');

    if (!sorted.length) {
      wrap.innerHTML = `<p class="admin-msg admin-msg--muted">None added yet.</p>`;
      return;

      <table class="adm-table">
        <thead>
          <tr class="adm-tr">
            ${_DV_DRAG_HANDLE_TH}
            ${labels.map(l => `<th class="adm-th">${esc(l)}</th>`).join('')}
            <th class="adm-dv-actions-th"></th>

  function _broadcastDvCatalogueChange(type) {
    const chanMap = {
      handle:       'design_visit_handles_changed',
      furniture:    'design_visit_furniture_ranges_changed',
      'door-style': 'design_visit_door_styles_changed',
    };
    const chanName = chanMap[type];
    if (!chanName) return;
    try { const ch = new BroadcastChannel(chanName); ch.postMessage({ ts: Date.now() }); ch.close(); } catch {}
  }

  async function deleteDvItem(type, id) {
    if (!confirm('Delete this item? This cannot be undone.')) return;
    const urlMap = {
      handle:      `/api/admin/design-visit-handles/${id}`,
      furniture:   `/api/admin/design-visit-furniture-ranges/${id}`,
      'door-style': `/api/admin/design-visit-door-styles/${id}`,
    };
    try {
      await api('DELETE', urlMap[type]);
      toast('Deleted.');
      _broadcastDvCatalogueChange(type);
      if (type === 'handle')      return loadDvHandles();
      if (type === 'furniture')   return loadDvFurniture();
      if (type === 'door-style')  return loadDvDoorStyles();
    } catch (e) {
      toast('Delete failed: ' + e.message, true);
    }
  }
  window.deleteDvItem = deleteDvItem;

  function openDvHandleEditor(id)     { openDvItemEditor('handle', id); }
  function openDvFurnitureEditor(id)  { openDvItemEditor('furniture', id); }
  function openDvDoorStyleEditor(id)  { openDvItemEditor('door-style', id); }
  window.openDvHandleEditor     = openDvHandleEditor;
  window.openDvFurnitureEditor  = openDvFurnitureEditor;
  window.openDvDoorStyleEditor  = openDvDoorStyleEditor;

  const DV_HANDLE_STYLES = ['Cup', 'Bar', 'Knob', 'Pull', 'Finger Pull', 'Other'];

  async function openDvItemEditor(type, existingId) {
    let item = null;
    if (existingId) {
      try {
        const listUrl = {
          handle:      '/api/admin/design-visit-handles',
          furniture:   '/api/admin/design-visit-furniture-ranges',
          'door-style': '/api/admin/design-visit-door-styles',
        }[type];
        const list = await api('GET', listUrl);
        item = list.find(x => x.id === existingId) || null;
      } catch {}
    }
    const typeLabels = {
      handle:      'Handle', furniture: 'Furniture Range', 'door-style': 'Door Style',
    };
    const hasDescription = (type === 'furniture');
    const hasStyleSelect = (type === 'handle');
    const hasImageUrl    = (type !== 'furniture');
    const wrap = document.createElement('div');
    wrap.className = 'js-modal-scrim js-modal-scrim--below';
    wrap.innerHTML = `
      <div class="adm-modal-card adm-modal-card--narrow">
        <h3 class="adm-modal-title">${item ? 'Edit' : 'Add'} ${esc(typeLabels[type])}</h3>
        <label class="adm-modal-label adm-modal-label--first">Name <span class="adm-req">*</span></label>
        <input id="dvie-name" type="text" class="field adm-field-name" maxlength="200" value="${esc(item?.name || '')}">
        ${hasStyleSelect ? `
          <label class="adm-modal-label">Style${item ? '' : ' <span class="adm-req">*</span>'}</label>
          <select id="dvie-style" class="field adm-field-sm">
            <option value="">— select —</option>
            ${DV_HANDLE_STYLES.map(s => `<option value="${esc(s)}"${item?.style === s ? ' selected' : ''}>${esc(s)}</option>`).join('')}
          </select>
        ` : ''}
        ${hasDescription ? `
          <label class="adm-modal-label">Description</label>
          <textarea id="dvie-desc" class="field adm-field-resize" rows="2" maxlength="500">${esc(item?.description || '')}</textarea>
        ` : ''}
        ${hasImageUrl ? `
          <label class="adm-modal-label">Image${type === 'handle' ? '' : ' URL'}</label>
          ${type === 'handle' ? `
            <div id="dvie-img-preview-wrap" class="adm-dv-preview-wrap"${item?.image_url ? '' : ' hidden'}>
              <img id="dvie-img-preview" src="${esc(item?.image_url || '')}" alt="Current image" class="adm-dv-preview">
            </div>
            <input id="dvie-img-file" type="file" accept="image/*" class="field adm-field-file">
          ` : `
            <input id="dvie-img" type="url" class="field adm-field-sm" maxlength="500" value="${esc(item?.image_url || '')}" placeholder="https://…">
          `}
        ` : ''}
        <div id="dvie-err" class="adm-err-line"></div>
        <div class="adm-modal-actions">
          <button class="btn btn-ghost" id="dvie-cancel">Cancel</button>
          <button class="btn btn-primary" id="dvie-save">${item ? 'Save' : 'Add'}</button>
        </div>
      </div>`;
    document.body.appendChild(wrap);
    wrap.addEventListener('click', e => { if (e.target === wrap) wrap.remove(); });
    wrap.querySelector('#dvie-cancel').addEventListener('click', () => wrap.remove());

    // Live preview for handle file upload
    if (type === 'handle') {
      const fileInput = wrap.querySelector('#dvie-img-file');
      if (fileInput) {
        fileInput.addEventListener('change', () => {
          const f = fileInput.files[0];
          if (!f) return;
          const previewWrap = wrap.querySelector('#dvie-img-preview-wrap');
          const previewImg  = wrap.querySelector('#dvie-img-preview');
          const url = URL.createObjectURL(f);
          previewImg.src = url;
          previewWrap.hidden = false;
        });
      }
    }

    wrap.querySelector('#dvie-save').addEventListener('click', async () => {
      const errEl   = wrap.querySelector('#dvie-err');
      const saveBtn = wrap.querySelector('#dvie-save');
      const origLabel = saveBtn.textContent;
      errEl.textContent = '';

      const name = wrap.querySelector('#dvie-name').value.trim();
      if (!name) { errEl.textContent = 'Name is required.'; return; }

      const styleValue = hasStyleSelect ? (wrap.querySelector('#dvie-style').value || '') : '';
      if (hasStyleSelect && !item && !styleValue) {
        errEl.textContent = 'Style is required.';
        return;
      }

      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving…';

      const payload = { name };
      if (hasStyleSelect) payload.style = styleValue || null;
      if (hasDescription) payload.description = wrap.querySelector('#dvie-desc').value;

      const postUrl = {
        handle:      '/api/admin/design-visit-handles',
        furniture:   '/api/admin/design-visit-furniture-ranges',
        'door-style': '/api/admin/design-visit-door-styles',
      }[type];

      try {
        let savedId = item?.id;
        if (item) {
          if (type !== 'handle') payload.image_url = wrap.querySelector('#dvie-img')?.value || '';
          await api('PATCH', `${postUrl}/${item.id}`, payload);
          toast('Saved.');
        } else {
          if (type !== 'handle') payload.image_url = wrap.querySelector('#dvie-img')?.value || '';
          const created = await api('POST', postUrl, payload);
          savedId = created.id;
          toast('Added.');
        }

        // Upload image file for handles
        if (type === 'handle' && savedId) {
          const fileInput = wrap.querySelector('#dvie-img-file');
          if (fileInput && fileInput.files[0]) {
            const fd = new FormData();
            fd.append('image', fileInput.files[0]);
            const uploadRes = await fetch(`/api/admin/dv-handles/${savedId}/image`, {
              method: 'POST',
              body: fd,
            });
            if (!uploadRes.ok) {
              const err = await uploadRes.json().catch(() => ({}));
              errEl.textContent = 'Image upload failed: ' + (err.error || uploadRes.status);
              saveBtn.disabled = false;
              saveBtn.textContent = origLabel;
              // Item was saved; refresh list but keep modal open for retry
              _broadcastDvCatalogueChange(type);
              loadDvHandles();
              return;
            }
          }
        }

        _broadcastDvCatalogueChange(type);
        wrap.remove();
        if (type === 'handle')      loadDvHandles();
        if (type === 'furniture')   loadDvFurniture();
        if (type === 'door-style')  loadDvDoorStyles();
      } catch (e) {
        errEl.textContent = e.message || 'Save failed.';
        saveBtn.disabled = false;
        saveBtn.textContent = origLabel;
      }
    });
  }
  window.openDvItemEditor = openDvItemEditor;

  // ── T&C version history ───────────────────────────────────────────────────
  async function loadDvTerms() {
    const currentEl = document.getElementById('dv-terms-current');
    const historyEl = document.getElementById('dv-terms-history');
    if (!currentEl) return;
    try {
      const versions = await api('GET', '/api/admin/terms-conditions/versions');
      if (!versions.length) {
        currentEl.innerHTML = `<p class="adm-terms-empty">No terms published yet. Click "Publish new version" to add the first version.</p>`;
        if (historyEl) historyEl.innerHTML = '';
        return;
      }
      const latest = versions[0];
      const fmtDate = d => new Date(d).toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' });
      // Current version display
      currentEl.innerHTML = `
        <div class="adm-terms-current-head">
          <span class="adm-terms-version-pill adm-terms-version-pill--current">v${latest.version_number} (current)</span>
          <span class="adm-terms-meta">Published ${fmtDate(latest.created_at)} by ${esc(latest.created_by || '—')}</span>
        </div>
        <div class="adm-terms-body">${esc(latest.terms_text) || '<em class="adm-terms-empty-inline">Empty</em>'}</div>`;
      // Version history (all versions except current)
      if (historyEl) {
        const older = versions.slice(1);
        if (!older.length) { historyEl.innerHTML = ''; return; }
        historyEl.innerHTML = `
          <details class="adm-terms-history">
            <summary class="adm-terms-history-summary">Version history (${older.length} older revision${older.length > 1 ? 's' : ''})</summary>
            <div class="adm-terms-history-list">
              ${older.map(v => `
                <details class="adm-terms-history-item">
                  <summary class="adm-terms-history-item-summary">
                    <span class="adm-terms-version-pill">v${v.version_number}</span>
                    <span class="adm-terms-meta">${fmtDate(v.created_at)} · ${esc(v.created_by || '—')}</span>
                  </summary>
                  <div class="adm-terms-history-body">${esc(v.terms_text)}</div>
                </details>`).join('')}
            </div>
          </details>`;
      }
    } catch (e) {
      if (currentEl) currentEl.innerHTML = `<p class="admin-msg admin-msg--error">Could not load terms versions: ${esc(e.message)}</p>`;
    }
  }

  function openPublishTermsEditor() {
    const editor = document.getElementById('dv-terms-editor');
    const textarea = document.getElementById('dv-terms-new-text');
    const errEl = document.getElementById('dv-terms-publish-err');
    if (!editor) return;
    if (errEl) { errEl.style.display = 'none'; errEl.textContent = ''; }
    if (textarea) textarea.value = '';
    editor.style.display = '';
    textarea && textarea.focus();
  }
  window.openPublishTermsEditor = openPublishTermsEditor;

  function closeDvTermsEditor() {
    const editor = document.getElementById('dv-terms-editor');
    if (editor) editor.style.display = 'none';
  }
  window.closeDvTermsEditor = closeDvTermsEditor;

  async function publishDvTermsVersion() {
    const textarea = document.getElementById('dv-terms-new-text');
    const errEl = document.getElementById('dv-terms-publish-err');
    if (!textarea) return;
    const text = textarea.value.trim();
    if (!text) {
      if (errEl) { errEl.textContent = 'Terms text cannot be empty.'; errEl.style.display = ''; }
      return;
    }
    try {
      await api('POST', '/api/admin/terms-conditions/versions', { terms_text: text });
      closeDvTermsEditor();
      toast('New terms version published.');
      await loadDvTerms();
    } catch (e) {
      if (errEl) { errEl.textContent = e.message || 'Publish failed.'; errEl.style.display = ''; }
    }
  }
  window.publishDvTermsVersion = publishDvTermsVersion;

  // ── Search Settings tab ──────────────────────────────────────────────────────
  // Now a React island — see src/react/pages/SearchSettingsPage.tsx. The
  // /react/main.js bundle self-mounts into #tab-search on load, so no helpers
  // need to live here. The vanilla SEARCH_ACTIONS_META list and all _ss*
  // helpers were removed when the tab was ported.

  // Workshop Settings tab is now a React island
  // (src/react/pages/WorkshopSettingsPage.tsx).

  init();
</script>
</body>
</html>
