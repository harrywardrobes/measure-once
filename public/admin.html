<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin · Measure Once</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .header-icon-btn, .cp-hint-bar { display: none !important; }
    /* ── Admin-specific layout ── */
    body { min-height: 100vh; }

    .page { max-width: 1000px; margin: 0 auto; padding: 28px 20px 60px; }
    .page-title { font-size: 1.25rem; font-weight: 700; margin: 0 0 2px; }
    .page-sub { color: var(--ink-3); font-size: .88rem; margin: 0 0 22px; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 2px;
      border-bottom: 2px solid var(--stone);
      margin-bottom: 24px;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
    }
    .tab-btn {
      padding: 9px 16px;
      font-size: .82rem;
      font-weight: 600;
      color: var(--ink-3);
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      transition: color .15s, background .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tab-btn:hover { color: var(--ink-1); background: var(--stone-soft); }
    .tab-btn.active { color: var(--plum); border-bottom-color: var(--plum); }

    .tab-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      background: var(--orchid);
      color: #fff;
      border-radius: var(--radius-pill);
      font-size: .65rem;
      font-weight: 700;
      margin-left: 5px;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Card ── */
    .card {
      background: var(--chalk);
      border: 1px solid var(--stone);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }
    .card-title {
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--ink-3);
      margin: 0 0 16px;
    }
    .card-count { font-weight: 400; color: var(--ink-4); }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    th {
      text-align: left;
      padding: 8px 12px;
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--ink-4);
      border-bottom: 1px solid var(--stone);
    }
    td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--stone-soft);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    .table-empty {
      text-align: center;
      padding: 28px;
      color: var(--ink-4);
      font-style: italic;
      font-size: .875rem;
    }

    /* ── Privilege level badges ── */
    .lvl {
      display: inline-block;
      padding: 2px 9px;
      border-radius: var(--radius-pill);
      font-size: .7rem;
      font-weight: 700;
      text-transform: capitalize;
      letter-spacing: .02em;
    }
    .lvl-viewer  { background: #f3f4f6; color: #6b7280; }
    .lvl-member  { background: #e5e7eb; color: #374151; }
    .lvl-manager { background: #6b7280; color: #fff; }
    .lvl-admin   { background: #111827; color: #fff; }

    /* ── Status badges ── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: var(--radius-pill);
      font-size: .7rem;
      font-weight: 600;
      text-transform: capitalize;
    }
    .badge-pending  { background: #fef3c7; color: #92400e; }
    .badge-approved { background: #dcfce7; color: #166534; }
    .badge-rejected { background: #fee2e2; color: #991b1b; }

    /* ── Avatar ── */
    .avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .avatar-placeholder {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--stone);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: .68rem;
      font-weight: 700;
      color: var(--ink-3);
      flex-shrink: 0;
    }
    .user-cell { display: flex; align-items: center; gap: 10px; }
    .user-cell-name { font-weight: 600; font-size: .875rem; }
    .user-cell-role { font-size: .72rem; color: var(--ink-4); margin-top: 1px; }

    /* ── Buttons ── */
    .btn {
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      padding: 8px 16px;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s, opacity .15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .btn-primary { background: var(--plum); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #2e0f5a; }
    .btn-danger  { background: var(--chalk); color: #991b1b; border-color: #fecaca; }
    .btn-danger:hover:not(:disabled)  { background: #fee2e2; }
    .btn-ghost   { background: var(--chalk); color: var(--ink-2); border-color: var(--stone); }
    .btn-ghost:hover:not(:disabled)   { background: var(--stone-soft); }
    .btn-approve { background: #059669; color: #fff; border: none; }
    .btn-approve:hover:not(:disabled) { background: #047857; }
    .btn-reject  { background: var(--chalk); color: #991b1b; border-color: #fecaca; }
    .btn-reject:hover:not(:disabled)  { background: #fee2e2; }

    /* ── Field inputs ── */
    .field {
      border: 1px solid var(--stone);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      font-size: .82rem;
      font-family: inherit;
      color: var(--ink-1);
      background: #fff;
      outline: none;
      transition: border-color .15s;
    }
    .field:focus { border-color: var(--orchid); }

    /* ── Inline edit row ── */
    .edit-row td { background: var(--stone-soft); padding: 10px 12px; }
    .edit-form { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .edit-label { font-size: .72rem; font-weight: 700; color: var(--ink-3); white-space: nowrap; }

    /* ── Actions ── */
    .actions { display: flex; gap: 6px; justify-content: flex-end; }

    /* ── Permissions matrix ── */
    .matrix-wrap { overflow-x: auto; }
    .matrix { width: 100%; border-collapse: collapse; font-size: .82rem; }
    .matrix th {
      text-align: center;
      padding: 10px 14px;
      font-size: .72rem;
      white-space: nowrap;
    }
    .matrix th.feat-col {
      text-align: left;
      color: var(--ink-2);
      font-weight: 600;
      text-transform: none;
      letter-spacing: 0;
      font-size: .875rem;
      min-width: 220px;
    }
    .matrix td {
      text-align: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--stone-soft);
    }
    .matrix td.feat-name { text-align: left; font-weight: 500; color: var(--ink-2); }
    .matrix td.feat-desc {
      font-weight: 400;
      font-size: .78rem;
      color: var(--ink-4);
      display: block;
      margin-top: 1px;
    }
    .matrix-head { background: var(--stone-soft); }
    .matrix tr:last-child td { border-bottom: none; }
    .tick  { color: #059669; font-size: 1rem; }
    .cross { color: var(--stone-deep); font-size: 1rem; }
    .matrix-group td, .matrix-group th {
      background: var(--stone-soft);
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--ink-4);
      padding: 6px 14px;
      text-align: left;
    }

    /* ── Job roles manager ── */
    .roles-add-form { display: flex; gap: 8px; margin-bottom: 14px; }
    .roles-add-form .field { flex: 1; }
    .roles-add-form select.field { flex: 0 0 auto; width: 130px; }
    .roles-list  { display: flex; flex-direction: column; min-height: 32px; }
    .roles-empty { color: var(--ink-4); font-style: italic; font-size: .875rem; padding: 6px 0; }
    .role-row {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid var(--stone);
    }
    .role-row:last-child { border-bottom: none; }
    .role-row-name {
      flex: 1; font-size: .88rem; font-weight: 600; color: var(--ink-1);
    }
    .role-row-select { width: 130px; flex-shrink: 0; }
    .role-del {
      background: none; border: none; color: var(--ink-4);
      cursor: pointer; padding: 0; line-height: 1;
      font-size: .9rem; font-weight: 700;
      transition: color .1s; font-family: inherit;
    }
    .role-del:hover { color: #991b1b; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--plum);
      color: #fff;
      padding: 10px 18px;
      border-radius: var(--radius-md);
      font-size: .875rem;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
      z-index: 1000;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    .toast.err  { background: #991b1b; }

    /* ── States ── */
    .audit-feed { display: flex; flex-direction: column; gap: 0; }
    .audit-entry {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 0 16px;
      padding: 11px 0;
      border-bottom: 1px solid var(--stone-soft);
      font-size: .82rem;
      align-items: start;
    }
    .audit-entry:last-child { border-bottom: none; }
    .audit-time {
      color: var(--ink-4);
      font-size: .75rem;
      white-space: nowrap;
      padding-top: 1px;
    }
    .audit-body { display: flex; flex-direction: column; gap: 2px; }
    .audit-action { font-weight: 600; color: var(--ink-1); }
    .audit-meta { font-size: .75rem; color: var(--ink-3); }
    .audit-chip {
      display: inline-block;
      padding: 1px 7px;
      border-radius: var(--radius-pill);
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-right: 4px;
    }
    .chip-approve_request   { background: #dcfce7; color: #166534; }
    .chip-reject_request    { background: #fee2e2; color: #991b1b; }
    .chip-add_allowed_email { background: #dbeafe; color: #1e40af; }
    .chip-revoke_allowed_email { background: #fef3c7; color: #92400e; }
    .chip-edit_user_profile { background: #ede0ff; color: #3d0f7a; }
    .chip-add_job_role      { background: #f0fdf4; color: #166534; }
    .chip-delete_job_role   { background: #fff7ed; color: #9a3412; }
    .chip-edit_permissions  { background: #ede0ff; color: #3d0f7a; }

    /* ── Trades audit badge ── */
    .trades-audit-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: var(--radius-pill);
      background: var(--plum-soft, #ede0ff);
      color: var(--plum, #3d0f7a);
      font-size: .72rem;
      font-weight: 600;
      white-space: nowrap;
    }

    /* ── Add member form ── */
    .form-section-label {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--ink-4);
      margin: 18px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--stone);
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 10px;
    }
    .form-field-wrap { display: flex; flex-direction: column; gap: 4px; }
    .form-field-wrap label { font-size: .72rem; font-weight: 600; color: var(--ink-3); }
    .opt { font-weight: 400; color: var(--ink-4); text-transform: none; letter-spacing: 0; }
    .form-actions { margin-top: 18px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .invite-err { font-size: .8rem; color: #991b1b; }
    .app-header .nav-btn { font-size: .8rem; }

    /* ── Offline checklist reminder ── */
    .checklist-box {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      margin-top: 22px;
    }
    .checklist-box-title {
      font-size: .78rem;
      font-weight: 700;
      color: #92400e;
      margin: 0 0 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .checklist-cols {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px 20px;
    }
    .checklist-group-title {
      font-size: .72rem;
      font-weight: 700;
      color: #78350f;
      margin: 0 0 5px;
    }
    .checklist-items { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 3px; }
    .checklist-items li {
      font-size: .78rem;
      color: #92400e;
      padding-left: 14px;
      position: relative;
      line-height: 1.4;
    }
    .checklist-items li::before { content: '•'; position: absolute; left: 0; color: #d97706; }
    .checklist-items li span { color: #78350f; font-weight: 400; display: block; font-size: .72rem; opacity: .85; }

    /* ── Edit user modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(20,20,19,.52);
      display: flex; align-items: center; justify-content: center;
      z-index: 400; padding: 16px;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--chalk);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%; max-width: 640px;
      padding: 24px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-title { font-size: 1rem; font-weight: 700; margin: 0 0 2px; color: var(--ink-1); }
    .modal-sub   { font-size: .78rem; color: var(--ink-4); margin: 0 0 18px; }
    .modal-err   { font-size: .8rem; color: #991b1b; margin-top: 10px; display: none; }
    .modal-actions {
      display: flex; gap: 8px; justify-content: flex-end;
      margin-top: 20px; padding-top: 16px;
      border-top: 1px solid var(--stone);
    }

    /* ── Permissions toggle ── */
    .perm-toggle {
      width: 30px; height: 30px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--stone);
      background: var(--chalk);
      cursor: pointer;
      font-size: .85rem;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background .12s, border-color .12s, color .12s;
      font-family: inherit;
    }
    .perm-toggle.on  { background: #f0fdf4; border-color: #86efac; color: #166534; }
    .perm-toggle.off { background: #f3f4f6; border-color: #9ca3af; color: var(--stone-deep); }
    .perm-toggle:hover { border-color: var(--orchid-soft); }
    .perm-save-row { display: flex; align-items: center; gap: 10px; padding-top: 12px; }
    .perm-unsaved  { font-size: .75rem; color: var(--orchid); font-style: italic; }

    /* ── Loading / forbidden ── */
    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--ink-4);
      font-size: .9rem;
    }
    .forbidden-card {
      background: var(--chalk);
      border: 1px solid #fecaca;
      border-radius: var(--radius-lg);
      padding: 32px;
      text-align: center;
      margin-top: 32px;
    }
    .forbidden-card h2 { color: #991b1b; margin: 0 0 8px; }
    .forbidden-card p  { color: var(--ink-3); margin: 0; font-size: .9rem; }

    /* ── Search Settings tab ── */
    .ss-action-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      user-select: none;
      transition: opacity 0.15s, background 0.1s;
    }
    .ss-action-row + .ss-action-row { margin-top: 4px; }
    .ss-action-row.ss-action-disabled { opacity: 0.45; }
    .ss-action-row.ss-drag-over { background: #f5f3ff; border-color: var(--plum); }
    .ss-action-row.ss-dragging { opacity: 0.35; }
    .ss-drag-handle {
      cursor: grab; color: var(--ink-4); font-size: 1rem;
      flex-shrink: 0; padding: 0 2px; line-height: 1;
    }
    .ss-toggle { position: relative; display: inline-flex; cursor: pointer; flex-shrink: 0; }
    .ss-toggle input { position: absolute; opacity: 0; width: 0; height: 0; }
    .ss-toggle-track {
      width: 32px; height: 18px;
      background: #9ca3af; border-radius: 9px;
      transition: background 0.2s; position: relative;
    }
    .ss-toggle-track::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; background: #fff; border-radius: 50%;
      transition: transform 0.2s;
    }
    .ss-toggle input:checked + .ss-toggle-track { background: var(--plum); }
    .ss-toggle input:checked + .ss-toggle-track::after { transform: translateX(14px); }
    .ss-action-label { flex: 1; font-size: .875rem; font-weight: 600; color: var(--ink-1); min-width: 0; }
    .ss-action-category {
      font-size: .65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--ink-3);
      background: var(--stone-soft); border-radius: 4px; padding: 2px 6px; flex-shrink: 0;
    }
    .ss-action-hint {
      font-size: .78rem; color: var(--ink-4);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 240px;
    }
    @media (max-width: 640px) { .ss-action-hint { display: none; } }
  </style>
</head>
<body>

<div class="page" id="page">
  <h1 class="page-title">Admin Panel</h1>
  <div class="loading-state">Loading…</div>
</div>

<div id="toast" class="toast"></div>

<div id="approve-overlay" class="modal-overlay hidden" onclick="if(event.target===this)closeApproveModal()">
  <div class="modal" style="max-width:440px;">
    <div class="modal-title" id="approve-modal-title">Approve request</div>
    <div class="modal-sub"   id="approve-modal-sub"></div>
    <div class="form-section-label" style="margin-top:16px;">Job role <span class="opt">(optional)</span></div>
    <div class="form-field-wrap">
      <label style="font-size:.72rem;font-weight:600;color:var(--ink-3);">Assign a role now — you can change it later via the Team tab.</label>
      <select class="field field-full" id="approve-modal-jobrole" style="margin-top:6px;">
        <option value="">— No role (member access) —</option>
      </select>
    </div>
    <div class="modal-err" id="approve-modal-err"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeApproveModal()">Cancel</button>
      <button class="btn btn-approve" id="approve-modal-btn" onclick="confirmApprove()">Approve</button>
    </div>
  </div>
</div>

<div id="modal-overlay" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modal-title">Edit team member</div>
    <div class="modal-sub"   id="modal-sub"></div>

    <div class="form-section-label">Personal details</div>
    <div class="form-grid">
      <div class="form-field-wrap">
        <label>First name</label>
        <input class="field" id="modal-fname" type="text" maxlength="100" autocomplete="off">
      </div>
      <div class="form-field-wrap">
        <label>Last name</label>
        <input class="field" id="modal-lname" type="text" maxlength="100" autocomplete="off">
      </div>
      <div class="form-field-wrap form-field-full">
        <label>Work email address</label>
        <input class="field field-full" id="modal-email" type="email" maxlength="254" autocomplete="off">
      </div>
      <div class="form-field-wrap">
        <label>Date of birth</label>
        <input class="field" id="modal-dob" type="date">
      </div>
      <div class="form-field-wrap">
        <label>National Insurance number</label>
        <input class="field" id="modal-ni" type="text" maxlength="20" autocomplete="off"
          style="text-transform:uppercase;" oninput="this.value=this.value.toUpperCase()">
      </div>
      <div class="form-field-wrap">
        <label>Mobile number</label>
        <input class="field" id="modal-mobile" type="tel" maxlength="30" autocomplete="off">
      </div>
    </div>

    <div class="form-section-label">Emergency contact</div>
    <div class="form-grid">
      <div class="form-field-wrap">
        <label>First name</label>
        <input class="field" id="modal-ec-fname" type="text" maxlength="100" autocomplete="off">
      </div>
      <div class="form-field-wrap">
        <label>Last name</label>
        <input class="field" id="modal-ec-lname" type="text" maxlength="100" autocomplete="off">
      </div>
      <div class="form-field-wrap">
        <label>Mobile number</label>
        <input class="field" id="modal-ec-phone" type="tel" maxlength="30" autocomplete="off">
      </div>
    </div>

    <div class="form-section-label">Role &amp; permissions</div>
    <div class="form-grid">
      <div class="form-field-wrap form-field-full">
        <label>Job role</label>
        <select class="field field-full" id="modal-jobrole"></select>
      </div>
      <div class="form-field-wrap form-field-full">
        <label>Privilege level</label>
        <select class="field field-full" id="modal-privilege">
          <option value="viewer">Viewer — read-only access</option>
          <option value="member">Member — standard team access</option>
          <option value="manager">Manager — can assign fitters &amp; manage trades</option>
          <option value="admin">Admin — full access including this panel</option>
        </select>
      </div>
      <div class="form-field-wrap form-field-full">
        <label>Note <span class="opt">(optional)</span></label>
        <input class="field field-full" id="modal-note" type="text" maxlength="200" autocomplete="off">
      </div>
    </div>

    <div class="modal-err" id="modal-err"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveModal()">Save changes</button>
    </div>
  </div>
</div>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

<script src="/chrome.js"></script>
<script src="/command-palette.js"></script>
<script src="/components.js"></script>
<script src="/core.js"></script>
<script src="/design-system.js"></script>
<script>
  const $ = s => document.querySelector(s);
  const esc = s => (s == null ? '' : String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  function safeUrl(url) {
    const s = (url || '').trim();
    if (!s) return '';
    try {
      const parsed = new URL(s);
      if (parsed.protocol !== 'http:' && parsed.protocol !== 'https:') return '';
    } catch { return ''; }
    return s;
  }

  /* ── Toast ── */
  function toast(msg, isErr) {
    const el = $('#toast');
    el.textContent = msg;
    el.className = 'toast show' + (isErr ? ' err' : '');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.className = 'toast', 2400);
  }

  /* ── API helper ── */
  async function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const r = await fetch(path, opts);
    if (r.status === 401) { window.location.href = '/'; return null; }
    if (r.status === 403) throw Object.assign(new Error('Forbidden'), { forbidden: true });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.error || data.message || 'HTTP ' + r.status);
    return data;
  }

  /* ── Date formatters ── */
  function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString('en-GB', {
      day: 'numeric', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }
  function fmtDateShort(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  /* ── Level badge ── */
  function lvlBadge(level) {
    const labels = { viewer: 'Viewer', member: 'Member', manager: 'Manager', admin: 'Admin' };
    const l = level || 'member';
    return `<span class="lvl lvl-${esc(l)}">${esc(labels[l] || l)}</span>`;
  }

  /* ── Tabs ── */
  function switchTab(id) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + id));
    try { localStorage.setItem('adminActiveTab', id); } catch (_) {}
    if (id === 'auditlog' && !_auditLogInitialized) {
      _auditLogInitialized = true;
      initAuditLog();
    }
  }

  /* ── Pending Requests badge (access requests + photo approvals + trade submissions) ── */
  function updateRequestsBadge() {
    const pendingCount = _requests.filter(r => r.status === 'pending').length;
    const total = pendingCount + _photoRequests.length + _tradeSubmissions.length;
    const badge = document.getElementById('req-tab-badge');
    if (badge) badge.innerHTML = total > 0 ? `<span class="tab-badge">${total}</span>` : '';
  }

  /* ── Avatar ── */
  function withPhotoVersion(url, u) {
    if (!url || !_me || u.id !== _me.id || !_me.photo_v) return url;
    return url + (url.includes('?') ? '&' : '?') + 'v=' + encodeURIComponent(_me.photo_v);
  }

  function avatarEl(u) {
    const name = [u.first_name, u.last_name].filter(Boolean).join(' ') || u.email || '?';
    const initials = name.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
    if (u.has_custom_photo) {
      return `<img class="avatar" src="${esc(withPhotoVersion(`/api/users/${u.id}/photo`, u))}" alt="" loading="lazy">`;
    }
    if (u.profile_image_url) {
      return `<img class="avatar" src="${esc(withPhotoVersion(u.profile_image_url, u))}" alt="" loading="lazy">`;
    }
    return `<span class="avatar-placeholder">${esc(initials)}</span>`;
  }

  /* ────────────────────────────────────────────────
     State
  ──────────────────────────────────────────────── */
  let _me = null;
  let _users = [];
  let _jobRoles = [];
  let _requests = [];
  let _allowed = [];
  let _auditEntries = [];
  let _auditOffset  = 0;
  let _auditHasMore = false;
  let _auditLogInitialized = false;
  let _photoRequests = [];
  let _capabilities = { levels: ['viewer','member','manager','admin'], features: [] };
  let _tradeSubmissions = [];

  /* ────────────────────────────────────────────────
     TEAM TAB
  ──────────────────────────────────────────────── */
  function jobRoleOptions(current) {
    const opts = _jobRoles.map(r =>
      `<option value="${esc(r.name)}" ${current === r.name ? 'selected' : ''}>${esc(r.name)}</option>`
    ).join('');
    const hasCustom = current && !_jobRoles.find(r => r.name === current);
    return `<option value="">— None —</option>${opts}${hasCustom ? `<option value="${esc(current)}" selected>${esc(current)}</option>` : ''}`;
  }

  function renderTeam() {
    const container = $('#team-body');
    if (!container) return;
    if (_users.length === 0) {
      container.innerHTML = `<tr><td colspan="6" class="table-empty">No users yet.</td></tr>`;
      return;
    }
    container.innerHTML = _users.map(u => {
      const name = [u.first_name, u.last_name].filter(Boolean).join(' ') || '—';
      const needsInfo = u.onboarding_status === 'more_info_required';
      const statusBadge = needsInfo
        ? `<span class="lvl" style="background:#fef3c7;color:#92400e;border:1px solid #fde68a;">More info required</span>`
        : `<span class="lvl" style="background:#dcfce7;color:#166534;border:1px solid #bbf7d0;">Active</span>`;
      const resendBtn = u.email
        ? `<button class="btn btn-ghost" data-resend-email="${esc(u.email)}" title="Email this user a new set-password link">Resend set-password</button>`
        : '';
      const forceResetBtn = (u.email && u.has_password)
        ? `<button class="btn btn-ghost" data-force-reset-email="${esc(u.email)}" title="Invalidate this user's password, sign them out, and email a new set-password link">Force password reset</button>`
        : '';
      return `
        <tr>
          <td>
            <div class="user-cell">
              ${avatarEl(u)}
              <div>
                <div class="user-cell-name">
                  ${esc(name)}
                </div>
                <div class="user-cell-role">${esc(u.email || '')}</div>
              </div>
            </div>
          </td>
          <td>${esc(u.job_role || '—')}</td>
          <td>${lvlBadge(u.privilege_level)}</td>
          <td>${statusBadge}</td>
          <td class="td-date">${fmtDateShort(u.created_at)}</td>
          <td class="actions" style="white-space:nowrap;">
            ${resendBtn}
            ${forceResetBtn}
            <button class="btn btn-ghost" onclick="openEditModal('${esc(u.id)}')">Edit</button>
          </td>
        </tr>`;
    }).join('');

    const count = $('#team-count');
    if (count) count.textContent = _users.length;
  }

  /* ── Edit user modal ── */
  let _editingUserId = null;

  function openEditModal(id) {
    const u = _users.find(u => u.id === id);
    if (!u) return;
    _editingUserId = id;

    const name = [u.first_name, u.last_name].filter(Boolean).join(' ') || u.email || '—';
    $('#modal-title').textContent = 'Edit team member';
    $('#modal-sub').textContent   = name + (u.email && name !== u.email ? ' · ' + u.email : '');

    const meta = u.metadata || {};

    $('#modal-fname').value  = u.first_name || '';
    $('#modal-lname').value  = u.last_name  || '';
    $('#modal-email').value  = u.email      || '';
    $('#modal-dob').value    = meta.date_of_birth  || '';
    $('#modal-ni').value     = meta.ni_number      || '';
    $('#modal-mobile').value = meta.mobile_number  || '';

    $('#modal-ec-fname').value = meta.ec_first_name || '';
    $('#modal-ec-lname').value = meta.ec_last_name  || '';
    $('#modal-ec-phone').value = meta.ec_phone      || '';

    $('#modal-jobrole').innerHTML = `<option value="">— None —</option>` +
      _jobRoles.map(r => `<option value="${esc(r.name)}" ${u.job_role === r.name ? 'selected' : ''}>${esc(r.name)}</option>`).join('') +
      (u.job_role && !_jobRoles.find(r => r.name === u.job_role)
        ? `<option value="${esc(u.job_role)}" selected>${esc(u.job_role)}</option>` : '');

    const privSel = $('#modal-privilege');
    if (privSel) privSel.value = u.privilege_level || 'member';

    $('#modal-note').value = u.note || '';

    const errEl = $('#modal-err');
    if (errEl) { errEl.style.display = 'none'; errEl.textContent = ''; }
    $('#modal-overlay').classList.remove('hidden');
    setTimeout(() => $('#modal-fname')?.focus(), 50);
  }

  function closeModal() {
    $('#modal-overlay').classList.add('hidden');
    _editingUserId = null;
  }

  async function resendSetPassword(email, btn) {
    if (!email) return;
    if (!confirm(`Send a new "set your password" email to ${email}?\n\nAny previous link for this user will be invalidated.`)) return;
    const original = btn.textContent;
    btn.disabled = true; btn.textContent = 'Sending…';
    try {
      await api('POST', `/api/admin/users/${encodeURIComponent(email)}/resend-set-password`);
      toast(`Set-password email sent to ${email}`);
      _auditLogInitialized = false;
    } catch (e) {
      toast(e.message || 'Could not send email', true);
    } finally {
      btn.disabled = false; btn.textContent = original;
    }
  }

  async function forcePasswordReset(email, btn) {
    if (!email) return;
    if (!confirm(
      `Force a password reset for ${email}?\n\n` +
      `Their current password will be invalidated, all of their active sessions will be signed out, ` +
      `and they'll receive an email with a new set-password link.`
    )) return;
    const original = btn.textContent;
    btn.disabled = true; btn.textContent = 'Resetting…';
    try {
      await api('POST', `/api/admin/users/${encodeURIComponent(email)}/force-password-reset`);
      toast(`Password reset — email sent to ${email}`);
      _auditLogInitialized = false;
      try {
        _users = await api('GET', '/api/admin/users') || _users;
        renderTeam();
      } catch {}
    } catch (e) {
      toast(e.message || 'Could not force password reset', true);
    } finally {
      btn.disabled = false; btn.textContent = original;
    }
  }

  async function saveModal() {
    const id = _editingUserId;
    if (!id) return;
    const saveBtn = $('#modal-save-btn');
    const errEl   = $('#modal-err');
    if (errEl) { errEl.style.display = 'none'; errEl.textContent = ''; }

    const payload = {
      first_name:      ($('#modal-fname')?.value     || '').trim(),
      last_name:       ($('#modal-lname')?.value     || '').trim(),
      email:           ($('#modal-email')?.value     || '').trim(),
      date_of_birth:   ($('#modal-dob')?.value       || '').trim(),
      ni_number:       ($('#modal-ni')?.value        || '').trim(),
      mobile_number:   ($('#modal-mobile')?.value    || '').trim(),
      ec_first_name:   ($('#modal-ec-fname')?.value  || '').trim(),
      ec_last_name:    ($('#modal-ec-lname')?.value  || '').trim(),
      ec_phone:        ($('#modal-ec-phone')?.value  || '').trim(),
      job_role:        $('#modal-jobrole')?.value    || '',
      privilege_level: $('#modal-privilege')?.value  || 'member',
      note:            ($('#modal-note')?.value      || '').trim(),
    };

    if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Saving…'; }
    try {
      const updated = await api('PATCH', '/api/users/' + encodeURIComponent(id) + '/profile', payload);
      const u = _users.find(u => u.id === id);
      if (u) Object.assign(u, updated);
      renderTeam();
      _allowed = await api('GET', '/api/admin/allowed') || _allowed;
      renderRequests();
      closeModal();
      toast('Changes saved');
      _auditLogInitialized = false;
    } catch (e) {
      if (errEl) { errEl.textContent = e.message; errEl.style.display = ''; }
      else toast(e.message, true);
    } finally {
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Save changes'; }
    }
  }

  /* ────────────────────────────────────────────────
     PERMISSIONS TAB
  ──────────────────────────────────────────────── */
  let _permEdits = {};

  function renderMatrix() {
    const levels = _capabilities.levels;
    const lvlCls = { viewer:'lvl-viewer', member:'lvl-member', manager:'lvl-manager', admin:'lvl-admin' };

    // Seed _permEdits from current capabilities
    _permEdits = {};
    _capabilities.features.forEach(row => {
      if (!row.group) _permEdits[row.feat] = [...(row.levels || [])];
    });

    const rows = _capabilities.features.map(row => {
      if (row.group) {
        return `<tr class="matrix-group"><td colspan="${levels.length + 1}">${esc(row.group)}</td></tr>`;
      }
      return `
        <tr>
          <td class="feat-name">
            ${esc(row.feat)}
            <span class="feat-desc">${esc(row.desc)}</span>
          </td>
          ${levels.map(l => {
            const on = (row.levels || []).includes(l);
            return `<td><button class="perm-toggle ${on ? 'on' : 'off'}"
              onclick="togglePerm(this,'${esc(row.feat)}','${esc(l)}')"
              title="${on ? 'Remove' : 'Grant'} ${esc(l)} access">${on ? '✓' : '✗'}</button></td>`;
          }).join('')}
        </tr>`;
    }).join('');

    return `
      <div class="matrix-wrap">
        <table class="matrix">
          <thead class="matrix-head">
            <tr>
              <th class="feat-col">Feature / action</th>
              ${levels.map(l => `<th><span class="lvl ${lvlCls[l] || ''}">${l.charAt(0).toUpperCase()+l.slice(1)}</span></th>`).join('')}
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="perm-save-row">
        <button class="btn btn-primary" id="perm-save-btn" onclick="savePerms()">Save permissions</button>
        <span class="perm-unsaved" id="perm-unsaved-note" style="display:none;">Unsaved changes</span>
      </div>
      <p class="card-note">
        * Toggles update the documented permission policy stored in the database.
        Server-side middleware enforces a minimum security floor independently —
        admin panel access always requires the <code>ADMIN_EMAILS</code> environment variable.
      </p>`;
  }

  function togglePerm(btn, feat, level) {
    const cur = _permEdits[feat] || [];
    const has = cur.includes(level);
    _permEdits[feat] = has ? cur.filter(l => l !== level) : [...cur, level];
    const nowOn = _permEdits[feat].includes(level);
    btn.className    = 'perm-toggle ' + (nowOn ? 'on' : 'off');
    btn.textContent  = nowOn ? '✓' : '✗';
    btn.title        = (nowOn ? 'Remove' : 'Grant') + ' ' + level + ' access';
    const note = $('#perm-unsaved-note');
    if (note) note.style.display = '';
  }

  async function savePerms() {
    const btn = $('#perm-save-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
    try {
      await api('PATCH', '/api/admin/capabilities', { overrides: _permEdits });
      _capabilities = await api('GET', '/api/admin/capabilities');
      const note = $('#perm-unsaved-note');
      if (note) note.style.display = 'none';
      toast('Permissions saved');
      _auditLogInitialized = false;
    } catch (e) {
      toast(e.message, true);
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = 'Save permissions'; }
    }
  }

  /* ── Job roles manager ── */
  function renderJobRoles() {
    const container = $('#roles-list');
    if (!container) return;
    if (_jobRoles.length === 0) {
      container.innerHTML = `<span class="roles-empty">No job roles defined yet.</span>`;
      return;
    }
    const lvlOption = (val, current) =>
      `<option value="${val}" ${current === val ? 'selected' : ''}>${
        { viewer: 'Viewer', member: 'Member', manager: 'Manager', admin: 'Admin' }[val]
      }</option>`;
    container.innerHTML = _jobRoles.map(r => {
      const cur = r.privilege_level || 'member';
      return `
        <div class="role-row">
          <span class="role-row-name">${esc(r.name)}</span>
          <select class="field role-row-select" onchange="updateRolePrivilege('${esc(r.name)}', this.value)">
            ${['viewer','member','manager','admin'].map(v => lvlOption(v, cur)).join('')}
          </select>
          <button class="role-del" onclick="deleteRole('${esc(r.name)}')" title="Remove role">×</button>
        </div>`;
    }).join('');

    document.querySelectorAll('[id^="usel-job-"]').forEach(sel => {
      const uid = sel.id.replace('usel-job-', '');
      const u   = _users.find(u => u.id === uid);
      if (u) sel.innerHTML = jobRoleOptions(u.job_role || '');
    });

    // Repopulate the Add Member and Approve modal role selectors.
    const inviteSel = document.getElementById('invite-jobrole');
    if (inviteSel) {
      const cur = inviteSel.value;
      inviteSel.innerHTML = '<option value="">— No role (member access) —</option>' +
        _jobRoles.map(r => `<option value="${esc(r.name)}">${esc(r.name)}</option>`).join('');
      if (cur) inviteSel.value = cur;
    }
  }

  async function updateRolePrivilege(name, privilege_level) {
    try {
      await api('POST', '/api/admin/job-roles', { name, privilege_level });
      const idx = _jobRoles.findIndex(r => r.name === name);
      if (idx >= 0) _jobRoles[idx] = { ..._jobRoles[idx], privilege_level };
      toast('Role updated');
      _auditLogInitialized = false;
    } catch (e) {
      toast(e.message, true);
      renderJobRoles();
    }
  }

  function syncRoleForm() {
    const inp  = $('#role-input');
    const psel = $('#role-privilege-input');
    const btn  = $('#role-submit-btn');
    if (!inp || !btn) return;
    const name = inp.value.trim();
    const existing = _jobRoles.find(r => r.name.toLowerCase() === name.toLowerCase());
    btn.textContent = existing ? 'Update role' : 'Add role';
    if (existing && psel) psel.value = existing.privilege_level || 'member';
  }

  async function addRole() {
    const inp  = $('#role-input');
    const psel = $('#role-privilege-input');
    const name = inp?.value.trim();
    if (!name) return;
    const privilege_level = psel?.value || 'member';
    try {
      const result = await api('POST', '/api/admin/job-roles', { name, privilege_level });
      const existing = _jobRoles.findIndex(r => r.name === name);
      if (existing >= 0) {
        _jobRoles[existing] = { name, privilege_level: result.privilege_level || privilege_level };
      } else {
        _jobRoles.push({ name, privilege_level: result.privilege_level || privilege_level });
      }
      _jobRoles.sort((a, b) => a.name.localeCompare(b.name));
      inp.value = '';
      if (psel) psel.value = 'member';
      const btn = $('#role-submit-btn');
      if (btn) btn.textContent = 'Add role';
      renderJobRoles();
      toast(existing >= 0 ? 'Role updated' : 'Role added');
      _auditLogInitialized = false;
    } catch (e) {
      toast(e.message, true);
    }
  }

  async function deleteRole(name) {
    if (!confirm(`Remove job role "${name}"? This won't change existing users' roles.`)) return;
    try {
      await api('DELETE', '/api/admin/job-roles/' + encodeURIComponent(name));
      _jobRoles = _jobRoles.filter(r => r.name !== name);
      renderJobRoles();
      toast('Role removed');
      _auditLogInitialized = false;
    } catch (e) {
      toast(e.message, true);
    }
  }

  /* ────────────────────────────────────────────────
     REQUESTS TAB
  ──────────────────────────────────────────────── */
  function renderPendingRequests() {
    const container = $('#requests-content');
    if (!container) return;
    updateRequestsBadge();

    /* ── Access requests ── */
    const pending = _requests.filter(r => r.status === 'pending');
    const past    = _requests.filter(r => r.status !== 'pending').slice(0, 30);

    const reqRow = r => `
      <tr data-id="${r.id}">
        <td>${esc(r.name)}</td>
        <td class="td-secondary">${esc(r.email)}</td>
        <td class="td-date">${fmtDate(r.created_at)}</td>
        <td>
          ${r.status === 'pending'
            ? `<div class="actions">
                 <button class="btn btn-approve" onclick="approve(${r.id})">Approve</button>
                 <button class="btn btn-reject"  onclick="reject(${r.id})">Reject</button>
               </div>`
            : `<span class="badge badge-${r.status}">${r.status}</span>`}
        </td>
      </tr>`;

    const accessHtml = `
      <div class="card">
        <div class="card-title">Access requests <span class="card-count">(${pending.length})</span></div>
        ${pending.length === 0
          ? '<div class="table-empty">No pending requests.</div>'
          : `<table>
               <thead><tr><th>Name</th><th>Email</th><th>Submitted</th><th></th></tr></thead>
               <tbody>${pending.map(reqRow).join('')}</tbody>
             </table>`}
      </div>
      ${past.length > 0 ? `
        <div class="card">
          <div class="card-title">Recent decisions</div>
          <table>
            <thead><tr><th>Name</th><th>Email</th><th>Submitted</th><th>Status</th></tr></thead>
            <tbody>${past.map(reqRow).join('')}</tbody>
          </table>
        </div>` : ''}`;

    /* ── Photo approvals ── */
    const photoHtml = _photoRequests.length === 0
      ? `<div class="card">
          <div class="card-title">Photo approvals</div>
          <div class="table-empty" style="padding:28px 0;">No pending photo submissions.</div>
        </div>`
      : `<div class="card">
          <div class="card-title">Photo approvals <span class="card-count">(${_photoRequests.length})</span></div>
          <p class="card-desc">Review profile photo submissions. Approved photos appear in the header and across the app.</p>
          <div class="photo-approval-grid">
            ${_photoRequests.map(u => {
              const name = [u.first_name, u.last_name].filter(Boolean).join(' ') || u.email || '—';
              return `
                <div class="photo-approval-card" id="pcard-${esc(u.id)}">
                  <img class="photo-approval-img" src="${esc(u.pending_photo)}" alt="">
                  <div class="photo-approval-info">
                    <div class="photo-approval-name">${esc(name)}</div>
                    <div class="photo-approval-email">${esc(u.email || '')}</div>
                  </div>
                  <div class="photo-approval-btns">
                    <button class="btn btn-primary btn-sm" onclick="approvePhoto('${esc(u.id)}')">Approve</button>
                    <button class="btn btn-outline btn-sm" onclick="rejectPhoto('${esc(u.id)}')">Reject</button>
                  </div>
                </div>`;
            }).join('')}
          </div>
        </div>`;

    /* ── Trade submissions ── */
    const tradeCards = _tradeSubmissions.map(s => {
      const areas    = Array.isArray(s.areas_served) ? s.areas_served.join(', ') : (s.areas_served || '');
      const contacts = Array.isArray(s.contacts) ? s.contacts : [];
      const contactsHtml = contacts.map(c => {
        const parts = [esc(c.name || '')];
        if (c.role)  parts.push(esc(c.role));
        if (c.phone) parts.push(`<a href="tel:${esc(c.phone)}" style="color:inherit;">${esc(c.phone)}</a>`);
        if (c.email) parts.push(esc(c.email));
        if (c.preferred_contact) parts.push(`<span style="background:var(--surface-2,#f1f5f9);border-radius:3px;padding:0 5px;font-size:.75rem;">${esc(c.preferred_contact)}</span>`);
        return `<div style="font-size:.82rem;color:var(--ink-2);padding:2px 0;">${parts.join(' · ')}</div>`;
      }).join('');
      const details = [
        s.timescale      ? `Lead time: ${esc(s.timescale)}`    : '',
        s.invoice_method ? `Invoice: ${esc(s.invoice_method)}` : '',
        s.payment_terms  ? `Payment: ${esc(s.payment_terms)}`  : '',
      ].filter(Boolean);
      return `
        <div class="card" id="tsub-${s.id}" style="margin-bottom:16px;">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;">
            <div style="flex:1;min-width:0;">
              <div style="font-size:1rem;font-weight:700;color:var(--ink-1);margin-bottom:4px;">${esc(s.company_name)}</div>
              <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px;">
                <span class="trades-audit-badge">${esc(s.trade_type)}</span>
                ${areas ? `<span style="font-size:.8rem;color:var(--ink-3);">${esc(areas)}</span>` : ''}
              </div>
              ${details.length ? `<div style="font-size:.8rem;color:var(--ink-3);margin-bottom:6px;">${details.join(' · ')}</div>` : ''}
              ${(s.website || s.company_phone) ? `<div style="font-size:.82rem;color:var(--ink-2);margin-bottom:6px;display:flex;gap:16px;flex-wrap:wrap;">
                ${s.website && safeUrl(s.website) ? `<a href="${esc(safeUrl(s.website))}" target="_blank" rel="noopener" style="color:var(--accent,#3b82f6);text-decoration:none;">🌐 ${esc(s.website)}</a>` : ''}
                ${s.company_phone ? `<a href="tel:${esc(s.company_phone)}" style="color:inherit;text-decoration:none;">📞 ${esc(s.company_phone)}</a>` : ''}
              </div>` : ''}
              ${s.notes ? `<div style="font-size:.82rem;color:var(--ink-3);margin-bottom:8px;font-style:italic;">${esc(s.notes)}</div>` : ''}
              ${contacts.length ? `<div style="margin-bottom:8px;"><div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-4);margin-bottom:4px;">Contacts</div>${contactsHtml}</div>` : ''}
              <div style="font-size:.75rem;color:var(--ink-4);margin-top:4px;">
                Submitted by <strong>${esc(s.submitter_name || s.submitter_email || 'Unknown')}</strong>
                · ${fmtDate(s.created_at)}
              </div>
            </div>
            <div class="actions" style="flex-shrink:0;">
              <button class="btn btn-approve" onclick="approveTradeSubmission(${s.id})">Approve</button>
              <button class="btn btn-reject"  onclick="rejectTradeSubmission(${s.id})">Reject</button>
            </div>
          </div>
        </div>`;
    }).join('');

    const tradeHtml = _tradeSubmissions.length === 0
      ? `<div class="card">
          <div class="card-title">Trade submissions</div>
          <div class="table-empty" style="padding:28px 0;">No pending submissions.</div>
        </div>`
      : `<div class="card" style="margin-bottom:4px;">
          <div class="card-title">Trade submissions <span class="card-count">(${_tradeSubmissions.length})</span></div>
          <p class="card-desc" style="margin:0;">Review and approve or reject trade company submissions from managers.</p>
        </div>
        ${tradeCards}`;

    container.innerHTML = accessHtml + photoHtml + tradeHtml;

    /* ── Team allowed list (written by this render pass too) ── */
    const allowRow = a => {
      const m    = a.metadata || {};
      const name = [m.first_name, m.last_name].filter(Boolean).join(' ');
      const ec   = [m.ec_first_name, m.ec_last_name].filter(Boolean).join(' ');
      const ecPhone = m.ec_phone || '';
      return `
      <tr>
        <td>
          <div class="fw-600">${esc(name || a.email)}</div>
          ${name ? `<div class="text-faint-sm">${esc(a.email)}</div>` : ''}
        </td>
        <td class="td-sm">
          ${m.date_of_birth  ? `<div class="text-secondary">DOB: ${esc(m.date_of_birth)}</div>` : ''}
          ${m.ni_number      ? `<div class="text-secondary">NI: ${esc(m.ni_number)}</div>` : ''}
          ${m.mobile_number  ? `<div class="text-secondary">Mobile: ${esc(m.mobile_number)}</div>` : ''}
          ${ec ? `<div class="text-faint mt-1">EC: ${esc(ec)}${ecPhone ? ` · ${esc(ecPhone)}` : ''}</div>` : ''}
          ${!m.date_of_birth && !m.ni_number && !m.mobile_number && !ec ? '<span class="text-faint">—</span>' : ''}
        </td>
        <td><span class="badge ${a.protected ? 'badge-approved' : ''}">${esc(a.note || '—')}</span></td>
        <td class="td-date">${fmtDate(a.approved_at)}</td>
        <td class="actions">
          ${a.protected
            ? '<span class="text-faint-xs">Protected</span>'
            : `<button class="btn btn-danger" data-revoke-email="${esc(a.email)}">Revoke</button>`}
        </td>
      </tr>`;
    };
    const allowedContainer = $('#team-allowed-content');
    if (allowedContainer) {
      allowedContainer.innerHTML = `
        <div class="card">
          <div class="card-title">Approved team members <span class="card-count">(${_allowed.length})</span></div>
          ${_allowed.length === 0
            ? '<div class="table-empty">No approved emails yet.</div>'
            : `<table>
                 <thead><tr><th>Name / Email</th><th>HR details</th><th>Note</th><th>Approved</th><th></th></tr></thead>
                 <tbody>${_allowed.map(allowRow).join('')}</tbody>
               </table>`}
        </div>`;
    }
  }

  function renderRequests()        { renderPendingRequests(); }
  function renderPhotoRequests()   { renderPendingRequests(); }
  function renderTradeSubmissions(){ renderPendingRequests(); }

  let _approvingRequestId = null;

  function openApproveModal(id, name, email) {
    _approvingRequestId = id;
    $('#approve-modal-title').textContent = 'Approve request';
    $('#approve-modal-sub').textContent   = `${name} · ${email}`;
    const sel = $('#approve-modal-jobrole');
    sel.innerHTML = '<option value="">— No role (member access) —</option>' +
      _jobRoles.map(r => `<option value="${esc(r.name)}">${esc(r.name)}</option>`).join('');
    const errEl = $('#approve-modal-err');
    if (errEl) { errEl.style.display = 'none'; errEl.textContent = ''; }
    $('#approve-overlay').classList.remove('hidden');
    setTimeout(() => sel?.focus(), 50);
  }

  function closeApproveModal() {
    $('#approve-overlay').classList.add('hidden');
    _approvingRequestId = null;
  }

  async function confirmApprove() {
    const id = _approvingRequestId;
    if (!id) return;
    const btn   = $('#approve-modal-btn');
    const errEl = $('#approve-modal-err');
    const job_role = $('#approve-modal-jobrole')?.value || '';
    if (errEl) { errEl.style.display = 'none'; errEl.textContent = ''; }
    if (btn) { btn.disabled = true; btn.textContent = 'Approving…'; }
    try {
      await api('POST', '/api/admin/requests/' + id + '/approve', { job_role: job_role || null });
      closeApproveModal();
      toast('Approved — user can now sign in');
      await reload();
      _auditLogInitialized = false;
    } catch (e) {
      if (errEl) { errEl.textContent = e.message; errEl.style.display = ''; }
      else toast(e.message, true);
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = 'Approve'; }
    }
  }

  async function approve(id) {
    const req = _requests.find(r => r.id === id);
    openApproveModal(id, req?.name || '', req?.email || '');
  }
  async function reject(id) {
    if (!confirm('Reject this request?')) return;
    try {
      await api('POST', '/api/admin/requests/' + id + '/reject');
      toast('Rejected');
      await reload();
      _auditLogInitialized = false;
    } catch (e) { toast(e.message, true); }
  }
  async function revoke(email) {
    if (!confirm('Revoke access for ' + email + '?')) return;
    try {
      await api('DELETE', '/api/admin/allowed/' + encodeURIComponent(email));
      toast('Access revoked');
      await reload();
      _auditLogInitialized = false;
    } catch (e) { toast(e.message, true); }
  }

  async function addAllowed() {
    const emailInp  = $('#invite-email');
    const btn       = $('#invite-btn');
    const errEl     = $('#invite-err');
    if (!emailInp) return;

    const email = emailInp.value.trim();
    if (errEl) { errEl.style.display = 'none'; errEl.textContent = ''; }

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      if (errEl) { errEl.textContent = 'Please enter a valid email address.'; errEl.style.display = ''; }
      emailInp.focus();
      return;
    }

    const g = id => (document.getElementById(id)?.value || '').trim();
    const payload = {
      email,
      note:          g('invite-note'),
      first_name:    g('invite-fname'),
      last_name:     g('invite-lname'),
      date_of_birth: g('invite-dob'),
      ni_number:     g('invite-ni'),
      mobile_number: g('invite-mobile'),
      ec_first_name: g('invite-ec-fname'),
      ec_last_name:  g('invite-ec-lname'),
      ec_phone:      g('invite-ec-phone'),
      job_role:      g('invite-jobrole') || null,
    };

    if (btn) { btn.disabled = true; btn.textContent = 'Adding…'; }
    try {
      await api('POST', '/api/admin/allowed', payload);
      ['invite-email','invite-fname','invite-lname','invite-dob','invite-ni','invite-mobile',
       'invite-note','invite-ec-fname','invite-ec-lname','invite-ec-phone','invite-jobrole']
        .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
      const name = [payload.first_name, payload.last_name].filter(Boolean).join(' ');
      toast(name ? `${name} added — they can now sign in` : 'Email added — they can now sign in');
      await reload();
      _auditLogInitialized = false;
    } catch (e) {
      if (errEl) { errEl.textContent = e.message; errEl.style.display = ''; }
      else toast(e.message, true);
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = 'Add team member'; }
    }
  }

  /* ────────────────────────────────────────────────
     AUDIT LOG TAB
  ──────────────────────────────────────────────── */
  const ACTION_LABELS = {
    approve_request:          'Approved access request',
    reject_request:           'Rejected access request',
    add_allowed_email:        'Added email to allow-list',
    revoke_allowed_email:     'Revoked email from allow-list',
    edit_user_profile:        'Edited user profile',
    add_job_role:             'Added job role',
    delete_job_role:          'Deleted job role',
    edit_permissions:         'Updated permission matrix',
    approve_profile_photo:    'Approved profile photo',
    reject_profile_photo:     'Rejected profile photo',
    resend_set_password_email:'Resent set-password email',
    force_password_reset:     'Forced password reset',
  };

  function auditEntryHtml(e) {
    if (e.source === 'trade') {
      const tradeChip = `<span class="audit-chip chip-trade-company">trade company</span>`;
      const typeBadge = e.trade_type ? `<span class="trades-audit-badge">${esc(e.trade_type)}</span>` : '';
      const by = e.actor_name ? ` · By <strong>${esc(e.actor_name)}</strong>` : '';
      return `
        <div class="audit-entry">
          <div class="audit-time">${fmtDate(e.ts)}</div>
          <div class="audit-body">
            <div class="audit-action">${tradeChip}${esc(e.company_name || '')} ${typeBadge}</div>
            <div class="audit-meta">${esc(e.action || '')}${by}</div>
          </div>
        </div>`;
    }
    const label = ACTION_LABELS[e.action_type] || e.action_type;
    const chip  = `<span class="audit-chip chip-${esc(e.action_type)}">${esc((e.action_type || '').replace(/_/g,' '))}</span>`;
    const meta  = [
      e.target_email ? `Target: ${esc(e.target_email)}` : '',
      e.details      ? esc(e.details) : '',
    ].filter(Boolean).join(' · ');
    return `
      <div class="audit-entry">
        <div class="audit-time">${fmtDate(e.ts)}</div>
        <div class="audit-body">
          <div class="audit-action">${chip}${esc(label)}</div>
          <div class="audit-meta">By <strong>${esc(e.admin_email || '')}</strong>${meta ? ' · ' + meta : ''}</div>
        </div>
      </div>`;
  }

  function renderUnifiedAuditLog() {
    const feed = $('#audit-feed');
    const btn  = $('#audit-load-more');
    if (!feed) return;
    if (_auditEntries.length === 0) {
      feed.innerHTML = '<div class="table-empty" style="padding:28px 0;">No audit entries recorded yet.</div>';
      if (btn) btn.style.display = 'none';
      return;
    }
    feed.innerHTML = _auditEntries.map(auditEntryHtml).join('');
    if (btn) btn.style.display = _auditHasMore ? '' : 'none';
  }

  async function loadMoreAudit() {
    const btn = $('#audit-load-more');
    if (btn) { btn.disabled = true; btn.textContent = 'Loading…'; }
    try {
      const data = await api('GET', `/api/admin/audit-log-unified?limit=25&offset=${_auditOffset}`);
      const newItems = data.items || [];
      _auditEntries = _auditEntries.concat(newItems);
      _auditHasMore = data.hasMore;
      _auditOffset += newItems.length;
      const feed = $('#audit-feed');
      if (feed) {
        const frag = document.createDocumentFragment();
        const tmp  = document.createElement('div');
        newItems.forEach(e => { tmp.innerHTML = auditEntryHtml(e); if (tmp.firstElementChild) frag.appendChild(tmp.firstElementChild); });
        feed.appendChild(frag);
      }
      if (btn) { btn.disabled = false; btn.textContent = 'Load more'; btn.style.display = _auditHasMore ? '' : 'none'; }
    } catch (e) {
      toast(e.message, true);
      if (btn) { btn.disabled = false; btn.textContent = 'Load more'; }
    }
  }

  async function initAuditLog() {
    _auditEntries = [];
    _auditOffset  = 0;
    _auditHasMore = false;
    try {
      const data = await api('GET', '/api/admin/audit-log-unified?limit=25&offset=0');
      _auditEntries = data.items || [];
      _auditHasMore = data.hasMore;
      _auditOffset  = _auditEntries.length;
    } catch (e) {
      toast(e.message || 'Failed to load audit log', true);
    }
    renderUnifiedAuditLog();
  }

  /* ────────────────────────────────────────────────
     TRADE SUBMISSIONS TAB
  ──────────────────────────────────────────────── */

  async function approveTradeSubmission(id) {
    const card = $(`#tsub-${id}`);
    const btns = card ? card.querySelectorAll('button') : [];
    btns.forEach(b => { b.disabled = true; });
    try {
      await api('POST', `/api/admin/trades/submissions/${id}/approve`);
      toast('Approved — company is now live in the Trades directory');
      _tradeSubmissions = _tradeSubmissions.filter(s => s.id !== id);
      renderTradeSubmissions();
      _auditLogInitialized = false;
    } catch (e) {
      toast(e.message, true);
      btns.forEach(b => { b.disabled = false; });
    }
  }

  async function rejectTradeSubmission(id) {
    const reason = prompt('Optional: enter a reason for rejection (leave blank to skip)');
    if (reason === null) return;
    const card = $(`#tsub-${id}`);
    const btns = card ? card.querySelectorAll('button') : [];
    btns.forEach(b => { b.disabled = true; });
    try {
      await api('POST', `/api/admin/trades/submissions/${id}/reject`, { reason: reason || '' });
      toast('Submission rejected');
      _tradeSubmissions = _tradeSubmissions.filter(s => s.id !== id);
      renderTradeSubmissions();
      _auditLogInitialized = false;
    } catch (e) {
      toast(e.message, true);
      btns.forEach(b => { b.disabled = false; });
    }
  }


  /* ────────────────────────────────────────────────
     PHOTOS TAB
  ──────────────────────────────────────────────── */

  async function approvePhoto(id) {
    try {
      await api('POST', `/api/admin/photo-requests/${id}/approve`);
      toast('Photo approved — now live');
      _photoRequests = _photoRequests.filter(r => r.id !== id);
      renderPhotoRequests();
      const users = await api('GET', '/api/admin/users');
      _users = users;
      renderTeam();
      _auditLogInitialized = false;
    } catch (e) { toast(e.message, true); }
  }

  async function rejectPhoto(id) {
    if (!confirm('Reject this photo? The user will need to submit a new one.')) return;
    try {
      await api('POST', `/api/admin/photo-requests/${id}/reject`);
      toast('Photo rejected');
      _photoRequests = _photoRequests.filter(r => r.id !== id);
      renderPhotoRequests();
      _auditLogInitialized = false;
    } catch (e) { toast(e.message, true); }
  }

  /* ────────────────────────────────────────────────
     Load & render
  ──────────────────────────────────────────────── */
  async function reload() {
    [_requests, _allowed, _users, _photoRequests, _tradeSubmissions] = await Promise.all([
      api('GET', '/api/admin/requests'),
      api('GET', '/api/admin/allowed'),
      api('GET', '/api/admin/users'),
      api('GET', '/api/admin/photo-requests'),
      api('GET', '/api/admin/trades/submissions'),
    ]);
    renderTeam();
    renderRequests();
    renderPhotoRequests();
    renderTradeSubmissions();
  }

  // ── Dev test users ──────────────────────────────────────────────────────────
  let _devModeChecked = false;
  let _devMode = false;
  let _devTestUsersLoaded = false;
  let _devTestUsersContacts = [];

  function _applyDevFilterLabel(enabled) {
    const lbl = document.getElementById('dev-filter-toggle-label');
    const chk = document.getElementById('dev-filter-global-toggle');
    if (lbl) {
      lbl.textContent = enabled ? 'Dev filter: ON' : 'Dev filter: OFF';
      lbl.style.background = enabled ? '#dcfce7' : '#fee2e2';
      lbl.style.color      = enabled ? '#166534' : '#991b1b';
    }
    if (chk) chk.checked = enabled;
  }

  async function setDevFilter(enabled) {
    const chk = document.getElementById('dev-filter-global-toggle');
    if (chk) chk.disabled = true;
    try {
      await api('PATCH', '/api/admin/hubspot/dev-filter', { enabled });
      _applyDevFilterLabel(enabled);
      showToast(enabled ? 'Dev filter turned ON.' : 'Dev filter turned OFF — all contacts will be visible.');
    } catch (e) {
      _applyDevFilterLabel(!enabled); // revert
      showToast('Failed to update dev filter: ' + e.message, true);
    } finally {
      if (chk) chk.disabled = false;
    }
  }

  async function backfillTestUserDefaults() {
    const btn = document.getElementById('dev-backfill-btn');
    const result = document.getElementById('dev-backfill-result');
    if (btn) btn.disabled = true;
    if (result) result.textContent = 'Running backfill…';
    try {
      const d = await api('POST', '/api/admin/hubspot/backfill-test-user-defaults');
      if (result) result.textContent = `Done — ${d?.patched ?? 0} contact(s) updated.`;
      showToast(`Backfill complete: ${d?.patched ?? 0} contact(s) set to false.`);
      // Reload contact list so per-contact toggles reflect the new values.
      _devTestUsersLoaded = false;
      _devTestUsersContacts = [];
      const listEl = document.getElementById('dev-test-users-list');
      if (listEl) listEl.innerHTML = '<p style="font-size:.82rem;color:var(--ink-4);">Reloading contacts…</p>';
      await loadDevTestUsers();
    } catch (e) {
      if (result) result.textContent = '';
      showToast('Backfill failed: ' + e.message, true);
    } finally {
      if (btn) btn.disabled = false;
    }
  }

  async function loadDevTestUsers() {
    if (!_devModeChecked) {
      try {
        const d = await api('GET', '/api/admin/hubspot/dev-mode');
        _devMode = d?.devMode === true;
      } catch { _devMode = false; }
      _devModeChecked = true;
    }
    const section = document.getElementById('dev-test-users-section');
    if (!section) return;
    if (!_devMode) { section.style.display = 'none'; return; }
    section.style.display = '';
    // Load current global filter state
    try {
      const fd = await api('GET', '/api/admin/hubspot/dev-filter');
      _applyDevFilterLabel(fd?.enabled !== false);
    } catch { _applyDevFilterLabel(true); }
    if (_devTestUsersLoaded) return;
    const listEl = document.getElementById('dev-test-users-list');
    if (!listEl) return;
    listEl.innerHTML = '<p style="font-size:.82rem;color:var(--ink-4);">Loading contacts…</p>';
    try {
      let contacts = [];
      let page = 1;
      let totalPages = 1;
      do {
        const data = await api('GET', `/api/contacts-all?all=1&limit=100&page=${page}`);
        if (!data) break;
        contacts = contacts.concat(data.results || []);
        totalPages = data.totalPages || 1;
        page++;
      } while (page <= totalPages);
      _devTestUsersContacts = contacts;
      _devTestUsersLoaded = true;
      renderDevTestUsers(contacts);
    } catch (e) {
      listEl.innerHTML = `<p style="font-size:.82rem;color:#991b1b;">Failed to load contacts: ${esc(e.message)}</p>`;
    }
  }

  function renderDevTestUsers(contacts) {
    const listEl = document.getElementById('dev-test-users-list');
    if (!listEl) return;
    if (!contacts.length) {
      listEl.innerHTML = '<p style="font-size:.82rem;color:var(--ink-4);">No contacts found in HubSpot.</p>';
      return;
    }
    listEl.innerHTML = contacts.map(c => {
      const id = esc(c.id);
      const first = esc(c.properties?.firstname || '');
      const last  = esc(c.properties?.lastname  || '');
      const name  = [first, last].filter(Boolean).join(' ') || `Contact ${id}`;
      const email = esc(c.properties?.email || '');
      const enabled = c.properties?.hw_test_user === 'true';
      return `<div class="dtu-row" id="dtu-row-${id}" style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);">
        <div style="min-width:0;">
          <div style="font-size:.875rem;font-weight:500;color:var(--ink-1);">${name}</div>
          ${email ? `<div style="font-size:.78rem;color:var(--ink-4);margin-top:1px;">${email}</div>` : ''}
        </div>
        <label class="ss-toggle" title="Include in dev test data" style="flex-shrink:0;margin-left:16px;">
          <input type="checkbox" ${enabled ? 'checked' : ''} data-contact-id="${id}" onchange="toggleTestUser('${id}', this)">
          <span class="ss-toggle-track"></span>
        </label>
      </div>`;
    }).join('');
  }

  async function toggleTestUser(contactId, checkbox) {
    const enabled = checkbox.checked;
    checkbox.disabled = true;
    try {
      await api('PATCH', `/api/admin/hubspot/test-users/${encodeURIComponent(contactId)}`, { enabled });
      showToast(enabled ? 'Marked as test user.' : 'Removed from test users.');
      // Update local cache so re-render is accurate without a full reload
      const c = _devTestUsersContacts.find(x => x.id === contactId);
      if (c) c.properties.hw_test_user = enabled ? 'true' : 'false';
    } catch (e) {
      checkbox.checked = !enabled;
      showToast('Failed: ' + e.message, true);
    } finally {
      checkbox.disabled = false;
    }
  }

  let _hubspotStatusLoaded = false;
  async function loadHubspotStatus() {
    if (_hubspotStatusLoaded) return;
    const badge = document.getElementById('hubspot-status-badge');
    if (!badge) return;
    try {
      const data = await api('GET', '/api/hubspot/status');
      if (!data) return;
      if (data.connected) {
        badge.textContent = 'Connected';
        badge.style.background = '#dcfce7';
        badge.style.color = '#166534';
      } else {
        let label = 'Not connected — check your token';
        if (data.code === 'NO_TOKEN') label = 'No token set';
        else if (data.code === 'HUBSPOT_RATE_LIMIT') label = 'Rate limited — try again shortly';
        badge.textContent = label;
        badge.style.background = '#fee2e2';
        badge.style.color = '#991b1b';
      }
      _hubspotStatusLoaded = true;
    } catch {
      if (badge) {
        badge.textContent = 'Could not check';
        badge.style.background = '#fef3c7';
        badge.style.color = '#92400e';
      }
    }
  }

  let _leadStatusesData = [];
  let _leadStatusesLoaded = false;
  let _dvHandlesData    = [];
  let _dvFurnitureData  = [];
  let _dvDoorStylesData = [];
  const _lsBroadcast = typeof BroadcastChannel !== 'undefined' ? new BroadcastChannel('lead_statuses_changed') : null;
  function _notifyLeadStatusChanged() {
    _lsBroadcast?.postMessage('changed');
    // Card action labels are ordered to mirror the Lead Statuses table, so any
    // rename / reorder / add must refresh that panel too. Reload silently if
    // the panel has been opened in this session; otherwise the next open will
    // fetch fresh data automatically.
    if (_cardActionsEverLoaded && typeof loadCardActionsAdmin === 'function') {
      loadCardActionsAdmin();
    }
  }

  const LEAD_STATUS_STAGES = [
    { key: 'SALES',            label: 'Sales' },
    { key: 'DESIGN_VISIT',     label: 'Design Visit' },
    { key: 'SURVEY',           label: 'Survey' },
    { key: 'ORDER',            label: 'Order' },
    { key: 'WORKSHOP',         label: 'Workshop' },
    { key: 'PACKING',          label: 'Packing' },
    { key: 'DELIVERY',         label: 'Delivery' },
    { key: 'INSTALLATION',     label: 'Installation' },
    { key: 'AFTERCARE',        label: 'Aftercare' },
    { key: 'CUSTOMER_SERVICE', label: 'Customer Service' },
  ];
  function _stageOptionsHtml(selected) {
    const sel = selected || '';
    return `<option value=""${sel === '' ? ' selected' : ''}>—</option>` +
      LEAD_STATUS_STAGES.map(s =>
        `<option value="${s.key}"${sel === s.key ? ' selected' : ''}>${esc(s.label)}</option>`
      ).join('');
  }

  // ── Card action labels admin ─────────────────────────────────────────────
  // Card stages, in display order. Only lead statuses assigned to one of these
  // stages render a card with an action strip, so this is the universe of rows
  // the table needs to show.
  const CARD_ACTION_STAGES = [
    { key: 'sales',       label: 'Sales',        lsStage: 'SALES'        },
    { key: 'designvisit', label: 'Design Visit', lsStage: 'DESIGN_VISIT' },
    { key: 'survey',      label: 'Survey',       lsStage: 'SURVEY'       },
  ];
  const CARD_ACTION_LS_STAGE_TO_KEY = Object.fromEntries(
    CARD_ACTION_STAGES.map(s => [s.lsStage, s.key])
  );
  let _cardActionsData      = [];   // raw rows from /api/admin/stage-action-labels
  let _cardActionsEverLoaded = false; // becomes true the first time the tab is opened
  // In-memory set of stage keys the admin has collapsed. Survives re-renders
  // (e.g. after Save) while the admin tab stays mounted; resets on full reload.
  const _collapsedCardActionStages = new Set();
  let _cardActionsToggleBound = false;

  function _broadcastCardActionsChanged() {
    try { new BroadcastChannel('stage_action_labels_changed').postMessage({ ts: Date.now() }); } catch (_) {}
  }

  async function loadCardActionsAdmin() {
    const wrap = document.getElementById('card-actions-table-wrap');
    if (!wrap) return;
    if (!_cardActionsEverLoaded) {
      for (const s of CARD_ACTION_STAGES) _collapsedCardActionStages.add(s.key);
    }
    _cardActionsEverLoaded = true;
    try {
      // Always fetch all three fresh so a rename / reorder in the Lead
      // Statuses tab is immediately reflected here, and any sub-status created
      // in another tab shows up on re-open.
      const [labels, statuses, substatuses] = await Promise.all([
        api('GET', '/api/admin/stage-action-labels'),
        api('GET', '/api/admin/lead-statuses'),
        api('GET', '/api/admin/lead-substatuses'),
      ]);
      _cardActionsData     = Array.isArray(labels)      ? labels      : [];
      _leadStatusesData    = Array.isArray(statuses)    ? statuses    : _leadStatusesData;
      _cardSubstatusesData = Array.isArray(substatuses) ? substatuses : [];
      _leadStatusesLoaded  = true;
      _newSubstatusCounter = 0;
      renderCardActionsTable();
    } catch (e) {
      wrap.innerHTML = `<p style="font-size:.82rem;color:#991b1b;">Could not load card actions: ${esc(e.message)}</p>`;
    }
  }

  // Sub-status state. _cardSubstatusesData holds the server's view; the DOM
  // is the source of truth for unsaved edits / additions. New (unsaved) rows
  // have no data-sub-id but do have data-sub-new="1". Deletion is intentionally
  // not supported in this UI — sub-statuses must be removed in HubSpot.
  let _cardSubstatusesData     = [];
  let _newSubstatusCounter     = 0;

  function _stageLabelFor(key) {
    const s = CARD_ACTION_STAGES.find(x => x.key === key);
    return s ? s.label : key;
  }

  // Build a structured model: stages in lead-status order, each containing a
  // "no lead status" default row and a list of lead statuses (each with its
  // own default-label row + sub-status rows).
  function _buildCardActionsModel() {
    const labelByKey = {};
    for (const r of _cardActionsData) {
      labelByKey[`${r.stage_key}|${r.status_key}`] = r.label;
    }
    const subsByLs = {};
    for (const s of _cardSubstatusesData) {
      const k = String(s.status_key).toUpperCase();
      (subsByLs[k] = subsByLs[k] || []).push(s);
    }

    const stages = [];
    const seen   = new Set();
    const real   = (_leadStatusesData || []).filter(s => !s.is_null_row);

    function ensureStage(stageKey) {
      if (seen.has(stageKey)) return stages.find(s => s.key === stageKey);
      seen.add(stageKey);
      const stage = {
        key:           stageKey,
        label:         _stageLabelFor(stageKey),
        noStatusLabel: labelByKey[`${stageKey}|`] || '',
        statuses:      [],
      };
      stages.push(stage);
      return stage;
    }

    for (const s of real) {
      const stageKey = CARD_ACTION_LS_STAGE_TO_KEY[s.stage];
      if (!stageKey) continue;
      const stage     = ensureStage(stageKey);
      const statusKey = String(s.key || '');
      stage.statuses.push({
        key:          statusKey,
        label:        s.label,
        shorthand:    s.shorthand || '',
        defaultLabel: labelByKey[`${stageKey}|${statusKey.toLowerCase()}`] || '',
        // Most rows use the same key for both stage_action_labels lookup and
        // sub-status operations; the synthetic null row below diverges.
        defaultStatusKey: statusKey.toLowerCase(),
        isNullRow:    false,
        substatuses:  (subsByLs[statusKey.toUpperCase()] || []).slice()
                        .sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0)),
      });
    }
    // Stages with no lead statuses yet still get their "no status" row.
    for (const cs of CARD_ACTION_STAGES) ensureStage(cs.key);

    // Synthetic "No lead status" row — lives inside the Sales section.
    // Backed by stage_action_labels[sales|''] for its default action label,
    // and by lead_substatuses with status_key='__NULL__' for sub-statuses.
    const nullRow = (_leadStatusesData || []).find(s => s.is_null_row);
    const salesStage = stages.find(s => s.key === 'sales');
    if (salesStage) {
      salesStage.statuses.unshift({
        key:              '__NULL__',
        label:            nullRow ? nullRow.label : 'No lead status',
        shorthand:        (nullRow && nullRow.shorthand) || '',
        defaultLabel:     labelByKey['sales|'] || '',
        defaultStatusKey: '',
        isNullRow:        true,
        substatuses:      (subsByLs['__NULL__'] || []).slice()
                            .sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0)),
      });
    }

    return stages;
  }

  // Find any handlers bound to a given slot. `slot` is either
  // { stage_key, status_key } (status_key may be '' for the "no lead status"
  // row) or { substatus_id }. Returns an array of matching _handlersData rows.
  function _handlersForSlot(slot) {
    if (!Array.isArray(_handlersData) || !_handlersData.length) return [];
    const out = [];
    for (const h of _handlersData) {
      for (const b of (h.bindings || [])) {
        if (slot.substatus_id != null) {
          if (Number(b.substatus_id) === Number(slot.substatus_id)) {
            out.push(h); break;
          }
        } else if (b.substatus_id == null) {
          const bStage  = (b.stage_key  || '').toLowerCase();
          const bStatus = (b.status_key || '').toLowerCase();
          const sStage  = (slot.stage_key  || '').toLowerCase();
          const sStatus = (slot.status_key || '').toLowerCase();
          if (bStage === sStage && bStatus === sStatus) { out.push(h); break; }
        }
      }
    }
    return out;
  }

  // Render one badge per handler bound to the row. Shows the handler name and
  // its type label so admins can see at a glance what's wired without scrolling
  // down to the handlers card. When more than one handler is bound, a "Fix"
  // button appears so the admin can remove the conflicting entry in-context.
  function _handlerBadgesHtml(slot) {
    const handlers = _handlersForSlot(slot);
    if (!handlers.length) return '';
    const badges = handlers.map(h => {
      const typeLbl = HANDLER_TYPE_LABELS[h.type] || h.type;
      const title = `${typeLbl} — manage in the Action handlers card below`;
      return `<span class="ca-handler-badge" title="${esc(title)}"
        style="display:inline-flex;align-items:center;gap:4px;padding:1px 7px;margin-left:6px;
          background:#ede0ff;color:#3d0f7a;border-radius:999px;font-size:.7rem;font-weight:600;
          line-height:1.5;white-space:nowrap;vertical-align:middle;">
        <span aria-hidden="true">⚡</span><span>${esc(typeLbl)}</span>
      </span>`;
    }).join('');
    if (handlers.length <= 1) return badges;
    // Build a serialised slot reference that openConflictResolver can decode.
    const slotArg = slot.substatus_id != null
      ? `null,null,${Number(slot.substatus_id)}`
      : `${JSON.stringify(String(slot.stage_key))},${JSON.stringify(String(slot.status_key))},null`;
    const fixBtn = `<button type="button" class="ca-fix-conflict-btn"
      onclick="openConflictResolver(${slotArg})"
