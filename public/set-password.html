<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Set password · Measure Once</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/tokens.css">
  <style>
@font-face {
  font-family: 'Open Sans';
  src: url('fonts/OpenSans-VariableFont_wdth_wght.ttf') format('truetype');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Open Sans';
  src: url('fonts/OpenSans-Italic-VariableFont_wdth_wght.ttf') format('truetype');
  font-weight: 100 900;
  font-style: italic;
  font-display: swap;
}
body.auth-page {
  background: var(--surface-muted);
  color: var(--ink-1);
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  padding-top: 24px;
}
body.auth-page--top {
  align-items: flex-start;
  padding: 32px 24px;
}
.auth-card {
  background: var(--surface-card);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-2xl);
  width: 100%;
  padding: 32px;
  box-shadow: var(--shadow-card-xs);
}
.auth-card--login {
  max-width: 440px;
  border: 2px solid var(--border-strong);
  padding: 36px;
  box-shadow: var(--shadow-card-sm);
}
.auth-card--wide { max-width: 680px; }
.auth-card--narrow { max-width: 420px; }
.auth-logo-wrap { text-align: center; margin-bottom: 28px; }
.auth-logo-wrap img { max-width: 180px; width: 100%; height: auto; display: inline-block; }
.auth-card h1 { font-size: 1.4rem; font-weight: 700; margin: 0 0 6px; color: var(--ink-1); letter-spacing: -.01em; }
.auth-card--wide h1, .auth-card--narrow h1 { font-size: 1.25rem; }
.auth-sub {
  color: var(--ink-2); font-size: .95rem; margin: 0 0 28px; line-height: 1.5;
}
.auth-email-line {
  color: var(--ink-3); font-size: .9rem; margin: 0 0 6px;
}
.auth-email-line.is-strong {
  font-weight: 600; color: var(--ink-1); margin-bottom: 20px;
}
.auth-field { margin-bottom: 18px; }
.auth-field-label {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: .9rem; font-weight: 600; color: var(--ink-1); margin-bottom: 6px;
}
.auth-field-required { font-size: .75rem; color: var(--ink-4); font-weight: 400; }
.auth-card label {
  display: block; font-size: .9rem; font-weight: 600; color: var(--ink-1); margin-bottom: 6px;
}
.auth-card input, .auth-card select {
  width: 100%; box-sizing: border-box; padding: 12px 14px;
  border: 2px solid var(--stone-deep); border-radius: var(--radius-lg);
  font-size: 1rem; background: var(--surface-card); color: var(--ink-1);
  font-family: inherit;
}
.auth-card--narrow input,
.auth-card--wide input,
.auth-card--wide select {
  padding: 10px 12px;
  font-size: .95rem;
  border-width: 1px;
  border-color: var(--border-strong);
  border-radius: var(--radius-lg);
}
.auth-card input:focus, .auth-card select:focus {
  outline: none; border-color: var(--brand-accent);
  box-shadow: 0 0 0 3px var(--brand-accent-ring);
}
.auth-submit {
  width: 100%; background: var(--brand-accent); color: #fff; border: none;
  padding: 14px 18px; border-radius: var(--radius-lg); font-weight: 700;
  font-size: 1rem; cursor: pointer; min-height: 48px;
  letter-spacing: .02em; transition: background .15s ease;
  font-family: inherit;
}
.auth-submit:hover { background: var(--brand-accent-hover); }
.auth-submit:disabled { opacity: .5; cursor: not-allowed; background: var(--brand-accent); }
.auth-submit--compact {
  padding: 11px 18px; font-weight: 600; font-size: .95rem; min-height: 0;
  border-radius: var(--radius-lg);
}
.auth-alert {
  display: none; padding: 10px 12px; border-radius: var(--radius-lg);
  font-size: .9rem; margin-bottom: 18px;
  align-items: flex-start; gap: 10px; line-height: 1.4;
}
.auth-alert--err {
  background: var(--status-danger-bg);
  border: 1.5px solid var(--status-danger-border);
  color: var(--status-danger-text);
}
.auth-alert--ok {
  background: var(--status-success-bg);
  border: 1.5px solid var(--status-success-border);
  color: var(--status-success-text);
}
.auth-alert svg { flex-shrink: 0; margin-top: 1px; }
.auth-link {
  display: inline-block; margin-top: 6px; margin-bottom: 22px;
  font-size: .875rem; color: var(--brand-accent); font-weight: 600;
  text-decoration: underline; background: none; border: none;
  cursor: pointer; padding: 0; font-family: inherit;
}
.auth-link:hover { color: var(--brand-accent-hover); }
.auth-footer {
  margin-top: 22px; padding-top: 18px; border-top: 2px solid var(--paper);
  font-size: .9rem; color: var(--ink-2); text-align: center; line-height: 1.6;
}
.auth-footer a, .auth-footer button.auth-toggle {
  color: var(--brand-accent); text-decoration: underline; font-weight: 700;
}
.auth-footer a:hover, .auth-footer button.auth-toggle:hover { color: var(--brand-accent-hover); }
.auth-toggle {
  background: none; border: none; cursor: pointer;
  font: inherit; font-weight: 700; padding: 0;
  color: var(--brand-accent);
}
.auth-hidden { display: none !important; }
.turnstile-widget { margin: 4px 0 14px; min-height: 65px; }
.auth-topbar {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px;
}
.auth-section-label {
  font-size: .75rem; font-weight: 700; letter-spacing: .04em;
  text-transform: uppercase; color: var(--ink-4); margin: 22px 0 10px;
}
.auth-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.auth-grid .auth-grid-full { grid-column: 1 / -1; }
.auth-card .auth-input-uppercase { text-transform: uppercase; }
.auth-actions {
  display: flex; justify-content: space-between; align-items: center; margin-top: 24px;
  padding-top: 18px; border-top: 1px solid var(--paper); gap: 12px;
}
.auth-actions-hint { color: var(--ink-3); font-size: .82rem; }
.auth-card .auth-btn-ghost {
  background: none; border: none; color: var(--ink-3); cursor: pointer; font: inherit;
  text-decoration: underline; padding: 0;
}
.auth-card .auth-btn-ghost:hover { color: var(--ink-1); }
.auth-hint { font-size: .78rem; color: var(--ink-4); margin-top: 4px; }
.auth-card .auth-invalid {
  background: var(--status-danger-bg);
  border: 1px solid var(--status-danger-border);
  color: var(--status-danger-text);
  padding: 14px 16px; border-radius: var(--radius-lg);
}
.auth-card .auth-invalid a { color: var(--brand-accent); font-weight: 600; }
.auth-loading { color: var(--ink-3); font-size: .9rem; }
#state-invalid, #state-form { display: none; }
#state-invalid p { margin: 8px 0 0; }
#pw-form .auth-hint { margin-top: 10px; }
  </style>
</head>
<body class="auth-page">
  <div class="auth-card auth-card--narrow">
    <div class="auth-logo-wrap">
      <img src="/harry-wardrobes-logo.png" alt="Harry Wardrobes">
    </div>
    <h1>Set your password</h1>
    <div id="state-loading" class="auth-loading">Checking link…</div>

    <div id="state-invalid" class="auth-invalid">
      <p id="invalid-msg"></p>
      <p><a id="invalid-action" href="/login">Back to sign in</a></p>
    </div>

    <div id="state-form">
      <p class="auth-email-line">Choose a password for</p>
      <p class="auth-email-line is-strong" id="email-display"></p>
      <div id="err" class="auth-alert auth-alert--err"></div>
      <form id="pw-form" autocomplete="off">
        <div class="auth-field">
          <label for="pw1">New password</label>
          <input id="pw1" type="password" minlength="8" required autocomplete="new-password">
          <div class="auth-hint">At least 8 characters, with letters and numbers.</div>
          <div id="meter-mount"></div>
        </div>
        <div class="auth-field">
          <label for="pw2">Confirm password</label>
          <input id="pw2" type="password" minlength="8" required autocomplete="new-password">
        </div>
        <button id="submit-btn" type="submit" class="auth-submit auth-submit--compact">Set password</button>
        <p class="auth-hint">You'll be signed out of any other devices.</p>
      </form>
    </div>
  </div>

<script src="/vendor/zxcvbn.js"></script>
<script src="/password-strength.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const token  = params.get('token') || '';
  let currentEmail = '';

  function show(id) {
    ['state-loading','state-invalid','state-form'].forEach(s => {
      document.getElementById(s).style.display = (s === id) ? 'block' : 'none';
    });
  }

  function showErr(msg) {
    const e = document.getElementById('err');
    e.textContent = msg; e.style.display = 'block';
  }

  (async () => {
    if (!token) {
      document.getElementById('invalid-msg').textContent =
        'This link is missing its token. Ask an admin to send you a new set-password email.';
      return show('state-invalid');
    }
    try {
      const r = await fetch('/api/set-password/validate?token=' + encodeURIComponent(token));
      const data = await r.json().catch(() => ({}));
      if (!r.ok || !data.valid) {
        const isReset = data.purpose === 'reset';
        const msgEl = document.getElementById('invalid-msg');
        const actionEl = document.getElementById('invalid-action');
        let msg;
        if (data.reason === 'expired') {
          msg = isReset
            ? 'This reset link has expired (reset links are valid for 15 minutes). Request a new one.'
            : 'This link has expired (links are valid for 24 hours). Ask an admin to send a new one.';
        } else if (data.reason === 'used') {
          msg = isReset
            ? 'This reset link has already been used. If you need to change your password, request a new reset link.'
            : 'This link has already been used. If you need to change your password, ask an admin to send a new link.';
        } else if (data.reason === 'invalid') {
          msg = 'This link is not valid. Ask an admin to send a new set-password email.';
        } else {
          msg = 'This link is no longer valid. Ask an admin for a new one.';
        }
        msgEl.textContent = msg;
        if (isReset && (data.reason === 'expired' || data.reason === 'used')) {
          actionEl.href = '/login#forgot';
          actionEl.textContent = 'Request a new reset link';
        }
        return show('state-invalid');
      }
      currentEmail = data.email || '';
      document.getElementById('email-display').textContent = currentEmail;
      show('state-form');
    } catch {
      document.getElementById('invalid-msg').textContent =
        'Could not verify the link — please check your connection and try again.';
      show('state-invalid');
    }
  })();

  function userInputs() {
    const local = (currentEmail || '').split('@')[0] || '';
    return [currentEmail, local, 'measure once', 'measureonce'].filter(Boolean);
  }

  PasswordStrength.mountStrengthMeter(
    document.getElementById('pw1'),
    document.getElementById('meter-mount'),
    userInputs,
  );

  document.getElementById('pw-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw1 = document.getElementById('pw1').value;
    const pw2 = document.getElementById('pw2').value;
    if (pw1 !== pw2) return showErr('Passwords do not match.');
    const policyErr = PasswordStrength.checkPasswordPolicy(pw1, userInputs());
    if (policyErr) return showErr(policyErr);

    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const r = await fetch('/api/set-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password: pw1 }),
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) {
        showErr(data.error || 'Could not set password.');
        btn.disabled = false; btn.textContent = 'Set password';
        return;
      }
      window.location.href = '/login?password_set=1';
    } catch {
      showErr('Network error — please try again.');
      btn.disabled = false; btn.textContent = 'Set password';
    }
  });
</script>
</body>
</html>
