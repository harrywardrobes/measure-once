<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Set password · Measure Once</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body { background:#f8f7f4; color:#141413; margin:0;
           font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
           min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { background:#fff; border:1px solid #e7e5e0; border-radius:12px;
            max-width:420px; width:100%; padding:32px;
            box-shadow:0 1px 3px rgba(0,0,0,.04); }
    h1 { font-size:1.25rem; margin:0 0 4px; }
    .sub, .email { color:#57534e; font-size:.9rem; margin:0 0 6px; }
    .email { font-weight:600; color:#141413; margin-bottom:20px; }
    label { display:block; font-size:.82rem; color:#374151; margin-bottom:6px; font-weight:500; }
    input { width:100%; box-sizing:border-box; padding:10px 12px; border:1px solid #d6d3d1;
            border-radius:8px; font-size:.95rem; background:#fff; }
    input:focus { outline:none; border-color:#3d0f7a; box-shadow:0 0 0 3px rgba(61,15,122,.12); }
    .field { margin-bottom:14px; }
    .hint { font-size:.78rem; color:#78716c; margin-top:4px; }
    button { width:100%; background:#3d0f7a; color:#fff; border:none; padding:11px 18px;
             border-radius:8px; font-weight:600; font-size:.95rem; cursor:pointer; }
    button:hover { background:#2e0f5a; }
    button:disabled { opacity:.6; cursor:not-allowed; }
    .err { background:#fef2f2; border:1px solid #fecaca; color:#991b1b;
           padding:10px 12px; border-radius:8px; font-size:.85rem; margin-bottom:14px; display:none; }
    .invalid { background:#fef2f2; border:1px solid #fecaca; color:#991b1b;
               padding:14px 16px; border-radius:8px; }
    .invalid a { color:#3d0f7a; font-weight:600; }
    .loading { color:#57534e; font-size:.9rem; }
    .meter { margin-top:8px; }
    .meter-bar { height:6px; background:#e7e5e0; border-radius:999px; overflow:hidden; }
    .meter-fill { height:100%; width:0%; background:#e7e5e0; border-radius:999px;
                  transition:width .15s ease, background .15s ease; }
    .meter-label { display:flex; justify-content:space-between; font-size:.78rem;
                   margin-top:6px; color:#57534e; }
    .meter-label strong { color:#141413; font-weight:600; }
    .meter-feedback { font-size:.76rem; color:#a16207; margin-top:4px; min-height:1em; }
    .s-0 { background:#dc2626; } .t-0 { color:#dc2626; }
    .s-1 { background:#ea580c; } .t-1 { color:#ea580c; }
    .s-2 { background:#ca8a04; } .t-2 { color:#ca8a04; }
    .s-3 { background:#16a34a; } .t-3 { color:#16a34a; }
    .s-4 { background:#15803d; } .t-4 { color:#15803d; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Set your password</h1>
    <div id="state-loading" class="loading">Checking link…</div>

    <div id="state-invalid" class="invalid" style="display:none;">
      <p id="invalid-msg"></p>
      <p style="margin:8px 0 0;"><a id="invalid-action" href="/login">Back to sign in</a></p>
    </div>

    <div id="state-form" style="display:none;">
      <p class="sub">Choose a password for</p>
      <p class="email" id="email-display"></p>
      <div id="err" class="err"></div>
      <form id="pw-form" autocomplete="off">
        <div class="field">
          <label for="pw1">New password</label>
          <input id="pw1" type="password" minlength="8" required autocomplete="new-password">
          <div class="hint">At least 8 characters, with letters and numbers.</div>
          <div class="meter" id="meter" aria-live="polite" hidden>
            <div class="meter-bar"><div class="meter-fill" id="meter-fill"></div></div>
            <div class="meter-label">
              <span>Strength: <strong id="meter-text">—</strong></span>
              <span id="meter-crack"></span>
            </div>
            <div class="meter-feedback" id="meter-feedback"></div>
          </div>
        </div>
        <div class="field">
          <label for="pw2">Confirm password</label>
          <input id="pw2" type="password" minlength="8" required autocomplete="new-password">
        </div>
        <button id="submit-btn" type="submit">Set password</button>
        <p class="hint" style="margin-top:10px;">You'll be signed out of any other devices.</p>
      </form>
    </div>
  </div>

<script src="/vendor/zxcvbn.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const token  = params.get('token') || '';
  const MIN_SCORE = 2;
  const STRENGTH_LABELS = ['Very weak', 'Weak', 'Fair', 'Good', 'Strong'];
  let currentEmail = '';

  function show(id) {
    ['state-loading','state-invalid','state-form'].forEach(s => {
      document.getElementById(s).style.display = (s === id) ? 'block' : 'none';
    });
  }

  function showErr(msg) {
    const e = document.getElementById('err');
    e.textContent = msg; e.style.display = 'block';
  }

  (async () => {
    if (!token) {
      document.getElementById('invalid-msg').textContent =
        'This link is missing its token. Ask an admin to send you a new set-password email.';
      return show('state-invalid');
    }
    try {
      const r = await fetch('/api/set-password/validate?token=' + encodeURIComponent(token));
      const data = await r.json().catch(() => ({}));
      if (!r.ok || !data.valid) {
        const isReset = data.purpose === 'reset';
        const msgEl = document.getElementById('invalid-msg');
        const actionEl = document.getElementById('invalid-action');
        let msg;
        if (data.reason === 'expired') {
          msg = isReset
            ? 'This reset link has expired (reset links are valid for 15 minutes). Request a new one.'
            : 'This link has expired (links are valid for 24 hours). Ask an admin to send a new one.';
        } else if (data.reason === 'used') {
          msg = isReset
            ? 'This reset link has already been used. If you need to change your password, request a new reset link.'
            : 'This link has already been used. If you need to change your password, ask an admin to send a new link.';
        } else if (data.reason === 'invalid') {
          msg = 'This link is not valid. Ask an admin to send a new set-password email.';
        } else {
          msg = 'This link is no longer valid. Ask an admin for a new one.';
        }
        msgEl.textContent = msg;
        if (isReset && (data.reason === 'expired' || data.reason === 'used')) {
          actionEl.href = '/login#forgot';
          actionEl.textContent = 'Request a new reset link';
        }
        return show('state-invalid');
      }
      currentEmail = data.email || '';
      document.getElementById('email-display').textContent = currentEmail;
      show('state-form');
    } catch {
      document.getElementById('invalid-msg').textContent =
        'Could not verify the link — please check your connection and try again.';
      show('state-invalid');
    }
  })();

  function userInputs() {
    const local = (currentEmail || '').split('@')[0] || '';
    return [currentEmail, local, 'measure once', 'measureonce'].filter(Boolean);
  }

  function updateMeter() {
    const pw = document.getElementById('pw1').value;
    const meter = document.getElementById('meter');
    const fill = document.getElementById('meter-fill');
    const text = document.getElementById('meter-text');
    const crack = document.getElementById('meter-crack');
    const fb = document.getElementById('meter-feedback');
    if (!pw) {
      meter.hidden = true;
      return;
    }
    meter.hidden = false;
    let score = 0, feedback = {}, crackDisplay = '';
    if (typeof zxcvbn === 'function') {
      const r = zxcvbn(pw.slice(0, 200), userInputs());
      score = r.score;
      feedback = r.feedback || {};
      crackDisplay = (r.crack_times_display && r.crack_times_display.offline_slow_hashing_1e4_per_second) || '';
    } else {
      // Fallback when CDN is unreachable: rough heuristic by length + charset variety.
      const variety = (/[a-z]/.test(pw) + /[A-Z]/.test(pw) + /[0-9]/.test(pw) + /[^A-Za-z0-9]/.test(pw));
      score = Math.max(0, Math.min(4, Math.floor(pw.length / 4) + variety - 2));
    }
    fill.className = 'meter-fill s-' + score;
    fill.style.width = (((score + 1) / 5) * 100) + '%';
    text.className = 't-' + score;
    text.textContent = STRENGTH_LABELS[score];
    crack.textContent = crackDisplay ? 'Crack time: ' + crackDisplay : '';
    fb.textContent = (score < MIN_SCORE)
      ? (feedback.warning || 'Too easy to guess — try a longer or less common password.')
      : (feedback.suggestions && feedback.suggestions[0]) || '';
  }

  document.getElementById('pw1').addEventListener('input', updateMeter);

  document.getElementById('pw-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw1 = document.getElementById('pw1').value;
    const pw2 = document.getElementById('pw2').value;
    if (pw1 !== pw2) return showErr('Passwords do not match.');
    if (pw1.length < 8) return showErr('Password must be at least 8 characters.');
    if (!/[A-Za-z]/.test(pw1) || !/[0-9]/.test(pw1))
      return showErr('Password must contain both letters and numbers.');
    if (typeof zxcvbn === 'function') {
      const r = zxcvbn(pw1.slice(0, 200), userInputs());
      if (r.score < MIN_SCORE) {
        return showErr((r.feedback && r.feedback.warning)
          ? 'Password is too easy to guess: ' + r.feedback.warning
          : 'Password is too easy to guess — please choose something less common.');
      }
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const r = await fetch('/api/set-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password: pw1 }),
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) {
        showErr(data.error || 'Could not set password.');
        btn.disabled = false; btn.textContent = 'Set password';
        return;
      }
      window.location.href = '/login?password_set=1';
    } catch {
      showErr('Network error — please try again.');
      btn.disabled = false; btn.textContent = 'Set password';
    }
  });
</script>
</body>
</html>
