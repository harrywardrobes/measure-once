<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Set password · Measure Once</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="auth-page">
  <div class="auth-card auth-card--narrow">
    <div class="auth-logo-wrap">
      <img src="/harry-wardrobes-logo.png" alt="Harry Wardrobes">
    </div>
    <h1>Set your password</h1>
    <div id="state-loading" class="auth-loading">Checking link…</div>

    <div id="state-invalid" class="auth-invalid" style="display:none;">
      <p id="invalid-msg"></p>
      <p style="margin:8px 0 0;"><a id="invalid-action" href="/login">Back to sign in</a></p>
    </div>

    <div id="state-form" style="display:none;">
      <p class="auth-email-line">Choose a password for</p>
      <p class="auth-email-line is-strong" id="email-display"></p>
      <div id="err" class="auth-alert auth-alert--err"></div>
      <form id="pw-form" autocomplete="off">
        <div class="auth-field">
          <label for="pw1">New password</label>
          <input id="pw1" type="password" minlength="8" required autocomplete="new-password">
          <div class="auth-hint">At least 8 characters, with letters and numbers.</div>
          <div id="meter-mount"></div>
        </div>
        <div class="auth-field">
          <label for="pw2">Confirm password</label>
          <input id="pw2" type="password" minlength="8" required autocomplete="new-password">
        </div>
        <button id="submit-btn" type="submit" class="auth-submit auth-submit--compact">Set password</button>
        <p class="auth-hint" style="margin-top:10px;">You'll be signed out of any other devices.</p>
      </form>
    </div>
  </div>

<script src="/vendor/zxcvbn.js"></script>
<script src="/password-strength.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const token  = params.get('token') || '';
  let currentEmail = '';

  function show(id) {
    ['state-loading','state-invalid','state-form'].forEach(s => {
      document.getElementById(s).style.display = (s === id) ? 'block' : 'none';
    });
  }

  function showErr(msg) {
    const e = document.getElementById('err');
    e.textContent = msg; e.style.display = 'block';
  }

  (async () => {
    if (!token) {
      document.getElementById('invalid-msg').textContent =
        'This link is missing its token. Ask an admin to send you a new set-password email.';
      return show('state-invalid');
    }
    try {
      const r = await fetch('/api/set-password/validate?token=' + encodeURIComponent(token));
      const data = await r.json().catch(() => ({}));
      if (!r.ok || !data.valid) {
        const isReset = data.purpose === 'reset';
        const msgEl = document.getElementById('invalid-msg');
        const actionEl = document.getElementById('invalid-action');
        let msg;
        if (data.reason === 'expired') {
          msg = isReset
            ? 'This reset link has expired (reset links are valid for 15 minutes). Request a new one.'
            : 'This link has expired (links are valid for 24 hours). Ask an admin to send a new one.';
        } else if (data.reason === 'used') {
          msg = isReset
            ? 'This reset link has already been used. If you need to change your password, request a new reset link.'
            : 'This link has already been used. If you need to change your password, ask an admin to send a new link.';
        } else if (data.reason === 'invalid') {
          msg = 'This link is not valid. Ask an admin to send a new set-password email.';
        } else {
          msg = 'This link is no longer valid. Ask an admin for a new one.';
        }
        msgEl.textContent = msg;
        if (isReset && (data.reason === 'expired' || data.reason === 'used')) {
          actionEl.href = '/login#forgot';
          actionEl.textContent = 'Request a new reset link';
        }
        return show('state-invalid');
      }
      currentEmail = data.email || '';
      document.getElementById('email-display').textContent = currentEmail;
      show('state-form');
    } catch {
      document.getElementById('invalid-msg').textContent =
        'Could not verify the link — please check your connection and try again.';
      show('state-invalid');
    }
  })();

  function userInputs() {
    const local = (currentEmail || '').split('@')[0] || '';
    return [currentEmail, local, 'measure once', 'measureonce'].filter(Boolean);
  }

  PasswordStrength.mountStrengthMeter(
    document.getElementById('pw1'),
    document.getElementById('meter-mount'),
    userInputs,
  );

  document.getElementById('pw-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw1 = document.getElementById('pw1').value;
    const pw2 = document.getElementById('pw2').value;
    if (pw1 !== pw2) return showErr('Passwords do not match.');
    const policyErr = PasswordStrength.checkPasswordPolicy(pw1, userInputs());
    if (policyErr) return showErr(policyErr);

    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const r = await fetch('/api/set-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password: pw1 }),
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) {
        showErr(data.error || 'Could not set password.');
        btn.disabled = false; btn.textContent = 'Set password';
        return;
      }
      window.location.href = '/login?password_set=1';
    } catch {
      showErr('Network error — please try again.');
      btn.disabled = false; btn.textContent = 'Set password';
    }
  });
</script>
</body>
</html>
