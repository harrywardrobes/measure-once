<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#200842">
  <meta name="color-scheme" content="light">
  <title>Customers · Measure Once</title>
  <link rel="stylesheet" href="/tailwind.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="/app-styles.css">
</head>
<body>
  <!--
    Minimal HTML shell for the Customers page. All page UI (filters, search,
    list, pagination, lead-status sync) is rendered into #tab-customers by
    the React island (src/react/pages/CustomersPage.tsx, registered in
    src/react/main.tsx). chrome.js is loaded so the shared app header /
    bottom nav appears on this page like every other dashboard page.
  -->
  <a href="#tab-customers" class="skip-link">Skip to customer list</a>

  <script src="/chrome.js"></script>

  <main id="tab-customers"></main>

  <!--
    legacy-shim.js / workflow-core.js are loaded so the React Customers island
    can reuse the legacy `state.contactUrgencyCache` + `getTaskUrgency` helpers.
    QB invoices are now fetched directly by the React useQBInvoices() hook.
    bootstrap() is NOT called — the React island fetches its own data and
    auth is handled by AppBootstrapProvider in the React tree.
  -->
  <script src="/legacy-shim.js"></script>
  <script src="/workflow-core.js"></script>

  <script type="module" src="/react/main.js"></script>
</body>
</html>
