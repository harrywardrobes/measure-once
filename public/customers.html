  <script src="/chrome.js"></script>

  <script src="/workflow.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!await bootstrap()) return;

      // Default to "All contacts" view on the customers page.
      state.contactsViewMode = 'all';

      // Restore any filter/sort state saved when the user navigated to a profile.
      const hadSavedFilters = restoreCustomerListFilters();

      // Render from cache immediately so back-navigation feels instant.
      // Only use the all-contacts cache when we are (or restored to) 'all' mode.
      let renderedFromCache = false;
      if (state.contactsViewMode === 'all') {
        try {
          const cached = sessionStorage.getItem('contacts_all_cache');
          if (cached) {
            state.contacts = JSON.parse(cached);
            state.filteredContacts = [...state.contacts];
            renderCustomerList();
            restoreCustomerListScroll();
            renderedFromCache = true;
          }
        } catch {}
      }

      // Always fetch fresh data using the correct loader for the current view mode.
      try {
        const loader = (state.contactsViewMode === 'all') ? loadAllContacts() : loadOpenLeads();
        await loader;
        state.filteredContacts = [...state.contacts];
        populateLeadStatusFilter();
        renderCustomerList();
        if (!renderedFromCache) restoreCustomerListScroll();
      } catch (e) {
        console.error('Failed to load contacts', e);
        const view = document.getElementById('customers-view');
        if (view) {
          let msg, action;
          if (e.code === 'HUBSPOT_AUTH') {
            msg = 'Could not connect to HubSpot — the API token is invalid or expired. An admin needs to update the <strong>HUBSPOT_ACCESS_TOKEN</strong> in the environment settings and restart the app.';
            action = `<a href="/settings" class="mt-2 inline-block text-blue-600 underline text-xs">Go to Settings</a>`;
          } else if (e.code === 'HUBSPOT_RATE_LIMIT') {
            msg = 'HubSpot rate limit reached.';
            action = `<button onclick="location.reload()" class="mt-2 text-blue-600 underline text-xs">Try again</button>`;
          } else if (e.code === 'HUBSPOT_ERROR' || e.code) {
            msg = 'Could not load contacts from HubSpot. This may be a temporary issue.';
            action = `<button onclick="location.reload()" class="mt-2 text-blue-600 underline text-xs">Retry</button>`;
          } else {
            msg = `Failed to load contacts: ${escHtml(e.message)}`;
            action = `<button onclick="location.reload()" class="mt-2 text-blue-600 underline text-xs">Retry</button>`;
          }
          view.innerHTML = `<div class="p-4 text-sm text-red-500">${msg}<br>${action}</div>`;
        }
      }

      const params = new URLSearchParams(location.search);
      const q = params.get('q');
      const openModal = params.get('new') === '1';

      if (q) {
        const inp = document.getElementById('search');
        if (inp) inp.value = q;
        const clear = document.getElementById('search-clear');
        if (clear) clear.classList.remove('hidden');
        filterDeals(q);
      }

      if (openModal) {
        openNewCustomerModal();
      }
    });
  </script>
