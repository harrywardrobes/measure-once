<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#200842">
  <meta name="color-scheme" content="light">
  <title>Customers · Measure Once</title>
  <link rel="stylesheet" href="/tailwind.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div id="tab-customers" class="app-body">
    <div id="list-panel" class="list-panel list-panel-fw">
      <div class="p-3 border-b border-slate-100 flex-shrink-0">
        <div class="flex gap-1.5 mb-1.5">
          <button id="view-active-btn" onclick="setContactsViewMode('active')"
            class="filter-btn flex-1 justify-center">Active</button>
          <button id="view-all-btn" onclick="setContactsViewMode('all')"
            class="filter-btn flex-1 justify-center filter-btn-active">All</button>
        </div>
        <div class="flex gap-1.5">
          <select id="stage-filter" onchange="setStageFilter(this.value)"
            class="flex-1 min-w-0 bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-1.5 text-xs text-slate-600 focus:outline-none focus:border-blue-400 transition">
            <option value="">All stages</option>
          </select>
          <button id="archived-toggle" onclick="toggleArchived()" class="filter-btn">Archived</button>
          <button onclick="openNewCustomerModal()" title="New Customer" data-viewer-hide
            class="flex-shrink-0 flex items-center gap-1 filter-btn bg-[#200842] hover:bg-[#3d0f7a] text-white border-transparent">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
            </svg>
            New
          </button>
        </div>
        <div id="lead-status-filter-row" class="flex gap-1.5 mt-1.5">
          <select id="lead-status-filter" onchange="setLeadStatusFilter(this.value)"
            class="flex-1 min-w-0 bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-1.5 text-xs text-slate-600 focus:outline-none focus:border-blue-400 transition">
            <option value="">All statuses</option>
          </select>
        </div>
        <div class="flex gap-1.5 mt-1.5">
          <select id="sort-select" onchange="setSortBy(this.value)"
            class="flex-1 min-w-0 bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-1.5 text-xs text-slate-600 focus:outline-none focus:border-blue-400 transition">
            <option value="newest">Newest first</option>
            <option value="name-asc">Name A–Z</option>
            <option value="name-desc">Name Z–A</option>
            <option value="stage">Stage order</option>
          </select>
        </div>
        <div id="deal-count" class="text-xs text-slate-400 mt-1.5 px-0.5"></div>
      </div>
      <div id="customer-list" class="flex-1 overflow-y-auto">
        <div class="skeleton-card"><div class="skeleton-line skeleton-name"></div><div class="skeleton-meta"><div class="skeleton-line skeleton-pill"></div><div class="skeleton-line skeleton-email"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-line skeleton-name" style="width:42%"></div><div class="skeleton-meta"><div class="skeleton-line skeleton-pill"></div><div class="skeleton-line skeleton-email" style="width:30%"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-line skeleton-name" style="width:63%"></div><div class="skeleton-meta"><div class="skeleton-line skeleton-pill"></div><div class="skeleton-line skeleton-email" style="width:45%"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-line skeleton-name" style="width:48%"></div><div class="skeleton-meta"><div class="skeleton-line skeleton-pill"></div><div class="skeleton-line skeleton-email" style="width:34%"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-line skeleton-name" style="width:70%"></div><div class="skeleton-meta"><div class="skeleton-line skeleton-pill"></div><div class="skeleton-line skeleton-email" style="width:50%"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-line skeleton-name" style="width:38%"></div><div class="skeleton-meta"><div class="skeleton-line skeleton-pill"></div><div class="skeleton-line skeleton-email" style="width:28%"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-line skeleton-name" style="width:57%"></div><div class="skeleton-meta"><div class="skeleton-line skeleton-pill"></div><div class="skeleton-line skeleton-email" style="width:40%"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-line skeleton-name" style="width:44%"></div><div class="skeleton-meta"><div class="skeleton-line skeleton-pill"></div><div class="skeleton-line skeleton-email" style="width:32%"></div></div></div>
      </div>
    </div>
  </div>

  <!-- New Customer Modal -->
  <div id="new-customer-overlay" class="inv-overlay hidden" onclick="closeNewCustomerModal()"></div>
  <div id="new-customer-modal" class="nc-modal-wrap hidden" style="display:none;">
    <div class="nc-modal-box" onclick="event.stopPropagation()">
      <div class="nc-modal-header">
        <h2 class="nc-modal-title">New Customer</h2>
        <button onclick="closeNewCustomerModal()" class="nc-modal-close" title="Close">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <form id="new-customer-form" onsubmit="submitNewCustomer(event)" novalidate>
        <div class="nc-form-grid">
          <label class="nc-form-row">
            <span class="nc-label-text">First name <span class="nc-required">*</span></span>
            <input id="nc-firstname" type="text" required autocomplete="given-name" class="nc-input">
          </label>
          <label class="nc-form-row">
            <span class="nc-label-text">Last name</span>
            <input id="nc-lastname" type="text" autocomplete="family-name" class="nc-input">
          </label>
        </div>
        <label class="nc-form-row">
          <span class="nc-label-text">Email <span class="nc-required">*</span></span>
          <input id="nc-email" type="email" required autocomplete="email" class="nc-input">
        </label>
        <label class="nc-form-row">
          <span class="nc-label-text">Phone</span>
          <input id="nc-phone" type="tel" autocomplete="tel" class="nc-input">
        </label>
        <label class="nc-form-row nc-form-row-last">
          <span class="nc-label-text">Postcode <span class="nc-required">*</span></span>
          <input id="nc-postcode" type="text" required autocomplete="postal-code" class="nc-input nc-postcode">
        </label>
        <div id="nc-error" class="nc-error"></div>
        <div class="nc-actions">
          <button type="button" onclick="closeNewCustomerModal()" class="nc-btn-cancel">Cancel</button>
          <button type="submit" id="nc-submit" class="nc-btn-submit">Create Customer</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/chrome.js"></script>
  <script src="/core.js"></script>
  <script src="/workflow-core.js"></script>
  <script src="/invoices-core.js"></script>
  <script src="/workflow.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!await bootstrap()) return;

      // Default to "All contacts" view on the customers page.
      state.contactsViewMode = 'all';

      // Restore any filter/sort state saved when the user navigated to a profile.
      const hadSavedFilters = restoreCustomerListFilters();

      // Render from cache immediately so back-navigation feels instant.
      // Only use the all-contacts cache when we are (or restored to) 'all' mode.
      let renderedFromCache = false;
      if (state.contactsViewMode === 'all') {
        try {
          const cached = sessionStorage.getItem('contacts_all_cache');
          if (cached) {
            state.contacts = JSON.parse(cached);
            state.filteredContacts = [...state.contacts];
            renderCustomerList();
            restoreCustomerListScroll();
            renderedFromCache = true;
          }
        } catch {}
      }

      // Always fetch fresh data using the correct loader for the current view mode.
      try {
        const loader = (state.contactsViewMode === 'all') ? loadAllContacts() : loadOpenLeads();
        await loader;
        state.filteredContacts = [...state.contacts];
        populateLeadStatusFilter();
        renderCustomerList();
        if (!renderedFromCache) restoreCustomerListScroll();
      } catch (e) {
        console.error('Failed to load contacts', e);
        const list = document.getElementById('customer-list');
        if (list) {
          let msg, action;
          if (e.code === 'HUBSPOT_AUTH') {
            msg = 'Could not connect to HubSpot — the API token is invalid or expired. An admin needs to update the <strong>HUBSPOT_ACCESS_TOKEN</strong> in the environment settings and restart the app.';
            action = '';
          } else if (e.code === 'HUBSPOT_RATE_LIMIT') {
            msg = 'HubSpot rate limit reached.';
            action = `<button onclick="location.reload()" class="mt-2 text-blue-600 underline text-xs">Try again</button>`;
          } else if (e.code === 'HUBSPOT_ERROR' || e.code) {
            msg = 'Could not load contacts from HubSpot. This may be a temporary issue.';
            action = `<button onclick="location.reload()" class="mt-2 text-blue-600 underline text-xs">Retry</button>`;
          } else {
            msg = `Failed to load contacts: ${escHtml(e.message)}`;
            action = `<button onclick="location.reload()" class="mt-2 text-blue-600 underline text-xs">Retry</button>`;
          }
          list.innerHTML = `<div class="p-4 text-sm text-red-500">${msg}<br>${action}</div>`;
        }
      }

      const params = new URLSearchParams(location.search);
      const q = params.get('q');
      const openModal = params.get('new') === '1';

      if (q) {
        const inp = document.getElementById('search');
        if (inp) inp.value = q;
        const clear = document.getElementById('search-clear');
        if (clear) clear.classList.remove('hidden');
        filterDeals(q);
      }

      if (openModal) {
        openNewCustomerModal();
      }

      // Open a contact requested from another page — navigate to their profile.
      try {
        const pending = sessionStorage.getItem('pendingOpenContact');
        if (pending) {
          sessionStorage.removeItem('pendingOpenContact');
          const { contactId, roomIdx } = JSON.parse(pending);
          if (contactId) {
            const url = roomIdx ? `/customers/${contactId}?room=${roomIdx}` : `/customers/${contactId}`;
            location.href = url;
          }
        }
      } catch {}
    });
  </script>
</body>
</html>
