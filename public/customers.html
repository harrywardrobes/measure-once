<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#200842">
  <meta name="color-scheme" content="light">
  <title>Customers · Measure Once</title>
  <link rel="stylesheet" href="/tailwind.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!--
    Minimal HTML shell for the Customers page. All page UI (filters, search,
    list, pagination, lead-status sync) is rendered into #tab-customers by
    the React island (src/react/pages/CustomersPage.tsx, registered in
    src/react/main.tsx). chrome.js + components.js are still loaded so the
    shared app header / bottom nav appears on this page like every other
    dashboard page.
  -->
  <a href="#tab-customers" class="skip-link">Skip to customer list</a>

  <script src="/chrome.js"></script>
  <script src="/components.js"></script>

  <main id="tab-customers"></main>

  <!--
    core.js / workflow-core.js / invoices-core.js are loaded (but their
    bootstrap() is NOT called) so the React Customers island can reuse:
      - the legacy `state.qb.invoices` cache + `matchInvoicesForContact`
      - the legacy `state.contactUrgencyCache` + `getTaskUrgency`
      - the shared invoice side-panel (`openInvoicePanelFromBadge`,
        whose DOM `#inv-panel` is mounted by chrome.js)
    Their plain-script globals (`state`, `STAGE_COLOURS`, `stageColour`,
    `matchInvoicesForContact`, `openInvoicePanelFromBadge`, …) are read
    from `window.*` by `CustomersPage.tsx`.
  -->
  <script src="/core.js"></script>
  <script src="/workflow-core.js"></script>
  <script src="/invoices-core.js"></script>

  <script src="/command-palette.js"></script>
  <script type="module" src="/react/main.js"></script>
</body>
</html>
