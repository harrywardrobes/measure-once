<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#200842">
  <meta name="color-scheme" content="light">
  <title>Sales · Measure Once</title>
  <link rel="stylesheet" href="/tailwind.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div id="tab-customers" class="app-body">
    <aside id="list-panel" class="list-panel">
      <div class="p-3 border-b border-slate-100 flex-shrink-0">
        <div class="flex gap-1.5">
          <select id="stage-filter" onchange="setStageFilter(this.value)"
            class="flex-1 min-w-0 bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-1.5 text-xs text-slate-600 focus:outline-none focus:border-blue-400 transition"
            style="font-size:13px">
            <option value="">All stages</option>
          </select>
          <button id="archived-toggle" onclick="toggleArchived()" class="filter-btn">Archived</button>
          <button onclick="openNewCustomerModal()" title="New Customer"
            class="flex-shrink-0 flex items-center gap-1 filter-btn bg-[#200842] hover:bg-[#3d0f7a] text-white border-transparent">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
            </svg>
            New
          </button>
        </div>
        <div id="deal-count" class="text-xs text-slate-400 mt-1.5 px-0.5"></div>
      </div>
      <div id="customer-list" class="flex-1 overflow-y-auto">
        <div class="flex items-center gap-2 p-4 text-slate-400 text-sm">
          <div class="spinner"></div> Loading…
        </div>
      </div>
    </aside>

    <main id="workflow-panel" class="workflow-panel">
      <div id="empty-state" class="flex items-center justify-center h-full">
        <div class="text-center px-6" style="color:var(--stone-deep)">
          <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin:0 auto 16px;opacity:0.4">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
          <p style="font-weight:600;color:var(--ink-3);font-size:1rem;">Select a customer</p>
          <p style="font-size:0.875rem;margin-top:4px;color:var(--stone-deep);">Choose a customer from the list to view their project workflow</p>
        </div>
      </div>
      <div id="workflow-view" class="hidden"></div>
    </main>
  </div>

  <!-- New Customer Modal (sales page only) -->
  <div id="new-customer-overlay" class="inv-overlay hidden" onclick="closeNewCustomerModal()"></div>
  <div id="new-customer-modal" class="hidden" style="position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:1rem;">
    <div style="background:#fff;border-radius:1rem;box-shadow:0 20px 60px rgba(0,0,0,0.18);width:100%;max-width:420px;padding:1.5rem;" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
        <h2 style="font-size:1rem;font-weight:700;color:#0f172a;">New Customer</h2>
        <button onclick="closeNewCustomerModal()" style="background:none;border:none;cursor:pointer;color:#94a3b8;padding:0.25rem;" title="Close">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <form id="new-customer-form" onsubmit="submitNewCustomer(event)" novalidate>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:0.75rem;">
          <label style="display:flex;flex-direction:column;gap:0.3rem;">
            <span style="font-size:0.75rem;font-weight:600;color:#475569;">First name <span style="color:#dc2626;">*</span></span>
            <input id="nc-firstname" type="text" required autocomplete="given-name"
              style="border:1px solid #e2e8f0;border-radius:0.5rem;padding:0.5rem 0.75rem;font-size:0.875rem;outline:none;transition:border-color 0.15s;"
              onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#e2e8f0'">
          </label>
          <label style="display:flex;flex-direction:column;gap:0.3rem;">
            <span style="font-size:0.75rem;font-weight:600;color:#475569;">Last name</span>
            <input id="nc-lastname" type="text" autocomplete="family-name"
              style="border:1px solid #e2e8f0;border-radius:0.5rem;padding:0.5rem 0.75rem;font-size:0.875rem;outline:none;transition:border-color 0.15s;"
              onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#e2e8f0'">
          </label>
        </div>
        <label style="display:flex;flex-direction:column;gap:0.3rem;margin-bottom:0.75rem;">
          <span style="font-size:0.75rem;font-weight:600;color:#475569;">Email <span style="color:#dc2626;">*</span></span>
          <input id="nc-email" type="email" required autocomplete="email"
            style="border:1px solid #e2e8f0;border-radius:0.5rem;padding:0.5rem 0.75rem;font-size:0.875rem;outline:none;transition:border-color 0.15s;"
            onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#e2e8f0'">
        </label>
        <label style="display:flex;flex-direction:column;gap:0.3rem;margin-bottom:0.75rem;">
          <span style="font-size:0.75rem;font-weight:600;color:#475569;">Phone</span>
          <input id="nc-phone" type="tel" autocomplete="tel"
            style="border:1px solid #e2e8f0;border-radius:0.5rem;padding:0.5rem 0.75rem;font-size:0.875rem;outline:none;transition:border-color 0.15s;"
            onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#e2e8f0'">
        </label>
        <label style="display:flex;flex-direction:column;gap:0.3rem;margin-bottom:1.25rem;">
          <span style="font-size:0.75rem;font-weight:600;color:#475569;">Postcode <span style="color:#dc2626;">*</span></span>
          <input id="nc-postcode" type="text" required autocomplete="postal-code"
            style="border:1px solid #e2e8f0;border-radius:0.5rem;padding:0.5rem 0.75rem;font-size:0.875rem;outline:none;transition:border-color 0.15s;text-transform:uppercase;"
            onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#e2e8f0'">
        </label>
        <div id="nc-error" style="display:none;background:#fef2f2;border:1px solid #fca5a5;border-radius:0.5rem;padding:0.6rem 0.75rem;font-size:0.8rem;color:#b91c1c;margin-bottom:0.75rem;"></div>
        <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
          <button type="button" onclick="closeNewCustomerModal()"
            style="padding:0.5rem 1.25rem;border-radius:0.625rem;border:1px solid #e2e8f0;background:#f8fafc;color:#475569;font-size:0.875rem;font-weight:600;cursor:pointer;">
            Cancel
          </button>
          <button type="submit" id="nc-submit"
            style="padding:0.5rem 1.25rem;border-radius:0.625rem;border:none;background:#200842;color:#fff;font-size:0.875rem;font-weight:600;cursor:pointer;transition:background 0.15s;"
            onmouseover="this.style.background='#3d0f7a'" onmouseout="this.style.background='#200842'">
            Create Customer
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="/chrome.js"></script>
  <script src="/core.js"></script>
  <script src="/workflow.js"></script>
  <script src="/sales.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!await bootstrap()) return;

      // Pre-fill search from ?q= (when user came from another page's header search).
      const q = new URLSearchParams(location.search).get('q');
      if (q) {
        const inp = document.getElementById('search');
        if (inp) inp.value = q;
        const clear = document.getElementById('search-clear');
        if (clear) clear.classList.remove('hidden');
        filterDeals(q);
      }

      // Open a contact requested from another page (e.g. Projects → openProject).
      try {
        const pending = sessionStorage.getItem('pendingOpenContact');
        if (pending) {
          sessionStorage.removeItem('pendingOpenContact');
          const { contactId, roomIdx } = JSON.parse(pending);
          if (contactId) selectContact(contactId, roomIdx || 0);
        }
      } catch {}
    });
  </script>
</body>
</html>
