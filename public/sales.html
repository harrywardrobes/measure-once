<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#200842">
  <meta name="color-scheme" content="light">
  <title>Sales · Measure Once</title>
  <link rel="stylesheet" href="/tailwind.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div id="tab-customers" class="app-body sales-layout">
    <aside id="list-panel" class="list-panel sales-list-panel">
      <div id="sales-view"></div>
    </aside>

    <main id="workflow-panel" class="workflow-panel">
      <div id="empty-state" class="flex items-center justify-center h-full">
        <div class="text-center px-6 empty-state-text">
          <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="empty-state-icon">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
          <p class="empty-state-heading">No customer selected</p>
          <p class="empty-state-sub">Go to the Customers page to browse and select a customer.</p>
          <a href="/customers" class="sales-goto-customers-btn">Browse Customers</a>
        </div>
      </div>
      <div id="workflow-view" class="hidden"></div>
    </main>
  </div>

  <script src="/chrome.js"></script>
  <script src="/core.js"></script>
  <script src="/workflow-core.js"></script>
  <script src="/invoices-core.js"></script>
  <script src="/workflow.js"></script>
  <script src="/projects.js"></script>
  <script src="/sales.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!await bootstrap()) return;

      // Open a contact navigated here from Customers or Projects page.
      try {
        const pending = sessionStorage.getItem('pendingOpenContact');
        if (pending) {
          sessionStorage.removeItem('pendingOpenContact');
          const { contactId, roomIdx } = JSON.parse(pending);
          if (contactId) selectContact(contactId, roomIdx || 0);
        }
      } catch {}
    });
  </script>
</body>
</html>
