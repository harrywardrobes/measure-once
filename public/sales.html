<!DOCTYPE html>

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <meta name="color-scheme" content="light">

  <link rel="stylesheet" href="/tailwind.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div id="tab-customers" class="app-body sales-layout">
    <aside id="list-panel" class="list-panel sales-list-panel">
      <div id="sales-view">
        <div class="project-stage-tabs-bar">
          <div class="skeleton-line" style="height:30px;width:42px;border-radius:20px"></div>
          <div class="skeleton-line" style="height:30px;width:58px;border-radius:20px"></div>
          <div class="skeleton-line" style="height:30px;width:80px;border-radius:20px"></div>
          <div class="skeleton-line" style="height:30px;width:62px;border-radius:20px"></div>
        </div>
        <div class="projects-inner">
          <div class="customer-project-card skeleton-pipeline-card">
            <div class="customer-project-header">
              <div class="skeleton-line" style="height:14px;width:62%"></div>
            </div>
            <div class="project-room-list">
              <div class="skeleton-room-row">
                <div class="skeleton-line" style="height:12px;width:28%"></div>
                <div class="skeleton-line skeleton-pill" style="width:70px"></div>
              </div>
            </div>
          </div>
          <div class="customer-project-card skeleton-pipeline-card">
            <div class="customer-project-header">
              <div class="skeleton-line" style="height:14px;width:50%"></div>
            </div>
            <div class="project-room-list">
              <div class="skeleton-room-row">
                <div class="skeleton-line" style="height:12px;width:32%"></div>
                <div class="skeleton-line skeleton-pill" style="width:78px"></div>
              </div>
              <div class="skeleton-room-row">
                <div class="skeleton-line" style="height:12px;width:40%"></div>
                <div class="skeleton-line skeleton-pill" style="width:88px"></div>
              </div>
            </div>
          </div>
          <div class="customer-project-card skeleton-pipeline-card">
            <div class="customer-project-header">
              <div class="skeleton-line" style="height:14px;width:70%"></div>
            </div>
            <div class="project-room-list">
              <div class="skeleton-room-row">
                <div class="skeleton-line" style="height:12px;width:36%"></div>
                <div class="skeleton-line skeleton-pill" style="width:64px"></div>
              </div>
            </div>
          </div>
          <div class="customer-project-card skeleton-pipeline-card">
            <div class="customer-project-header">
              <div class="skeleton-line" style="height:14px;width:55%"></div>
            </div>
            <div class="project-room-list">
              <div class="skeleton-room-row">
                <div class="skeleton-line" style="height:12px;width:30%"></div>
                <div class="skeleton-line skeleton-pill" style="width:72px"></div>
              </div>
            </div>
          </div>
          <div class="customer-project-card skeleton-pipeline-card">
            <div class="customer-project-header">
              <div class="skeleton-line" style="height:14px;width:45%"></div>
            </div>
            <div class="project-room-list">
              <div class="skeleton-room-row">
                <div class="skeleton-line" style="height:12px;width:34%"></div>
                <div class="skeleton-line skeleton-pill" style="width:84px"></div>
              </div>
              <div class="skeleton-room-row">
                <div class="skeleton-line" style="height:12px;width:26%"></div>
                <div class="skeleton-line skeleton-pill" style="width:68px"></div>
              </div>
            </div>
          </div>
          <div class="customer-project-card skeleton-pipeline-card">
            <div class="customer-project-header">
              <div class="skeleton-line" style="height:14px;width:65%"></div>
            </div>
            <div class="project-room-list">
              <div class="skeleton-room-row">
                <div class="skeleton-line" style="height:12px;width:38%"></div>
                <div class="skeleton-line skeleton-pill" style="width:76px"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <main id="workflow-panel" class="workflow-panel">
      <div id="empty-state" class="hidden"></div>
      <div id="workflow-view">
        <button class="back-btn" onclick="goBack()">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/>
          </svg>
          Customers
        </button>
        <div class="bg-white border-b border-slate-200 px-4 sm:px-6 py-4 shadow-sm">
          <div class="flex items-start justify-between gap-4">
            <div class="flex-1 min-w-0">
              <div class="skeleton-line skeleton-wf-name"></div>
              <div class="flex items-center gap-2 mt-3">
                <div class="skeleton-line skeleton-wf-badge"></div>
                <div class="skeleton-line skeleton-wf-email"></div>
                <div class="skeleton-line skeleton-wf-phone"></div>
              </div>
            </div>
            <div class="skeleton-line skeleton-wf-select"></div>
          </div>
        </div>
        <div class="workflow-inner">
          <div class="space-y-2">
            <div class="skeleton-stage-row"><div class="flex items-center gap-3 flex-1"><div class="skeleton-line skeleton-stage-dot"></div><div class="skeleton-line skeleton-stage-label"></div></div><div class="skeleton-line skeleton-stage-count"></div></div>
            <div class="skeleton-stage-row"><div class="flex items-center gap-3 flex-1"><div class="skeleton-line skeleton-stage-dot"></div><div class="skeleton-line skeleton-stage-label skeleton-stage-label-md"></div></div><div class="skeleton-line skeleton-stage-count"></div></div>
            <div class="skeleton-stage-row"><div class="flex items-center gap-3 flex-1"><div class="skeleton-line skeleton-stage-dot"></div><div class="skeleton-line skeleton-stage-label skeleton-stage-label-sm"></div></div><div class="skeleton-line skeleton-stage-count"></div></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/chrome.js"></script>
  <script src="/core.js"></script>
  <script src="/workflow-core.js"></script>
  <script src="/invoices-core.js"></script>
  <script src="/workflow.js"></script>
  <script src="/projects.js"></script>
  <script src="/sales.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!await bootstrap()) return;

      // Open a contact navigated here from Customers or Projects page.
      try {
        const pending = sessionStorage.getItem('pendingOpenContact');
        if (pending) {
          sessionStorage.removeItem('pendingOpenContact');
          const { contactId, roomIdx } = JSON.parse(pending);
          if (contactId) selectContact(contactId, roomIdx || 0);
        }
      } catch {}
    });
  </script>
</body>
</html>
