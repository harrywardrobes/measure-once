<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#200842">
  <meta name="color-scheme" content="light">
  <title>Sales · Measure Once</title>
  <link rel="stylesheet" href="/tailwind.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">

  <div id="tab-customers" class="app-body">
    <aside id="list-panel" class="list-panel sales-list-panel">

        </div>

            </div>
            <div class="enquiry-list">

              </div>
              <div class="eq-card" style="pointer-events:none">
                <div class="skeleton-line" style="height:3px;border-radius:0;margin:0"></div>

                    <div class="skeleton-line" style="height:13px;width:48%"></div>

                    <div class="skeleton-line" style="height:13px;width:68%"></div>
                    <div class="skeleton-line" style="height:11px;width:36px"></div>

                    <div class="skeleton-line skeleton-pill" style="width:68px"></div>

                </div>
              </div>

                <div class="eq-card-body">
                  <div class="eq-card-name-row">
                    <div class="skeleton-line" style="height:13px;width:62%"></div>
                    <div class="skeleton-line" style="height:11px;width:42px"></div>
                  </div>
                  <div class="eq-card-meta">
                    <div class="skeleton-line skeleton-pill" style="width:80px"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <script src="/chrome.js"></script>
  <script src="/command-palette.js"></script>
  <script src="/core.js"></script>
  <script src="/workflow-core.js"></script>
  <script src="/invoices-core.js"></script>
  <script src="/workflow.js"></script>
  <script src="/projects.js"></script>
  <script src="/sales.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await bootstrap();
    });
  </script>

</html>
