<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#200842">
  <meta name="color-scheme" content="light">
  <title>Sales · Measure Once</title>
  <link rel="stylesheet" href="/tailwind.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div id="tab-customers" class="app-body">
    <aside id="list-panel" class="list-panel sales-list-panel">
      <div id="sales-view"></div>
    </aside>
  </div>

  <script src="/chrome.js"></script>
  <script src="/components.js"></script>
  <script type="module" src="/react/main.js"></script>
  <script>
    // Paint a lightweight loading skeleton via the shared UI.skeletonLine
    // helper so the column isn't blank during the initial bootstrap()/data fetch.
    (function paintSalesBoardSkeleton() {
      const view = document.getElementById('sales-view');
      if (!view || !window.UI || typeof UI.skeletonLine !== 'function') return;
      const line = UI.skeletonLine;
      const cards = [
        { name: '60%', cnt: '38px', pills: [76, 52], action: '58%' },
        { name: '48%', cnt: '44px', pills: [92] },
        { name: '68%', cnt: '36px', pills: [68, 56], action: '50%' },
        { name: '54%', cnt: '40px', pills: [84] },
        { name: '42%', cnt: '34px', pills: [72, 60], action: '62%' },
        { name: '62%', cnt: '42px', pills: [80] },
      ].map(c => {
        const pills = c.pills.map(w =>
          line(w + 'px', null, { className: 'skeleton-pill' })
        ).join('');
        const action = c.action
          ? `<div class="eq-card-action" style="pointer-events:none;opacity:0.4">${line(c.action, 11)}</div>`
          : '';
        return `<div class="eq-card" style="pointer-events:none">
          ${line('100%', 3, { style: 'border-radius:0;margin:0' })}
          <div class="eq-card-body">
            <div class="eq-card-name-row">${line(c.name, 13)}${line(c.cnt, 11)}</div>
            <div class="eq-card-meta">${pills}</div>
          </div>
          ${action}
        </div>`;
      }).join('');
      view.innerHTML =
        `<div class="sales-board">
          <div class="eq-col eq-col-active">
            <div class="eq-col-header" style="border-top:3px solid #e2e8f0">
              ${line('60px', 13)}
              ${line('26px', null, { className: 'skeleton-pill' })}
            </div>
            <div class="enquiry-list">${cards}</div>
          </div>
        </div>`;
    })();
  </script>
  <script src="/command-palette.js"></script>
  <script src="/core.js"></script>
  <script src="/workflow-core.js"></script>
  <script src="/invoices-core.js"></script>
  <script src="/workflow.js"></script>
  <script src="/projects.js"></script>
  <script src="/sales.js"></script>
  <script src="/card-action-handlers.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await bootstrap();
    });
  </script>
</body>
</html>
