<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Page Not Found · Measure Once</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body {
      background: #f5f4f1; color: #1c1917; margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card {
      background: #fff; border: 2px solid #d6d3d1; border-radius: 12px;
      max-width: 440px; width: 100%; padding: 36px; text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,.06);
    }
    .logo-wrap { text-align: center; margin-bottom: 28px; }
    .logo-wrap img { max-width: 180px; width: 100%; height: auto; display: inline-block; }
    .error-code {
      font-size: 3.25rem; font-weight: 800; color: #3d0f7a;
      line-height: 1; margin: 0 0 14px; letter-spacing: -.02em;
    }
    h1 {
      font-size: 1.4rem; font-weight: 700; margin: 0 0 8px;
      color: #0f0f0e; letter-spacing: -.01em;
    }
    .sub { color: #44403c; font-size: .95rem; margin: 0 0 28px; line-height: 1.5; }
    a.home-btn {
      display: inline-block; background: #3d0f7a; color: #fff;
      text-decoration: none; padding: 14px 28px; border-radius: 8px;
      font-weight: 700; font-size: 1rem; letter-spacing: .02em;
      transition: background .15s ease;
    }
    a.home-btn:hover { background: #5a1fad; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="/harry-wardrobes-logo.png" alt="Harry Wardrobes">
    </div>
    <p class="error-code">404</p>
    <h1>We measured twice&hellip; this page still isn&rsquo;t here.</h1>
    <p class="sub">Looks like this one&rsquo;s been fitted elsewhere.</p>
    <a href="/" class="home-btn">Back to home</a>
  </div>
</body>
</html>
