<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#200842">
  <title>Page Not Found · Measure Once</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--paper);
      display: flex;
      flex-direction: column;
    }

    .page-header {
      background: var(--plum);
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      flex-shrink: 0;
    }

    .logo-mark {
      font-family: 'Anton', sans-serif;
      font-size: 1.15rem;
      color: #fff;
      letter-spacing: 0.01em;
      text-decoration: none;
      opacity: 0.92;
    }

    .page-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .content {
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .error-code {
      font-family: 'Anton', sans-serif;
      font-size: clamp(5rem, 20vw, 8rem);
      color: var(--orchid);
      line-height: 1;
      margin: 0 0 4px;
      letter-spacing: -0.02em;
    }

    .headline {
      font-family: 'Anton', sans-serif;
      font-size: clamp(1.25rem, 5vw, 1.75rem);
      color: var(--plum);
      margin: 0 0 12px;
      letter-spacing: 0.01em;
      line-height: 1.2;
    }

    .subtext {
      font-family: 'Open Sans', system-ui, sans-serif;
      font-size: 0.95rem;
      color: var(--ink-3);
      margin: 0 0 36px;
      line-height: 1.6;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--orchid);
      color: #fff;
      text-decoration: none;
      font-family: 'Open Sans', system-ui, sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 12px 28px;
      border-radius: var(--radius-lg);
      transition: background 0.15s;
      letter-spacing: 0.01em;
    }

    .home-btn:hover { background: var(--orchid-deep); }
    .home-btn:active { background: var(--orchid-deep); }

    .divider {
      width: 40px;
      height: 3px;
      background: var(--orchid);
      border-radius: var(--radius-pill);
      margin: 0 auto 28px;
      opacity: 0.35;
    }
  </style>
</head>
<body>
  <header class="page-header">
    <a href="/" class="logo-mark">Measure Once</a>
  </header>

  <main class="page-body">
    <div class="content">
      <p class="error-code">404</p>
      <div class="divider"></div>
      <h1 class="headline">We measured twice&hellip;<br>this page still isn&rsquo;t here.</h1>
      <p class="subtext">Looks like this one&rsquo;s been fitted elsewhere.</p>
      <a href="/" class="home-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Back to home
      </a>
    </div>
  </main>
</body>
</html>
