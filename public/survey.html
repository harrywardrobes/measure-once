<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#200842">
  <meta name="color-scheme" content="light">
  <title>Survey · Measure Once</title>
  <link rel="stylesheet" href="/tailwind.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="/app-styles.css">
</head>
<body>

  <div id="tab-survey" class="app-body">
    <aside id="list-panel" class="list-panel sales-list-panel">
      <div id="survey-view">
        <div id="survey-board-mount"></div>
      </div>
    </aside>
  </div>

  <script src="/chrome.js"></script>
  <script src="/components.js"></script>
  <script type="module" src="/react/main.js"></script>

  <script src="/legacy-shim.js"></script>
  <script src="/workflow-core.js"></script>
  <script src="/card-action-handlers.js"></script>
  <script>
    // Data-bridge event wiring for SurveyBoardPage (inlined from survey.js).
    // Overrides the open-leads loader so the page init fetches ALL contacts.
    registerOpenLeadsLoader(loadAllContacts);
    // Notify the React SurveyBoardPage whenever fresh data is available.
    document.addEventListener('mo:contacts-changed', function surveyBoardNotifyReact() {
      document.dispatchEvent(new CustomEvent('survey-board-data-ready'));
    });
    // Reload contacts and workflow on background data changes, then notify React.
    document.addEventListener('localdata-updated', async () => {
      try {
        await Promise.all([loadAllContacts(), loadWorkflowStages()]);
        state.filteredContacts = [...state.contacts];
        document.dispatchEvent(new CustomEvent('survey-board-data-ready'));
      } catch (_err) {
        document.dispatchEvent(new CustomEvent('survey-board-bg-refresh-failed'));
      }
    });
  </script>
  <script>
    // Load workflow data for the Survey board. Auth redirect and onboarding
    // gating are handled by AppBootstrapProvider in the React tree.
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        await loadWorkflow();
        await Promise.all([
          loadOpenLeads(),        // overridden above to loadAllContacts
          loadWorkflowStages(),
          loadLeadStatuses(),
          loadStageActionLabels(),
          loadLeadSubstatuses(),
        ]);
        populateStageFilter();
        document.dispatchEvent(new CustomEvent('mo:contacts-changed'));
      } catch (e) {
        console.error('[survey] page init failed', e);
        window.__surveyBoardBootstrapFailed = { code: e.code, message: e.message };
        document.dispatchEvent(new CustomEvent('survey-board-bootstrap-failed', {
          detail: { code: e.code, message: e.message },
        }));
      }
    });
  </script>
</body>
</html>
