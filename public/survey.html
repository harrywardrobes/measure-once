<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#200842">
  <meta name="color-scheme" content="light">
  <title>Survey · Measure Once</title>
  <link rel="stylesheet" href="/tailwind.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="/app-styles.css">
</head>
<body>

  <div id="tab-survey" class="app-body">
    <aside id="list-panel" class="list-panel sales-list-panel">
      <div id="survey-view">
        <div id="survey-board-mount" style="flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden"></div>
      </div>
    </aside>
  </div>

  <script src="/chrome.js"></script>
  <script src="/components.js"></script>
  <script type="module" src="/react/main.js"></script>
  <script src="/command-palette.js"></script>
  <script src="/core.js"></script>
  <script src="/workflow-core.js"></script>
  <script src="/card-action-handlers.js"></script>
  <script>
    // Data-bridge event wiring for SurveyBoardPage (inlined from survey.js).
    // Overrides the open-leads loader so bootstrap fetches ALL contacts.
    registerOpenLeadsLoader(loadAllContacts);
    // Notify the React SurveyBoardPage whenever fresh data is available.
    registerCustomerListRenderer(function surveyBoardNotifyReact() {
      document.dispatchEvent(new CustomEvent('survey-board-data-ready'));
    });
    // Reload contacts and workflow on background data changes, then notify React.
    document.addEventListener('localdata-updated', async () => {
      await Promise.all([loadAllContacts(), loadWorkflowStages()]);
      state.filteredContacts = [...state.contacts];
      document.dispatchEvent(new CustomEvent('survey-board-data-ready'));
    });
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await bootstrap();
    });
  </script>
</body>
</html>
