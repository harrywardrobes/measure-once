<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sign in · Measure Once</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/style.css">
  <style>
    body { background:#f8f7f4; color:#141413; margin:0;
           font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
           min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { background:#fff; border:1px solid #e7e5e0; border-radius:12px;
            max-width:420px; width:100%; padding:32px;
            box-shadow:0 1px 3px rgba(0,0,0,.04); }
    h1 { font-size:1.25rem; margin:0 0 4px; }
    .sub { color:#57534e; font-size:.9rem; margin:0 0 24px; }
    label { display:block; font-size:.82rem; color:#374151; margin-bottom:6px; font-weight:500; }
    input { width:100%; box-sizing:border-box; padding:10px 12px; border:1px solid #d6d3d1;
            border-radius:8px; font-size:.95rem; background:#fff; }
    input:focus { outline:none; border-color:#3d0f7a; box-shadow:0 0 0 3px rgba(61,15,122,.12); }
    .field { margin-bottom:14px; }
    button { width:100%; background:#3d0f7a; color:#fff; border:none; padding:11px 18px;
             border-radius:8px; font-weight:600; font-size:.95rem; cursor:pointer; }
    button:hover { background:#2e0f5a; }
    button:disabled { opacity:.6; cursor:not-allowed; }
    .err { background:#fef2f2; border:1px solid #fecaca; color:#991b1b;
           padding:10px 12px; border-radius:8px; font-size:.85rem; margin-bottom:14px; display:none; }
    .ok  { background:#f0fdf4; border:1px solid #bbf7d0; color:#166534;
           padding:10px 12px; border-radius:8px; font-size:.85rem; margin-bottom:14px; display:none; }
    .footer { margin-top:18px; padding-top:16px; border-top:1px solid #f3f1ec;
              font-size:.85rem; color:#57534e; text-align:center; }
    .footer a { color:#3d0f7a; text-decoration:none; font-weight:500; }
    .footer a:hover { text-decoration:underline; }
    .toggle { background:none; border:none; color:#3d0f7a; padding:0; cursor:pointer;
              font:inherit; font-weight:500; }
    .toggle:hover { text-decoration:underline; }
    .hidden { display:none !important; }
  </style>
</head>
<body>
  <div class="card">
    <div id="view-login">
      <h1>Sign in</h1>
      <p class="sub">Use the email + password for your Measure Once account.</p>
      <div id="login-ok"  class="ok"></div>
      <div id="login-err" class="err"></div>
      <form id="login-form" autocomplete="on">
        <div class="field">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" autocomplete="current-password" required>
        </div>
        <button id="login-submit" type="submit">Sign in</button>
      </form>
      <div class="footer">
        <button class="toggle" type="button" onclick="showView('forgot')">Forgot password?</button>
      </div>
      <div class="footer">
        Don't have an account?
        <button class="toggle" type="button" onclick="showView('request')">Request access</button>
      </div>
    </div>

    <div id="view-forgot" class="hidden">
      <h1>Reset your password</h1>
      <p class="sub">Enter your email and we'll send you a link to set a new password.</p>
      <div id="forgot-ok"  class="ok"></div>
      <div id="forgot-err" class="err"></div>
      <form id="forgot-form">
        <div class="field">
          <label for="forgot-email">Email</label>
          <input id="forgot-email" type="email" autocomplete="username" maxlength="254" required>
        </div>
        <button id="forgot-submit" type="submit">Send reset link</button>
      </form>
      <div class="footer">
        <button class="toggle" type="button" onclick="showView('login')">Back to sign in</button>
      </div>
    </div>

    <div id="view-request" class="hidden">
      <h1>Request access</h1>
      <p class="sub">An admin will review your request and email you a link to set your password.</p>
      <div id="req-ok"  class="ok"></div>
      <div id="req-err" class="err"></div>
      <form id="req-form">
        <div class="field">
          <label for="req-name">Full name</label>
          <input id="req-name" type="text" maxlength="100" required>
        </div>
        <div class="field">
          <label for="req-email">Work email</label>
          <input id="req-email" type="email" maxlength="254" required>
        </div>
        <button id="req-submit" type="submit">Submit request</button>
      </form>
      <div class="footer">
        Already approved?
        <button class="toggle" type="button" onclick="showView('login')">Back to sign in</button>
      </div>
    </div>
  </div>

<script>
  function showView(name) {
    document.getElementById('view-login').classList.toggle('hidden', name !== 'login');
    document.getElementById('view-request').classList.toggle('hidden', name !== 'request');
    document.getElementById('view-forgot').classList.toggle('hidden', name !== 'forgot');
  }
  function show(el, msg) { el.textContent = msg; el.style.display = 'block'; }
  function hide(el) { el.style.display = 'none'; el.textContent = ''; }

  const params = new URLSearchParams(location.search);
  if (params.get('password_set') === '1') {
    show(document.getElementById('login-ok'),
      'Password set successfully — you can now sign in.');
  } else if (params.get('signed_out') === '1') {
    show(document.getElementById('login-ok'), "You've been signed out.");
  } else if (params.get('access_approved') === '1') {
    show(document.getElementById('login-ok'),
      'Your account is already approved — check your email for a set-password link, or ask an admin to resend it.');
  } else if (params.get('access_pending') === '1') {
    show(document.getElementById('login-ok'),
      "You've already requested access — an admin will review it shortly.");
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('login-err'); hide(errEl);
    const btn = document.getElementById('login-submit');
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
      const r = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) {
        show(errEl, data.error || 'Sign in failed.');
        btn.disabled = false; btn.textContent = 'Sign in';
        return;
      }
      window.location.href = data.next || '/';
    } catch (err) {
      show(errEl, 'Network error — please try again.');
      btn.disabled = false; btn.textContent = 'Sign in';
    }
  });

  document.getElementById('forgot-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('forgot-err'); hide(errEl);
    const okEl  = document.getElementById('forgot-ok');  hide(okEl);
    const btn = document.getElementById('forgot-submit');
    const email = document.getElementById('forgot-email').value.trim();
    btn.disabled = true; btn.textContent = 'Sending…';
    try {
      const r = await fetch('/api/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const data = await r.json().catch(() => ({}));
      if (r.ok) {
        show(okEl, "If that email is on the approved list, we've sent a password reset link. Check your inbox.");
        document.getElementById('forgot-form').reset();
      } else if (r.status === 429) {
        show(errEl, 'Too many requests — please try again later.');
      } else {
        show(errEl, data.error || 'Could not send reset link.');
      }
    } catch {
      show(errEl, 'Network error — please try again.');
    } finally {
      btn.disabled = false; btn.textContent = 'Send reset link';
    }
  });

  document.getElementById('req-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('req-err'); hide(errEl);
    const okEl  = document.getElementById('req-ok');  hide(okEl);
    const btn = document.getElementById('req-submit');
    const name  = document.getElementById('req-name').value.trim();
    const email = document.getElementById('req-email').value.trim();
    btn.disabled = true; btn.textContent = 'Submitting…';
    try {
      const r = await fetch('/api/request-access', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ name, email }),
      });
      const data = await r.json().catch(() => ({}));
      if (r.ok) {
        show(okEl, "Request received. We'll email you once an admin approves it.");
        document.getElementById('req-form').reset();
      } else if (r.status === 409 && data.status === 'approved') {
        show(okEl, 'This email is already approved — check your inbox for a set-password link.');
      } else if (r.status === 409 && data.status === 'pending') {
        show(okEl, 'This email already has a pending request.');
      } else if (r.status === 429) {
        show(errEl, 'Too many requests — please try again later.');
      } else {
        show(errEl, data.error || 'Could not submit request.');
      }
    } catch {
      show(errEl, 'Network error — please try again.');
    } finally {
      btn.disabled = false; btn.textContent = 'Submit request';
    }
  });
</script>
</body>
</html>
